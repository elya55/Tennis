折返跑”：每个半场中点放 1 个球筒，筒内放 7 个球；从中点出发，依次取球并回到筒内；依次完成（图 5）\n- “W”字冲刺训练：从网柱开始，背向底线向后全速跑动向底线（好像要触球顶线）；急停向中间网带冲刺回到中点；急停向右网柱冲刺；从右网柱至左网柱的“W”字冲刺动作；强调改变方向的直线式而非弧线式距离\n- “单双锥体冲刺训练”：底线两侧各 1 锥体，底线中放 1 锥体；底线出发听到“跑”向边线冲刺并触锥体，完成后回到底线中锥体，再冲刺另一侧；循环 30 秒并记录次数（图 6）\n\n### 四、随机性灵敏训练（p219，截图仅显示标题与引导句）\n\n随机性灵敏是灵敏性的最后一个因素，也是最难掌握的因素。训练中使运动员完成未知的运动（⚠️ p219 后续内容未在该截图中完整呈现）\n\n\n<a id=\"ch3_ladder\"></a>\n### 五、软梯训练法（p221-222）\n\n软梯长约 10 米，倒放在地面上。每一格子约 40×40 厘米。该方法的练习种类多，可以做不同类型的跑、跳、移动动作。\n\n训练目的：更好地控制提高稳定能力。练习开始不要速度过快，练习逐渐加速，侧向移动时注意足够的抬步，注意上体平稳、脚步有节奏、有专念，脚离地面不宜过高（图 3-23），效果会更好。\n\n该方法也可以采用双软梯练习。\n\n**练习1：双脚向前跳（p221）**\n- 描述：双脚并拢站立向格子里跳，每次跳进一个\n- 要求：上体要保持弯曲姿势；在跳跃过程中只可以前脚掌着地；着地后要马上起跳\n\n**练习2：双脚滑雪步跳（p221）**\n- 描述：双脚并拢从绳梯的左边开始起跳，跳入第一个绳梯格子内；之后迅速跳到该格子的右边；之后跳入第二个格子内；之后跳至第三个格子的左边；再迅速跳入第三个格子内；再迅速跳至第三个格子的右边；以此类推\n- 要求：上体要保持弯曲姿势；在跳跃过程中只可以前脚掌着地；着地后要马上起跳\n\n**练习3：双脚跨进跳出（p221）**\n- 描述：双脚并拢从绳梯的左边开始起跳，向前跳入绳梯格子内；之后迅速向后跳出到该格子的同侧下一个格子外；之后迅速跳入第一个格子内；之后迅速向后跳至第二个格子内；右脚跟上；之后左脚跟着迅速向后再到第二格子内；右脚跟上；之后继续往前反复到每一格子外；以此类推（⚠️ p221 文段较密，以上为尽力转写）\n- 要求：上体要保持弯曲姿势；在跳跃过程中只可以前脚掌着地；着地后要马上起跳\n\n**练习4：双人双双出（p222，部分可读）**\n- 描述：双脚并拢从绳梯的左边开始起跳，先左脚踏入绳梯格子内；之后右脚迅速踏到该格子内；之后左脚向前踏出此格子、右脚再进……（⚠️ p222 上半页标题“练习4：双人双双出”其详细描述在截图中仍较小，后续可补近景核对）\n- 要求（可读要点）：上体保持弯曲姿势；在跳跃过程中只可以前脚掌着地；着地后要马上起跳\n\n**练习5：双人单出（p222）**\n- 描述：准备动作与梯子左侧面；先站左脚踏入第一个格子中，右脚紧跟着也踏入第一个格子内；左脚踏出第一个格子成为发力的支撑脚，此时转髋；右脚入第二个格子中，左脚紧跟着也踏入第二个格子内；右脚踏到第二个格子外发力的支撑脚；此时转髋；以此类推\n- 要求：上体保持弯曲姿势；在跳跃过程中只可以前脚掌着地；着地后要马上起跳；在梯子行侧面时要转髋\n\n**练习6：卡丽欧卡舞步（p222）**\n- 描述：开始姿势与梯子平行站立，站在梯子右边；身体左侧朝向梯子；先站左脚先横向绕出一块，右脚随后横向入第一格子内；左脚再斜横踏入第二格子内；左脚再斜横踏入第三格子内；以此类推\n- 要求：上体要保持弯曲姿势；在跳跃过程中只可以前脚掌着地；着地后要马上起跳；注意每次换脚时髋部一定要大幅度转动\n\n---\n\n<a id=\"ch3_core\"></a>\n## 第七节  核心稳定性训练（p223-224）\n\n稳定性可以指任何一个关节在运动中的稳定程度。稳定性可以保障身体之间进行动量及力的传递。稳定性差使身体之间的动量和力在传递过程中被损耗，从而使技术的经济性受到影响。稳定性练习对腿部和上肢关节、核心部位和上肢关节等都很重要。特别在网球运动中，身体转动动作多，可以分为下肢关节、核心部位和上肢关节三个部位稳定性。\n\n核心稳定性是指人体在运动中，处于身体躯干部位关节肌肉有效使能量和保持身体姿势的能力。尤其在全身运动过程中，核心稳定性对技术的完成到重要作用。任何动作的脊椎或骨盆被视为一个“能源”源点，能量流进流出的身体中支撑在一定意义上。\n\n网球运动员在场上不停进行加速、减速、变向运动，对核心稳定性有较高要求；击球力量也需要平稳传递来自下肢的蹬伸力量，因此网球训练不能忽视核心稳定性发展。\n\n核心稳定性训练方法要点（p223，摘录）：\n- 重复次数在 6 次以上\n- 一次练习 2-3 组\n- 动作速度快慢合理\n- 注意与呼吸配合\n\n**练习1：仰卧单腿两头起（p223）**\n- 全身放松仰卧地面，双手向前伸直并握球置于头部上方；一脚弯曲且脚掌贴地面；另一脚与双手握球进行 V 字的两头起；上体抬起时手臂伸直前伸，眼睛盯着球；尽力用球触及对抬起腿的脚尖；完成一次后换腿重复\n- 注意：动作速度要慢、标准\n\n**练习2：单手托球上举（p223）**\n- 全身放松仰卧地面，屈膝双脚全脚掌着地；一手托球，另一手搭在托球手的肩膀上\n- 注意：练习时腰部不离地，眼睛始终看向球，并保持呼吸不紧张；尽力抬上体，将球顶起来；完成若干次后换手\n\n**练习3：双腿夹球伸髋（p224）**\n- 全身放松仰卧地面，双手向斜上方伸展并贴住地面；双腿屈膝 90 度左右且脚掌贴于地面；膝关节处夹实球；曲髋发力慢蹬，尽力使球贴在腹部（如下图）\n- 注意：动作缓慢，避免借助惯性；同时保持双腿屈紧夹实球，不要使球掉落\n\n**练习4：双腿夹球左右摆动（p224）**\n- 全身放松仰卧地面，双手向斜上方伸展并贴住地面；膝关节处夹实球；双腿屈膝 90 度左右且全脚掌贴于地面\n- 描述：练习开始时双脚掌离开地面，带动髋关节转动左右摇摆，摆至大腿、膝关节，小腿触到地面\n- 注意：动作缓慢，到位\n\n**练习5：仰卧双手托球做卷腹起坐（p224）**\n- 仰卧地面，双手向上高托球；双腿屈膝 90 度脚掌贴地面，起坐时腰部必须紧贴地面；起坐角度约为 30 度（如下图）\n- 注意：练习时腰部不离地，眼睛始终看向球，尽力抬上体，将球顶起来；动作速度缓慢、到位\n\n**练习6：单腿横桥（p225）**\n- 身体呈俯撑姿势，双手宽度与肩同宽，支撑地面；头部、臀部和脚跟保持在一条直线上；双腿放在瑞士球上，用脚尖支撑（如下图）\n- 描述：练习时将一条腿上抬 15 度左右，缓慢放下，换另一条腿做同样练习（如下图）\n- 注意：练习时是用脚尖支撑\n\n**练习7：双脚推大瑞士球（p225）**\n- 身体呈俯撑姿势，双手宽度与肩同宽，支撑地面；头部、臀部和脚跟保持在一条直线上；双脚放在瑞士球上\n- 描述：开始动作体干呈直线；然后做收腹动作（如下图），缓慢回到准备姿势；向另一侧重复练习（如下图）\n- 注意：收腹时尽量靠近腹部\n\n**练习8：高姿屈腿伸屈起坐（p225）**\n- 全身放松，身体平躺在地上；双手放在耳侧，双肘撑地面；小腿放在瑞士球上，大腿后部紧贴瑞士球\n- 描述：双脚脚板放松，开始做仰卧起坐（如下图）\n- 注意：练习时双手不要抱头\n\n**练习9：击打抱球的瑞士球（p225）**\n- 两人面对面站立，其中一人双腿略微弯曲，双手抱紧瑞士球且使球不要靠身体；另一个人用手随意击打对方抱住的球。抱球的人要保持住身体姿势（如下图）\n\n**练习10：抱球滚动（p226）**\n- 面向地面俯卧趴在瑞士球上；双手抱住住瑞士球中部（避免伤到手）；前脚掌着地，腰部紧张、保持足跟，臀部和背部在一条直线上\n- 描述：练习开始后以腿为支点，利用腰部的力量控制瑞士球上部左右摆动；注意动作速度慢（如下图）\n\n**练习11：实球屈髋（p226）**\n- 练习者坐在垫上以臀部为支点；双手放在肩关节的投影点；双臂弯曲撑起上体；双腿伸直抬起\n- 描述：用双脚夹实球做伸屈髋动作，膝盖尽量靠近胸前，返回重复；要求动作缓慢（如下图）\n\n**练习12：球上跪姿平衡（p226）**\n- 开始时双手扶着瑞士球，小心将双膝跪在瑞士球上，并尽力保持平衡；慢慢直立背部，抬起双手保持平衡，尽量不要掉下来\n\n**练习13：瑞士球俯卧撑（双脚在球上）（p226）**\n- 身体呈俯撑，头部自然放松；两眼目视地板；双手分开与肩同宽并与身体相垂直于地面；两脚并拢伸直，并将双脚脚尖放在球上；身体保持水平\n- 描述：上肢做正常俯卧撑的屈伸动作（如下图）\n\n**练习14：瑞士球俯卧撑（双手在球上）（p226）**\n- 双手按在瑞士球上，进行俯卧撑练习（如下图）\n\n**练习15：单腿推拉瑞士球（p227，截图仅含本练习与上条注意事项尾句）**\n- 注意：腹肌紧张，身体保持一条直线\n- 身体呈俯撑姿势，双手宽度与肩同宽，支撑地面；头部、臀部和脚跟保持在一条直线上；两脚并拢伸直，并将双脚脚背打在球上\n- 描述：开始动作是一只脚离开球，用另一只放在球上的腿做收腹收缩动作；做完一次以后换腿，反复交替练习（如下图）\n- 注意：收腹时尽量靠近腹部\n\n---\n\n<a id=\"ch4\"></a>\n## 第四章  心理训练（p228 起）\n\n对于网球运动员，古瑞德等提出要保留的心理技能包括努力性、注意力、情绪控制与思维控制。下面对 4 类心理技能运用中经常遇到的问题进行了解释说明，并给出了解决这些问题的方法建议。（p228，按图尽力转写）\n\n<a id=\"ch4_motivation\"></a>\n### 第一节  动机（p228）\n\n#### 一、动机方面经常存在的问题\n\n（一）由于比赛机会不足，感到动机缺乏。  \n（二）由于训练持续时间过长，或训练乏味，因此感到动机缺乏。  \n（三）由于经历太多失败，教练或家长过多地持有批评态度，或者由于其他个人问题，感到动机缺乏。  \n（四）当参加重大比赛时，动机水平过高。  \n（五）由于担心比赛输赢，害怕某些比赛对手或担心教练员、父母、其他队友的反应，因此表现出消极动机。  \n\n#### 二、提高动机水平的方法\n\n（一）精心准备年度计划，计划中以比赛为检验的日程安排、身体训练的类型与强度、训练时间与恢复期。  \n（二）训练、课程的创设要考虑趣味性。  \n（三）与自我激励水平较高的运动员进行交往。  \n（四）利用目标设置策略。  \n\n<a id=\"ch4_attention\"></a>\n### 第二节  注意力（p228-229）\n\n#### 一、注意力方面经常存在的问题（p228）\n\n（一）对训练或比赛缺乏兴趣。  \n（二）由于网球比赛分与分之间的间歇导致无法集中注意力。  \n（三）由于考虑过多的事情而无法集中注意力。  \n（四）考虑过多的技术细节而无法集中注意力。  \n（五）总是考虑过去已经发生的事情和将来可能发生的事情而无法集中注意力。  \n（六）由于焦虑或紧张情绪而不能集中注意力。  \n（七）由于对手的行为而不能集中注意力。  \n（八）由于比赛中裁判的判罚问题不能集中注意力。  \n（九）由于愤怒情绪不能集中注意力。  \n\n#### 二、提高注意力集中能力的方法（p229）\n\n（一）进行有效的赛前准备。  \n（二）比分间隙时间需要遵循一定行为规则：每一分之间的间歇时间应保持放松，计划如何打下一分；在发球或接发球前做一些自己习惯的动作，进入下一分比赛。  \n（三）为自己设立合理比赛目标。  \n（四）每一分比赛开始前，都要有计划。  \n（五）通过对眼睛的控制来集中注意力（如，注视网球上的纹路，或注视球拍上的线）。  \n（六）利用身体放松技巧，如，深呼吸，抖动手臂，放松肩部。  \n（七）使自己的思维只集中于当前这一分上。  \n（八）通过加入运动训练难度的方法，比如，在大风天、吵闹的环境下训练，或选择自己不喜欢的对手进行对抗练习。  \n（九）通过使用某些关键词语来集中自己的注意力（如：“加油”）。  \n（十）学会在比赛间歇时积极放松，并且当下一分的比赛开始要集中注意力。  \n（十一）学会监控比赛和管理——控制自己的注意力，知道什么时候“调大”自己的注意力，什么时候“调小”自己的注意力。  \n（十二）在赛前与赛中，利用表象法设法回忆自己曾经漂亮击球时的情景。  \n（十三）击球时呼气。  \n（十四）教练与队员对打，且告诉队员每硬球所应用的击球方式。  \n（十五）对攻练习，开始节奏要慢，然后逐渐加快击球的节奏，如果出现失误就重新从慢节奏开始打起。  \n（十六）击球过程中，当球弹起时跟着喊一声“跳”，当落到击球点时喊一声“打”，对球网两侧的球均是如此。  \n（十七）对手击球时，做分腿垫步，进入准备状态。  \n（十八）接发球时尽可能提前说出发球方发球旋转的方式（平击、上旋球、下旋球）；在打底线球时也可以用这种方式提高注意力。  \n\n<a id=\"ch4_anxiety\"></a>\n### 第三节  运动员焦虑（p229）\n\n#### 一、存在问题（p229）\n\n焦虑的产生与环境和个人情绪的体验密切相关。球员在面对比赛或比赛中某一场景时，可能会感到担忧或消极的方式应对。害怕失败、缺乏控制感或感觉准备不充分都将导致焦虑。焦虑情绪的发生还经常伴有身体反应，如感觉肌肉僵硬、全身无力……敏捷且行动不灵敏的原因，是由于其唤醒水平不足。如下这些身体或心理上的行为，均能使球员“放大”自己的焦虑状态；肌肉紧张：\n\n（一）动作协调性差。  \n（二）柔韧性下降。  \n（三）呼吸变浅，心跳加快。  \n（四）腿部肌肉无力。  \n（五）注意力下降。  \n（六）情绪控制能力下降。  \n（七）对回球的选择能力降低。  \n（八）感觉一切事情似乎都节奏过快。  \n\n（九）自己产生了消极的想法。（p230，承接上页）\n\n#### 二、减少或降低焦虑的方法（p230）\n\n（一）放松双臂、颈部及手臂的肌肉。  \n（二）不要过于勉强、求成，顺其自然。  \n（三）保持镇定、深呼吸。  \n（四）击球的同时呼气。  \n（五）保持微笑。  \n（六）树立坚定的形象，表现出平静的神情并有效控制。  \n（七）采取惯用的行为方式。  \n（八）采用夸张的步法。  \n（九）理解“适当紧张是正常有益”的道理。  \n（十）使用积极的自我暗示。  \n（十一）把思维集中在自己可控制的事情上，如每一分比赛的计划安排。  \n（十二）给每一分比赛单独制定计划。  \n（十三）心理应该去争胜，而不是避免失败。  \n（十四）把比赛当作乐趣与挑战。  \n（十五）忘掉曾经所犯的错误。  \n\n---\n\n<a id=\"ch4_arousal\"></a>\n### 第四节  运动员唤醒水平（p230）\n\n#### 一、唤醒水平低的原因\n\n心理技能训练的目标就是帮助球员达到良好心理准备状态，在这种状态下，球员勇敢地迎接挑战而不是惧怕；达到充分的唤醒水平并集中注意力，以良好的身体状态达到最佳水平。运动员因为身体上或心理上的原因“放大”自己的消极状态，常常表现为：\n\n（一）感觉没有力气。  \n（二）感觉动作缓慢。  \n（三）看上去懒洋洋的样子。  \n（四）注意力分散。  \n（五）消极的身体语言。  \n（六）一副漠不关心的神情。  \n（七）预判能力降低。  \n\n#### 二、提高唤醒水平的方法\n\n（一）在对方进行发球前做一些放松性的小跳。  \n（二）进行短促有力的呼吸。  \n（三）听一些快节奏的音乐。  \n（四）付出百分百的努力。  \n（五）进行积极的自我暗示。  \n\n---\n\n<a id=\"ch4_confidence\"></a>\n### 第五节  思维控制与自信（p231）\n\n#### 一、自信心存在问题\n\n自信心是关于自己在特定情形下能够成功完成某项任务的信念。自信心可以唤起个体的积极情绪，提高注意力、决策力，增强坚持性与努力程度。并且，自信心与动作技能和体能之间都存在较密切的联系。自信心是球员关于自己的成功与失败的预期反应，球员的自信心问题会影响其运动表现。球员自信心不足的表现包括：\n\n（一）输给水平较低的对手，输掉处于领先的比赛。  \n（二）面对容易的击球时出现错误错失机会。  \n（三）球员也可能在如下情境下缺乏信心：面对一场势均力敌的比赛，关键分或决定性的球时，或单由于比赛经验不足而丧失信心。  \n（四）当球员过高估计自己的能力水平时就会过于自信；过于自信者经常会低估对手的水平。  \n（五）有些想法可以导致压力，如“万一我输给这个对手怎么办？”。  \n\n#### 二、改善自信心水平的方法\n\n（一）通过积极的自我暗示。  \n（二）肯定自己在训练中曾经付出的巨大努力。  \n（三）不断以现实因素塑造自己的行为。  \n（四）针对不同的对手，调整自己的动作技能。  \n（五）观看自己过去表现出色的比赛录像。  \n（六）利用表象训练法，描绘自己的精彩动作。  \n（七）在球场上保持积极的形象。  \n（八）提高自己的适应水平。  \n（九）努力改变心理技能转为缺乏的局面。  \n（十）设立好赛前行为习惯。  \n（十一）制定现实可行的目标。  \n（十二）与优秀的选手，但不是那些太过优秀的选手一起打球。  \n（十三）为自己设定最佳表现努力工作，而不是过多关注行为结果，这样可以减少压力。  \n（十四）努力学会在艰难的情境中享受挑战的滋味。  \n（十五）接受错误，并从错误中学习，然后避开这些错误，不再思其害祥。  \n（十六）让自己从积极的角度重新讲述消极的自我谈话。  \n（十七）制定一个具有竞争力的比赛计划，保证球员在比赛中的胜率保持 2:1 或 3:1。  \n（十八）在训练时，针对每一分制定特定的比赛计划。  \n（十九）在训练中，设定一定的条件让球员轻松得分或比赛，以增强其自信心。  \n\n---\n\n<a id=\"ch4_coach\"></a>\n### 第六节  教练员在培养运动员过程中作用（p231-232）\n\n#### 一、教练员的基本要求（p231-232）\n\n作为一名教练，你就是队员的榜样。你的行为永远比你的语言更有说服力。教练员所要做的工作是，教授运动员如何享受竞争，而不是惧怕比赛。一名合格的教练员应从以下几方面不断提高自身的水平：\n\n（一）提高和保持自己的体能水平。  \n良好的体能水平，不仅会让你队员对你更加尊重，也会让你自我感觉良好并且工作上得心应手。  \n（二）不断提高自己的执教能力。  \n参加各种培训班，养成阅读书籍和资料以及观看职业赛事的习惯，同时要经常对网球项目赛事进行研究。  \n（三）不断提高外语能力。  \n这样你就可以和国际运动员一起工作。  \n（四）养成写东西的习惯。  \n包括运动员的目标、训练和比赛计划、讲稿、训练小技巧，一些突发的灵感，对其它运动员的点评、指导和训练过程中的苦等。  \n（五）善于借鉴其它体育项目中的成功经验。  \n学习与网球运动有关联的其它体育项目，从中学到好的训练方法。  \n（六）保持和提高自己的网球水平。  \n不断努力提高自己的网球水平。经常参加网球比赛和赛事，以便更好地理解运动员在比赛中的感受。  \n（七）保持头脑的开放。  \n勇于接受新生事物。  \n\n#### 二、充分认识教练员在心理训练中的重要地位（p232）\n\n作为教练员需要明确的是，运动员心理技能的提高只有依靠长期的训练才能实现。在每场比赛之后，以教练员进行训练之后，教练员都应该对运动员的心理技能和表现做一个评价。在课程设置上，要时常考虑为运动员安排一些相关专题讲座。当然，能邀请运动心理学专家进行合作指导将更为理想。为此，教练员应重点开展以下几个方面的工作：\n\n（一）青少年网球运动员经常遇到许多压力困扰，教练员要学会管理与克服压力；  \n（二）避免对运动员进行过度训练；  \n（三）训练与比赛中都要注意有效恢复；  \n（四）当运动员遇到一些麻烦时，要找他们交流，了解运动员的想法与担忧；  \n（五）教练员不能简单地将比赛或成绩等同于运动员运动表现的好坏。在网球运动中，最重要的是运动员要不断超越自我，展现自己最佳竞技水平。也就是说，我们不能期待运动员去击败一名在技术和身体素质各方面明显优于自己的对手；  \n（六）教练员应全力帮助运动员制定赛前计划，保证他们已经全身心关注比赛，并做好了参赛准备。  \n\n---\n\n<a id=\"ch5\"></a>\n## 第五章  考核（p233 起）\n\n<a id=\"ch5_fitness_eval\"></a>\n### 第一节  网球运动员体能评价（p233）\n\n在网球运动上获得成功取决于很多因素，包括：运动员的神经肌肉与生理特点、技术水平、比赛战术的使用、坚强的意志品质和强烈的动机。这些因素很多会被决定网球运动的主要教练的直觉来判断。但是，网球运动员所需要的力量、速度等体能指标，却有很多是可以量化评价的。通过体能测试评价，教练可以发现运动员的弱点，进而更加精确的调整考核训练方案，更加有效地控制运动员的训练过程，获得最大的训练效果。此外，这些测试还可以对训练计划的训练过程效果提供及时客观的反馈，增加训练动机，以帮助运动员在运动成绩或运动场上最大的限度的提升。这也对缩短青少年运动员的成长和准备成为职业选手有很大帮助。\n\n#### 表1 评价不同体能指标测试方法（p233-234）\n\n| 体能指标 | 测试名称 |\n| --- | --- |\n| 柔韧性 | 神经肌肉系统体检中使用的所有柔韧性测试 |\n| 有氧耐力 | 多级折返跑测试（BEEP TEST）、COOPER 12 分钟跑、1.5 公里跑 |\n| 无氧耐力 | 网球专项灵敏无氧耐力测试（多次冲刺跑） |\n| 力量 | 俯卧撑测试；握力测试；其它：不负重双臂屈伸的最大次数、不负重引体向上的最大次数、3RM 蹲起或卧推（与体重成比例的）、过顶掷实心球 |\n| 上肢爆发力 | 左、右体侧掷实心球 |\n| 下肢爆发力 | 双腿垂直跳、左单腿垂直跳、右单腿垂直跳；其它：二步助跑垂直跳、立定跳远/立定单腿跳 |\n| 速度 | 20 米冲刺；其它：5 米冲刺、10 米冲刺 |\n| 灵敏性与协调性 | 正手侧向移动、反手侧向移动、后退步移动测试、规定灵敏性测试、六边型敏捷测试 |\n\n说明：除非有特别说明，以下 T2、14 和 16 岁运动员的标准来自于澳大利亚体育学院在国家青少年队集训时测得数据（其中男队员 24 名，女队员 20 名）。这些结果只是给教练们提供参考，它们都是平均值，而不是最好值。同时，关于非专业人群的标准是结合来自国家数据库的一般标准和作者自己的主观推测得出的。由于国家文化差异，测试结果会有很大的不同，因此建议教练们尽快开始建立自己的测试数据库和评价标准。\n\n### 一、柔韧性测试（p234）\n\n坐位体前屈：此项目用来测试躯体的髋度以及背肌和腘绳肌的柔韧性。  \n测试方法：受试者双脚贴墙面坐，双腿完全伸直，脚掌平贴墙上突出的小盒子上，手臂尽量向前伸，并至少保持 3 秒钟。在伸臂的全过程中，双膝必须保持完全伸直，是用一把尺子丈量手臂伸直至盒子边沿或超过边沿的距离。  \n成绩：受试者不能触及脚尖，则距离用负分表示。测出的距离超过盒子的边沿时，用加分记录。  \n\n### 二、有氧耐力测试（p234-235）\n\n#### 表2 场地有氧耐力测试法：多级体能测试（p234）\n\n- **目的**：测试有氧耐力。这是一种准确的测试有氧能力的方法。本测试中有很多急停、起动和改变方向的动作，和网球运动很类似；而且便于整个队伍很多人同时进行测试。\n- **设备**：多级体能测试 CD 和 CD 机，测量 20 米距离并在两端做标记。\n- **操作指南**：\n  - 运动员可以较轻微的热身或伸展活动。\n  - 运动员必须仔细听 CD 中的说明。\n  - CD 会有规律的发“哔”提示音。运动员必须在下次提示音响起时到达 20 米的另一端。提示音间隔每分钟都在缩短，也就是每 1 分钟后跑速必须提高。起始速度为 1 级，随着速度增加 2、3、4……级，轻微速度增加。\n  - 总时间约 1 分钟，整个 CD 测试最高速度是 21 级。每 20 米后有“哔”提示音分隔，每级之后有稍长的“哔”提示音和简单的语音提示。\n  - 运动员在听到“哔”提示音时必须有一只脚踩在或跨过一端的标志线，不能脚踩在或跨过标志线者警告一次；若在听到下次“哔”提示音时不能到达 20 米的另一端，出局结束测试。\n  - 在筋疲力尽前，运动员会出现连续两次不能及时跑完 20 米的情况，结束测试并记录成绩。成绩以第一次失败等级的前一次等级为准。\n\n目前在澳大利亚体育学院发现，以折返跑 2 个 10 米代替 20 米距离来完成以上测试，更适合网球这类间歇性运动项目。（p235）\n\n#### COOPER 12 分钟跑（p235）\n\n测试中运动员以尽可能快的速度跑完 12 分钟。测试一般在标准的 400 米跑道上进行。当然也可以绕网球场场地跑圈，记录 12 分钟跑圈数，再以每圈 75 米计算 12 分钟跑成绩。\n\n#### 1.5 英里（2400 米）跑（p235）\n\n本测试被认为可以测试运动员的有氧耐力，它只需要记录运动员尽力跑完 2400 米的时间就是测试成绩。和 12 分钟跑一样，它操作简单，可以同时测试较多名运动员。\n\n#### 表3 国家高水平网球运动员的有氧耐力测试成绩标准（p235）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 | 专业组男性 | 专业组女性 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 多级体能测试（级） | 9.3 | 8.5 | 10.0 | 10.0 | 12.6 | 11.4 | < 14.0 | < 13.0 |\n| 12 分钟跑（km） | 2.50 | 2.25 | 2.72 | 2.32 | 2.96 | 2.56 | - | - |\n| 1.5 英里跑（min/sec） | 11.42 | 12.40 | 11.10 | 12.25 | 10.44 | 11.41 | - | - |\n\n***样本来自德国国内有一定排名的运动员（样本量 20-50 人）。（p235）\n\n### 三、无氧耐力测试（p235）\n\n#### 表4 场地无氧耐力测试方法（p235）\n\n- **目的**：测试网球运动员在整场比赛中保持连续高强度冲刺的能力\n- **设备**：标志带、测试带、秒表、网球场\n- **操作指南（网球专项灵敏无氧耐力测试：多次冲刺跑）**：\n  1. 运动员站在底线中点线前，听教练口令起跑，向球框（球网中央）后折返到起始位置，全过程冲刺，并用一只手摸标志桶（球网中央）。\n  2. 第二次向右单打边线冲刺，同样在右单打边线与底线交点处有一标志桶，运动员单手摸桶后折返回到起始位置。\n  3. 第三次，向右侧小对角线冲刺，在发球线与单打边线交点处放置标志桶，运动员单手摸桶后折返回到起始位置。\n  4. 第四次，同上完成左侧小对角线冲刺，并返回到起始位置。\n  5. 最后运动员向左单打边线冲刺，通过左侧单打边线的教练表记时。\n  6. 运动员休息 20 秒。\n  7. 运动员重复以上 5 次冲刺，共完成 5 组冲刺，组间休息 20 秒。\n- **评分**：记录每组时间，以百分比算出差与最好成绩差（差值/最好成绩，再取百分数）\n\n---\n\n### 四、力量测试（p236-240）\n\n在表 1、2 中，列举了网球专项测试中的部分测试方法，这些测试方法并不全面；在表 1、2 中也列举了一些与竞技能力相关的力量测试方法，这些方法也不够全面。（p236，按图尽力转写）\n\n#### （一）最大力量测试：3RM 蹲起或卧推（与体重成比例）（p236）\n\n> ⚠️ 本页排版为横向表格，部分小字难以逐字核对；以下为可读部分的结构化转写。\n\n- **目的**：测试网球运动员最大力量（股大肌、肱大肌/胸大肌等）（⚠️ 个别肌群名待核对）\n- **设备**：杠铃、卧推凳/深蹲架等（⚠️ 设备行小字）\n- **操作指导**：\n  - 运动员双脚站位并按动作技术完成下蹲/卧推；逐级加重，直至运动员只能完成 3 次重复（3RM）\n  - 组间充分休息（⚠️ 细节小字）\n- **评分**：记录 3RM 的重量，并可按体重做比例化记录\n\n#### 表5 国家高水平网球运动员的六边型敏捷测试成绩标准体系（p236，单位：秒）（⚠️ 表名按图尽力识别）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 六边型敏捷测试（秒） | 5.3 | 5.0 | 5.3 | 6.0 | 5.8 | 5.0 |\n\n#### 表6 网球运动员力量要素的测量测试方法（p236，表格大字可读）\n\n| 测试 | 目的 | 操作指导 / 评分（摘要） |\n| --- | --- | --- |\n| 上肢爆发力测试（实心球投掷） | 测试上肢爆发力 | 见表 11；记录投掷距离 |\n| 力量耐力测试（俯卧撑） | 测试上肢肌肉耐力 | 见表 8/12（⚠️ 具体版本需与原书核对） |\n| 握力测试 | 测试上肢握力 | 使用握力计；记录左右手/最大值（⚠️ 小字） |\n| 程力测试（⚠️ 名称待核对） | 测试肌肉力量 | 记录最佳成绩；每项测试做 3 次，取最好成绩（⚠️ 小字） |\n\n#### 表7 国家高水平网球运动员的力量耐力/握力测试成绩标准体系（p236，表头可读，单位未标注）（⚠️ 表名按图尽力识别）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 | 专业组男性 | 专业组女性 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 俯卧撑测试 | 33 | 26 | 36 | 28 | 40 | 25 | 47 | 34 |\n| 握力测试 | 24 | 25 | 33 | 30 | 47 | 34 | 60 | 40 |\n\n#### （二）上半身爆发力测试（p237-238）\n\n##### 表9 上半身爆发力的实心球投掷测试（p237，表头可读）\n\n- **测试**：过顶掷实心球；左右体侧掷实心球\n- **目的**：测试上肢/躯干爆发力\n- **设备**：实心球、标志线、卷尺\n- **操作指导（摘要）**：\n  - 过顶掷：双手握球从头后向前上方掷出，记录距离\n  - 体侧掷：左右侧分别完成体侧投掷，记录距离\n- **评分**：每项测试做 3 次，取最好成绩\n\n##### 表10 国家高水平网球运动员上半身爆发力投掷测试成绩标准（p238，单位：米）\n\n| 项目 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 头上掷实心球（米） | 6.54 | 6.47 | 9.00 | 7.83 | 10.72 | 9.14 |\n| 右侧掷实心球（米） | 8.01 | 7.15 | 9.50 | 8.25 | 12.16 | 10.76 |\n| 左侧掷实心球（米） | 7.31 | 7.24 | 8.90 | 7.88 | 12.43 | 10.24 |\n\n##### 表11 上半身爆发力的实心球投掷方法（p238，摘要）\n\n- **正头上小球（⚠️ 项名待核对）**：运动员可以以自己的站位开始；在球场右侧中心点 0.9 米处（⚠️ 位置细节小字），向上标记出投掷距离。\n- **发球速度测试（简介）**：正大、小球/9.2 米标志线等（⚠️ 本栏字小，待补近景核对）\n- **掷垒球速度测试（简介）**：该测试的目的在于了解投掷速度与体能训练的关系；并以此发展具有专项性的网球运动表现与训练方法。（p238，末段清晰）\n\n#### （三）下半身爆发力测试（p239-240）\n\n##### 表13 垂直弹跳测试方法（p239，摘要）\n\n- **测试**：双腿垂直跳；左单腿垂直跳；右单腿垂直跳\n- **目的**：测量下肢爆发力（主要测股四头肌、踝伸肌群等）（⚠️ 肌群名小字）\n- **设备**：皮尺（或专用测试设备）\n- **操作指导**：\n  - 双脚开立（大约与肩同宽），快速屈膝半蹲后全力垂直向上跳（可双手摆臂）\n  - 单腿垂直跳：一脚支撑，另一脚屈膝抬起；同样完成快速屈伸后垂直起跳\n- **评分**：记录每次跳跃的垂直高度；每项做 3 次，取最好成绩\n\n#### （四）力量耐力测试（p239）\n\n##### 表12 国家高水平网球运动员力量耐力测试成绩标准体系（p239，⚠️ 单位/项目名需补图核对）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 | 专业组男性 | 专业组女性 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 力量耐力测试（⚠️ 项目/单位待核对） | 120.0** | 115.0** | 146.8** | 126.9** | 135.6** | 137.9** | 180.0** | 160.0** |\n\n***样本来自德国国内有一定排名的网球选手的数据（样本量 20-50）。（p239）\n\n##### 表14 立定跳远的测量方法（p240，摘要）\n\n- 立定跳远可以测量爆发力，尤其在网球中可用于评估启动/上网等所需的水平爆发能力。（⚠️ 细节小字）\n\n##### 表15 国家高水平网球运动员垂直跳测试成绩标准（p240，单位：厘米）（⚠️ 专业组部分数值栏位在图中未完全呈现）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 | 专业组男性 | 专业组女性 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 右腿 | 22 | 25 | 29 | 29 | 36 | 32 | 69+ | 55+ |\n| 左腿 | 25 | 25 | 33 | 27 | 35 | 32 | ⚠️ | ⚠️ |\n| 双腿 | 31 | 34 | 44 | 38 | 49 | 43 | ⚠️ | ⚠️ |\n\n---\n\n### 五、速度测试（p240）\n\n20 米冲刺是一个测试网球运动员速度的重要手段。但是在网球运动中速度不仅仅指奔跑速度，而在网球运动中更强调的是运动员的启动速度，所以 5 米和 10 米冲刺则更能反映网球运动员的速度能力。（p240，按图尽力转写）\n\n#### 表16 试时网球运动员速度的测试方法（p241）\n\n| 测试 | 目的 | 设备 | 操作指导 | 评分 |\n| --- | --- | --- | --- | --- |\n| 20 米冲刺测试 | 测试加速能力 | 秒表；网球场或能进行 20 米冲刺的场地 | 运动员从底线起跑；听教练口令，全力向前冲刺 20 米（交手、不持拍）；重复测试 3 次 | 取最好成绩 |\n| 5（或 10）米冲刺测试 | 测试起动速度 | 秒表；球场（如图表 1.33）（⚠️ 图未在本组截图中呈现） | 组使用秒表计时，用手势发起跑命令；教练应知道这会令测试误差增大而使得测试结果的可信性下降；为使测试误差减到最小，最好由同一名教练完成所有的测试（减少见地跑命令、也可避免人的分寸差异导致的误差）；一般认为这种误差 5 米冲刺测试较 10 米测试更为明显 | 取最好成绩 |\n\n#### 表17 国家高水平网球运动员速度测试成绩标准（p241，单位：秒）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 | 专业组男性 | 专业组女性 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 20 米冲刺（秒） | 3.57 | 3.58 | 3.36 | 3.40 | 3.16 | 3.41 | 3.09** | 3.30** |\n| 5 米冲刺（秒） | 1.15 | 1.18 | 1.11 | 1.13 | 1.08 | 1.14 | 0.98** | 1.05** |\n| 10 米冲刺（秒） | 2.00 | 2.02 | 1.92 | 1.96 | 1.83 | 1.83 | 1.75** | 1.87** |\n\n***有排名的德国专业选手（样本 20 人）。（p241）\n\n---\n\n### 六、灵敏与协调性测试（p241-243）\n\n#### 表18 网球运动员可用的场地灵敏与协调性测试方法（p241-242）\n\n| 测试 | 目的 | 设备 | 操作指导（摘要） | 注意 |\n| --- | --- | --- | --- | --- |\n| 正手侧侧向移动 | 测试网球场上的侧向移动能力 | 网球场；桶标（标记桶）；标记带；秒表；皮尺；运动员持拍 | 运动员以接球预备姿势站在底线中点，听口令起动；运动员侧向滑步向正手侧单打边线快速移动，并在边线桶标处完成模拟击球动作；然后侧滑回到底线中点；运动员回到底线起点标记处停表；完成一次测试取最好成绩 | 桶标必须放置在正手单打边线上，距底线内侧 0.7 米处，距起点刚好 4.1 米（p241） |\n| 反手侧侧向移动 | 两侧移动测试对比，发现两侧不一致与弱点 | 同上 | 同正手侧向移动，但向反手侧完成；重复完成以取最好成绩 | 侧向移动测试时可用悬挂网球作桶标（相同位置 1 米高度悬挂）；运动员击球后对划落在对面单打场地内为有效；完成测试取最好成绩（p241） |\n| 向后移动 | 测试运动员向后移动接近球的能力 | 同上 | 运动员在场很少倒退跑，常常是转身侧向跑来接近球，或者侧向滑动来完成击球（p241，截图仅到引导句） | ⚠️ 本条具体操作在本组截图中未完整呈现 |\n| 六边跳测试 | 测试网球运动员灵敏与协调性 | 标记带；皮尺；秒表 | 用标记带在地板上画出边长 0.6 米的等边 6 边形；运动员面向前方站在 6 边形中间；从向前起跳开始，连续不停跨越边线并回到 6 边形内；按顺序依次跳过 6 边，跳完 3 个循环 | 跳完 3 个循环时停表；可先做 1 次熟悉动作，然后完成 2 次测试取最好成绩；踩线一次加时 0.5 秒，跳错顺序一次加时 1 秒（p242） |\n| 预定位置灵敏性测试 | 测试网球运动员迅速、有效跑到预定位置能力（如发球上网） | 标记带；秒表；皮尺；网球场 | 1) 从底线中点出发，听口令后向双打边线冲刺，触摸边线上的桶标后返回底线中点（必须做模拟击球站位步法：反手击球站位，右脚在前的侧身站位）；2) 冲向单打边线触桶返回；3) 向右前方小对角线冲刺到单打边线与发球线交点处触桶返回；4) 向前冲刺触摸球网后返回；5) 向前方大对角线冲刺到单打边线与球网交点处触桶返回；6) 向左冲刺到单打边线触桶返回；7) 最后向左冲刺，冲出双打边线时停表（如图 1）（p242） | 使用电子门会更准确；桶标放置：一个在底线中点后 1.5 米，起点带放在电子门后 0.3 米处，终点电子门放在左边线上底线后 1.5 米处（p242） |\n\n#### 图1 灵敏性测试图（p243）\n\n（图示为“预定位置灵敏性测试”的跑动路线示意，编号 1-8。）\n\n#### 表19 国家高水平网球选手的灵敏性测试成绩标准（p243，单位：秒）\n\n| 年龄组 | 12 岁男组 | 12 岁女组 | 14 岁男组 | 14 岁女组 | 16 岁男组 | 16 岁女组 | 专业组男性 | 专业组女性 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 正手侧侧向移动（秒） | 2.70 | 2.63 | 2.66 | 2.83 | 2.47 | 2.42 | - | - |\n| 反手侧侧向移动（秒） | 2.76 | 2.83 | 2.75 | 2.85 | 2.52 | 2.58 | - | - |\n| 向后移动（秒） | 0.88 | 1.11 | 1.51 | 1.62 | 0.95 | 0.94 | - | - |\n| 六边跳测试（秒） | 13.4 | 12.8 | 12.7 | 12.2 | 12.1 | 11.8 | 10.9 | 10.4 |\n| 预定的灵敏性测试（秒） | 28.54 | 28.59 | 27.04 | 27.37 | 26.37 | 26.82 | - | - |\n\n---\n\n<a id=\"ch5_tactics_eval\"></a>\n## 第二节  技战术测试与评价（p243 起）\n\n一般情况下，青少年运动员应该在 13 岁之前就能够掌握各项网球技术，并确保没有明显的技术缺陷，为将来具备强有力的选项能力打下良好的基础。因此，我们只对 14 岁以下年龄进行测试与评价。由于技战术与心理密切不分，在此也融入部分心理素质。下面我们从三个不同的年龄段展开。教练可根据以下 4 种情况对运动员进行评价：A-能够做到；B-基本上能做到；C-还行；D-基本上不行。（p243）\n\n### 一、10 岁和 10 岁以下运动员\n\n#### （一）发球时\n\n1. 运动员已经或证明地掌握发球时的握拍；  \n2. 运动员已经或证明地掌握发球时挥拍前的姿势；  \n3. 运动员发球时有一个挥拍动作；  \n4. 运动员已经或证明地掌握发球时流畅的后仰和重心转移动作；  \n5. 运动员已经或证明地掌握挥臂和击球动作的协调；  \n6. 运动员在每个发球区均可将发球发向对方的正手和反手；  \n\n### 二、12 岁和 12 岁以下运动员（p245）\n\n#### （一）发球时\n\n1. 运动员能够或证明地使用全身（腿、髋、上体、手臂）的技能；  \n2. 运动员在发平击球和旋转球时能够将球发到任一发球区的任何区域；  \n3. 运动员能用发上旋球使球击出后产生弧形；  \n4. 运动员能够或证明地掌握用发侧旋球使球击出后看似上旋却弹向场外的技术；  \n5. 运动员能够或证明地掌握发球抢攻（尤其是正手）的技术。  \n\n#### （二）接发球时（p245，截图仅到第 2 条）\n\n1. 运动员已掌握在两侧回击速度快的发球的准备姿势；  \n2. 运动员已掌握向场内移动攻击力量小的发球；  \n\n#### （三）双方在后场时（p244）\n\n运动员有清晰的每种击球策略：  \n（1）知道何时进攻  \n（2）知道何时过渡  \n（3）知道何时防守  \n\n运动员已明显地掌握抽球的技术：  \n（1）正手击球  \n（2）反手击球  \n\n运动员已明显地掌握抽球时协调地使用全身（腿、髋、上体、手臂）的技能：  \n（1）正手击球  \n（2）反手击球  \n\n4. 运动员已明显地掌握抽球时大臂、小臂和手腕的协调以增加正手击球的力量  \n5. 运动员已掌握正手击球的挥拍动作具有使球产生最大且有效的加速力量  \n6. 运动员已明显地掌握速度能力与力量，提高手击球精准性和稳定性的正手握拍法（注意不宜多使用极端握拍法）  \n7. 运动员能够或证明地掌握在肩高处或在底线以内的来球：（1）正手（2）反手  \n8. 运动员能够或证明地掌握在处于被动时用以下打法抢分：（1）防守型上旋弧圈球（2）深前球（3）落击中路  \n9. 运动员能够或证明地掌握正手击球时：（1）打斜线（2）打直线  \n10. 运动员能够或证明地掌握反手击球时：（1）打斜线（2）打直线  \n11. 运动员已掌握小角度的、球路成弧形的正手击球技术  \n12. 运动员已掌握小角度的、球路成弧形的反手击球技术  \n13. 运动员能够或证明地掌握正、反手动能或证明地掌握单手握拍反手削球技术  \n14. 运动员已明显地掌握单手握拍反手削球正确使用非持拍臂的技术  \n\n#### （四）上网或在网前时（p244-245，截图仅显示开头与部分条目）\n\n1. 运动员已明显地掌握截击时的握拍法。  \n（⚠️ p244-245 本节其余条目在截图中未完整呈现）\n\n#### （六）心理技能/素质：成绩与自打好的发挥（p245）\n\n1. 运动员表现积极并喜欢打球  \n2. 运动员自始至终愿意艰苦训练，如从不让球落地两次  \n3. 运动员表现出对对手和教练员的尊重  \n4. 运动员在训练中自始至终 100% 地投入，精神上的投入（如各种算法）  \n5. 运动员在一定的练习或训练情况下能正确地对其发挥作出评价  \n6. 运动员在教练员不在场的情况下能有目的地进行练习，头脑中的目标明确  \n7. 运动员自始至终 100% 地努力：  \n  - （1）与水平较低的选手比赛时  \n  - （2）与水平较高的选手比赛时  \n  - （3）与水平较当的选手比赛时  \n  - （4）不论比赛的比分或比赛的形势如何  \n8. 运动员在以下情况下显示能坚持自己的常规动作：  \n  - （1）两分之间  \n  - （2）换发球或交换场地时  \n  - （3）比赛开始前  \n9. 运动员失分后心态稳定  \n10. 运动员在各种情形下表达的肢体语言和身体意象都是积极、自信的  \n11. 运动员和教练员商定目标，然后，运动员必须要在比赛中坚持出目标  \n12. 运动员不论比赛结果如何都能对自己的表现进行反思和思考  \n\n（p246-248 补充）\n\n### 二、12 岁和 12 岁以下运动员（续，p246-248）\n\n#### （三）双方在后场时（续，p246）\n\n1. 运动员已掌握在两侧回击速度快的发球的准备姿势（承接 p245）  \n2. 运动员已掌握向场内移动攻击力量小的发球（承接 p245）  \n\n（三）双方在后场时（补充条目，p246）：\n\n1. 运动员已明显地掌握小角度的正手击球。  \n2. 运动员正、反手击球时能够协调利用全身力量（腿、髋、上体、手臂）。  \n3. 运动员正、反手击球时拍头的速度都很快。  \n4. 运动员已掌握有效的上旋动作，能够在上升期击球。  \n5. 运动员能够正确地保持与底线的位置。  \n6. 运动员用以下击球法在对攻中抢出局面（即创造大量的进攻机会）：  \n  - （1）正手击球  \n  - （2）反手击球  \n7. 运动员能够或证明地掌握正确地使用假动作和击球上网，准备回击小球。  \n8. 运动员在反手削球时能使球下沉。  \n9. 运动员显然能正确练习用小弧高弧线的打法对付底线网球。  \n10. 运动员能够或证明地在练习用以下打法来应对对方参加加快的对攻：  \n  - （1）用正手在肩高处攻击底线以内的球  \n  - （2）用反手在肩高处攻击底线以内的球  \n  - （3）跑动中反攻时控制来球  \n  - （4）向场内移动，在底线以内击“上升期”的球  \n\n#### （四）上网或在网前时（补全，p246）\n\n1. 运动员在网前控制截击的动作正确。  \n2. 运动员能够或证明地在练习当发现对方处于被动时延续上网的打法（“趁天立即上网”）。  \n3. 运动员能够或证明地在练习用变空截击去回击对方网球。  \n4. 运动员能够或证明地在练习用以下打法从中场对付对方来球：  \n  - （1）准确击球  \n  - （2）击反弹球  \n  - （3）大力击球  \n\n#### （五）对方上网或在网前时（补全，p246-248）\n\n（p246）  \n1. 运动员显示能有效地运用：  \n  - （1）正手上旋高球  \n  - （2）反手上旋高球  \n2. 运动员显示有效地运用防守型挑高球。  \n3. 运动员显示有效地运用：  \n  - （1）正手穿越球  \n  - （2）反手穿越球  \n\n（p248）  \n1. 运动员能够准确大力击出斜线球：  \n  - （1）在正手位  \n  - （2）在反手位  \n2. 运动员能够准确大力击出直线球：  \n  - （1）在正手位  \n  - （2）在反手位  \n3. 运动员显示能正确使用重旋挑高的运用方法。  \n4. 运动员显示能用正、反手有效地挑上旋高球。  \n\n#### （六）心理技能/素质：成绩出自于好的发挥（补全，p246-247）\n\n（p246）  \n1. 运动员在练习和比赛中都感到快活。  \n2. 运动员对与任何水平的对手都表现出比赛的欲望（对比赛的心态）。  \n3. 运动员在每项练习中都能带着既定的目标或目的独立地进行训练。  \n4. 运动员在实战训练中显示出解决战术问题的能力。  \n5. 运动员在任何时刻都能自我激励。  \n\n（p247）  \n6. 运动员表现出对对手和裁判员的尊重。  \n7. 运动员了解自己的能力并能为成为更好的选手而坚持训练。  \n8. 运动员在训练/练习中始终全神贯注 100% 地投入：  \n  - （1）精神上的投入（即正确的全神贯注）  \n  - （2）体能上的投入  \n9. 运动员在下列情形中具有通过有效的情绪控制来保持和/或提高竞技水平发挥的能力：  \n  - （1）在势均力敌的情势下处于领先时（如：决胜盘 5-4 领先发球）  \n  - （2）落后于原以为能击败的选手（即失一盘，第二盘 0-2 落后）  \n  - （3）出乎意料地领先对手（即刚刚拿下了第一盘）  \n10. 运动员在以下情形中显示出始终如一的、自信的神韵形象（积极的肢体语言和自语）：  \n  - （1）比赛形势有利于运动员  \n  - （2）比赛形势不利于运动员  \n  - （3）比赛形势处于僵持状态  \n11. 运动员在以下情形中对得分和失分作出即时的积极反应：  \n  - （1）比赛形势有利于运动员  \n  - （2）比赛形势不利于运动员  \n  - （3）比赛形势处于僵持状态  \n12. 运动员在赛前保证要确定在比赛中发挥水平的目标。  \n13. 运动员与教练员和/或家长一起对比赛中是否达到为比赛所确定发挥水平的目标进行分析。  \n14. 运动员在以下情形中坚持自己的常规动作：  \n  - （1）两分之间  \n  - （2）换发球（交换场地）时  \n  - （3）比赛开始前  \n\n（p247，续）  \n15. 运动员在困难情况下能清晰地思考并找到解决办法。  \n16. 运动员能迅速适应新的情况。  \n17. 运动员敢于胜利。  \n18. 运动员敢于尝试采用不同的解决办法。  \n\n---\n\n### 三、14 岁和 14 岁以下运动员（p247 起，截图仅显示“发球时”部分）\n\n#### （一）发球时（p247）\n\n1. 运动员运用以下手段在一发时给发球带来一定性能变化：  \n  - （1）大力发球  \n  - （2）准确发球  \n  - （3）变化发球  \n2. 运动员使用发平击球、侧旋球和上旋球可将球发至任一发球区的任一区域（⚠️ 本条末尾方位描述在图中较小，按图尽力转写）  \n3. 运动员用发上旋球使球落地后突然改变方向，由左侧弹向右侧（或左上旋/侧旋的方向转换，⚠️ 方向细节需原书核对）  \n4. 运动员能够使用发侧旋球使球在空中成弧线并运动突然转向场外  \n5. 运动员发球之后，必要时使用以下手段攻击上网球：  \n  - （1）击落地球进攻  \n  - （2）发球上网  \n\n> ⚠️ p247 的“（二）接发球时”标题已出现，但条目未在本组截图中呈现。\n\n<a id=\"gaps-and-checks\"></a>\n## ⚠️ 缺口 / 待核对说明（已按情况重新归类）\n\n### A. 已有笔记但需要核对（截图不清 / 横向表格小字）\n\n这些内容**你已经做了笔记**，只是存在 `⚠️` 标记（信息不全或有小字不清），如你未来不打算补图，可保持现状不处理：\n\n- **p192–194**：旋转页导致阶段 4 参数与部分条目不清晰\n- **p199**：旋转页导致“最大力量训练”剩余练习条目未完整转写\n- **p202**：练习7「俯卧撑击掌」方法细节缺失\n- **p204**：练习3「双手后掷实心球」下半页缺失\n- **p207**：练习2「金字塔训练法 Pyramids」折返规则细节缺失\n- **p209**：「注意事项」标题后内容缺失\n- **p210**：颈部练习「练习2」句子后半部分被截断\n- **p219**：随机性灵敏训练引导句后的内容缺失\n- **p222**：练习4「双人双双出」详细描述字小\n- **p227**：练习15「单腿推拉瑞士球」截图仅半页\n- **p236–240**：部分测试表格/术语/单位为横向小字（如表6/表12/表15 的少量栏位）\n- **p241**：向后移动测试仅到引导句（操作细节缺失）\n- **p244–245 / p247**：技战术量表部分小节未被本组截图覆盖（例如 p247 “（二）接发球时”）\n\n### B. 未记录（你当时没有做笔记 / 未收录素材）\n\n以下是**明确写在正文中“照片未收录/未摘录”的缺口**。按你现在的要求，这类内容不需要补录，保留为空白即可：\n\n- **p176–177**：第 7–11 条照片未收录（正文已注明从第 12 条续接）\n- **p188–189**：多球训练第 16 条完整内容照片未收录（正文已注明）\n";

    function esc(s){ return (s||'').replace(/[&<>]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }
    function escAttr(s){ return (s||'').replace(/"/g,'&quot;').replace(/[&<>]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }
    function inline(s){
      let out = esc(s||'');
      out = out.replace(/`([^`]+)`/g, (_,a)=>`<code>${esc(a)}</code>`);
      out = out.replace(/\*\*([^*]+)\*\*/g, (_,a)=>`<strong>${esc(a)}</strong>`);
      out = out.replace(/\*([^*]+)\*/g, (_,a)=>`<em>${esc(a)}</em>`);
      return out;
    }

    const slugSeen = new Map();
    function slug(text, level){
      const base = (text||'')
        .replace(/\s+/g,' ')
        .trim()
        .replace(/[^\u4e00-\u9fa5A-Za-z0-9]+/g,'-')
        .replace(/-+/g,'-')
        .replace(/^-|-$/g,'')
        .toLowerCase();
      const key = `${level}:${base||'h'}`;
      const n = (slugSeen.get(key) || 0) + 1;
      slugSeen.set(key, n);
      return n === 1 ? `h-${base||'h'}` : `h-${base||'h'}-${n}`;
    }

    function mdToHtml(md){
      const lines = md.replace(/\r\n/g,'\n').split('\n');
      let html = '';
      let inCode = false;
      let inUl = false, inOl = false;
      let inTable = false, tableBuf = [];

      const flushList = () => {
        if(inUl){ html += '</ul>'; inUl=false; }
        if(inOl){ html += '</ol>'; inOl=false; }
      };
      const flushTable = () => {
        if(!inTable) return;
        const rows = tableBuf.filter(r => r.trim().startsWith('|'));
        const cells = rows.map(r => r.trim().replace(/^\||\|$/g,'').split('|').map(s=>s.trim()));
        if(cells.length >= 2){
          const head = cells[0];
          const body = cells.slice(2);
          html += '<table><thead><tr>' + head.map(c=>`<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>';
          body.forEach(r=>{
            html += '<tr>' + r.map(c=>`<td>${inline(c)}</td>`).join('') + '</tr>';
          });
          html += '</tbody></table>';
        } else {
          html += '<pre><code>' + esc(tableBuf.join('\n')) + '</code></pre>';
        }
        inTable=false; tableBuf=[];
      };

      for(const line of lines){
        const mCode = line.match(/^```/);
        if(mCode){
          if(inCode){ html += '</code></pre>'; inCode=false; }
          else { flushList(); flushTable(); inCode=true; html += '<pre><code>'; }
          continue;
        }
        if(inCode){ html += esc(line) + '\n'; continue; }

        const mAnchor = line.match(/^\s*<a\s+id="([^"]+)"\s*>\s*<\/a>\s*$/i);
        if(mAnchor){ flushList(); flushTable(); html += `<div id="${escAttr(mAnchor[1])}"></div>`; continue; }

        if(line.trim().startsWith('|')){ flushList(); inTable=true; tableBuf.push(line); continue; }
        else flushTable();

        const mH = line.match(/^(#{1,6})\s+(.*)$/);
        if(mH){
          flushList(); flushTable();
          const level = mH[1].length;
          const text = mH[2].trim();
          const id = slug(text, level);
          html += `<h${Math.min(level,4)} id="${id}">${inline(text)}</h${Math.min(level,4)}>`;
          continue;
        }
        const mBq = line.match(/^\s*>\s?(.*)$/);
        if(mBq){ flushList(); flushTable(); html += `<blockquote>${inline(mBq[1])}</blockquote>`; continue; }
        const mOl = line.match(/^\s*\d+\.\s+(.*)$/);
        if(mOl){
          if(inUl){ html += '</ul>'; inUl=false; }
          if(!inOl){ html += '<ol>'; inOl=true; }
          html += `<li>${inline(mOl[1])}</li>`;
          continue;
        }
        const mUl = line.match(/^\s*[-*+]\s+(.*)$/);
        if(mUl){
          if(inOl){ html += '</ol>'; inOl=false; }
          if(!inUl){ html += '<ul>'; inUl=true; }
          html += `<li>${inline(mUl[1])}</li>`;
          continue;
        }
        if(line.trim()===''){ flushList(); flushTable(); continue; }
        flushList(); flushTable();
        html += `<p>${inline(line)}</p>`;
      }
      if(inCode) html += '</code></pre>';
      flushList(); flushTable();
      return html;
    }

    function buildToc(){
      const heads = Array.from(E.doc.querySelectorAll('h2,h3,h4'));
      E.toc.innerHTML = '';
      const frag = document.createDocumentFragment();
      heads.forEach(h=>{
        const level = h.tagName === 'H2' ? 1 : (h.tagName === 'H3' ? 2 : 3);
        const a = document.createElement('a');
        a.href = `#${h.id}`;
        a.textContent = h.textContent.trim().replace(/\s+/g,' ');
        a.className = `lv${level}`;
        a.addEventListener('click', (e)=>{
          e.preventDefault();
          document.getElementById(h.id)?.scrollIntoView({ behavior:'smooth', block:'start' });
          setActive(h.id);
        });
        frag.appendChild(a);
      });
      E.toc.appendChild(frag);
    }
    function setActive(id){
      Array.from(E.toc.querySelectorAll('a')).forEach(a=>{
        a.classList.toggle('active', a.getAttribute('href') === `#${id}`);
      });
    }

    let blocks = [];
    function indexBlocks(){
      const nodes = Array.from(E.doc.querySelectorAll('h2,h3,h4,p,li,blockquote,td,th'));
      blocks = nodes
        .map(el=>{
          const t = (el.textContent || '').trim();
          if(!t) return null;
          const anchor = nearestHeadingId(el);
          return { el, text: t, anchor, kind: el.tagName.toLowerCase() };
        })
        .filter(Boolean);
    }
    function nearestHeadingId(el){
      let cur = el;
      while(cur && cur !== E.doc){
        if(cur.id && cur.tagName && /^H[234]$/.test(cur.tagName)) return cur.id;
        cur = cur.previousElementSibling || cur.parentElement;
      }
      return E.doc.querySelector('h2,h3,h4')?.id || '';
    }

    let lastHits = [];
    let hitPos = -1;
    function clearHighlights(){
      E.doc.querySelectorAll('mark.hl').forEach(m=>{
        m.replaceWith(document.createTextNode(m.textContent || ''));
      });
      lastHits = [];
      hitPos = -1;
      E.pillHits.textContent = '0';
      setNavVisible(false);
      E.results.classList.remove('show');
      E.resList.innerHTML = '';
      E.resCount.textContent = '0 条结果';
    }

    function highlight(el, tokens){
      const txt = el.textContent || '';
      const lower = txt.toLowerCase();
      if(!tokens.every(t=>lower.includes(t))) return false;
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
      const nodes = [];
      let n;
      while((n = walker.nextNode())) nodes.push(n);
      nodes.forEach(node=>{
        const v = node.nodeValue || '';
        const lv = v.toLowerCase();
        let ranges = [];
        tokens.forEach(tok=>{
          let start = 0;
          while(true){
            const i = lv.indexOf(tok, start);
            if(i === -1) break;
            ranges.push([i, i+tok.length]);
            start = i + tok.length;
          }
        });
        if(!ranges.length) return;
        ranges.sort((a,b)=>a[0]-b[0]);
        const merged = [];
        for(const r of ranges){
          if(!merged.length || r[0] > merged[merged.length-1][1]) merged.push(r);
          else merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], r[1]);
        }
        let out = '';
        let cur = 0;
        merged.forEach(([s,e])=>{
          out += esc(v.slice(cur, s));
          out += `<mark class="hl">${esc(v.slice(s,e))}</mark>`;
          cur = e;
        });
        out += esc(v.slice(cur));
        const span = document.createElement('span');
        span.innerHTML = out;
        node.replaceWith(span);
      });
      return true;
    }

    function search(query){
      clearHighlights();
      const q = (query||'').trim().toLowerCase();
      if(!q) return;
      const tokens = q.split(/\s+/).filter(Boolean).slice(0, 6);
      const scored = [];
      blocks.forEach(b=>{
        const lt = b.text.toLowerCase();
        if(!tokens.every(t=>lt.includes(t))) return;
        let score = 0;
        tokens.forEach(t=>{
          const m = lt.match(new RegExp(escapeRegExp(t),'g'));
          score += (m ? m.length : 0);
        });
        if(/^h[234]$/.test(b.kind)) score += 4;
        scored.push({ ...b, score });
      });
      scored.sort((a,b)=>b.score-a.score);
      const hits = scored.slice(0, 80);
      E.pillHits.textContent = String(hits.length);
      setNavVisible(hits.length > 0);
      renderResults(hits, tokens);
      hits.forEach(h=>highlight(h.el, tokens));
      lastHits = hits.map(h=>h.el);
      if(hits.length){ hitPos=0; focusHit(0); }
    }

    function renderResults(hits, tokens){
      E.resList.innerHTML = '';
      E.resCount.textContent = `${hits.length} 条结果`;
      const frag = document.createDocumentFragment();
      hits.forEach(h=>{
        const div = document.createElement('div');
        div.className = 'resItem';
        const title = h.anchor ? (document.getElementById(h.anchor)?.textContent || '定位') : '定位';
        const snippet = makeSnippet(h.text, tokens);
        div.innerHTML = `<div class="t">${esc(title)}</div><div class="s">${esc(snippet)}</div>`;
        div.addEventListener('click', ()=>{
          focusElement(h.el);
          E.results.classList.remove('show');
        });
        frag.appendChild(div);
      });
      E.resList.appendChild(frag);
      E.results.classList.add('show');
    }
    function makeSnippet(text, tokens){
      const lower = text.toLowerCase();
      let p = Infinity;
      tokens.forEach(t=>{
        const i = lower.indexOf(t);
        if(i !== -1) p = Math.min(p, i);
      });
      if(!isFinite(p)) return text.slice(0, 140);
      const start = Math.max(0, p - 40);
      const end = Math.min(text.length, p + 100);
      const s = text.slice(start, end).replace(/\s+/g,' ');
      return (start>0?'…':'') + s + (end<text.length?'…':'');
    }
    function focusElement(el){
      el.scrollIntoView({ behavior:'smooth', block:'center' });
      const hid = nearestHeadingId(el);
      if(hid) setActive(hid);
      el.animate([{ backgroundColor:'rgba(184,240,31,.22)' }, { backgroundColor:'transparent' }], { duration: 720, easing:'ease-out' });
    }
    function focusHit(pos){
      if(!lastHits.length) return;
      hitPos = Math.max(0, Math.min(lastHits.length-1, pos));
      focusElement(lastHits[hitPos]);
    }
    function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

    async function loadFromEmbedded() {
      const text = SOURCE_MD;
      slugSeen.clear();
      E.doc.innerHTML = mdToHtml(text);
      buildToc();
      indexBlocks();
      E.meta.textContent = '内部教材 · 部分摘录 · 禁止外传';
      E.title.textContent = '青少年网球教学训练大纲-读书笔记.md';
      E.sub.textContent = '科学训练 · 方能进步';
      E.content.scrollTop = 0;
      clearHighlights();
    }

    // Buttons are context-aware:
    // - Prev/Next/Clear only appear when search has hits
    // - Top only appears after scrolling down
    setNavVisible(false);
    setTopVisible(false);
    E.content.addEventListener('scroll', ()=>{
      setTopVisible(E.content.scrollTop > 140);
    }, { passive: true });
    E.btnTop.addEventListener('click', ()=> E.content.scrollTo({ top:0, behavior:'smooth' }));

    if (E.file) E.file.addEventListener('change', ()=>{
      const f = E.file.files && E.file.files[0];
      if(f) loadFile(f);
      E.file.value = '';
    });
    E.btnClear.addEventListener('click', clearHighlights);
    E.btnPrev.addEventListener('click', ()=> focusHit(hitPos-1));
    E.btnNext.addEventListener('click', ()=> focusHit(hitPos+1));
    E.btnClose.addEventListener('click', ()=> E.results.classList.remove('show'));
    E.q.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') search(E.q.value);
      if(e.key === 'Escape') E.results.classList.remove('show');
    });

    const spy = new IntersectionObserver((entries)=>{
      const vis = entries.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio);
      const top = vis[0]?.target;
      if(top && top.id) setActive(top.id);
    }, { root: E.content, threshold: [0.15, 0.35, 0.6] });
    function attachSpy(){
      spy.disconnect();
      E.doc.querySelectorAll('h2,h3,h4').forEach(h=>spy.observe(h));
    }
    const mo = new MutationObserver(()=> attachSpy());
    mo.observe(E.doc, { childList:true, subtree:true });

    // Boot (embedded markdown)
    loadFromEmbedded();
  </script>
</body>
