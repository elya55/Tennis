较重部位未充分调动，易发生拉伤和扭伤\n   - 准备活动量过大 → 进入正式比赛或训练时机体已疲劳，易发生拉伤和扭伤\n   - 准备活动距比赛或训练的时间过长 → 失去准备活动意义\n\n3. **技术上的缺点和错误** — 违反人体结构特点、各器官系统功能的活动规律及力学原理，易引起机体组织损伤；尤其是初学者和少年儿童，神经活动的兴奋和抑制过程不均衡，分化抑制的能力差，易发生因动作错误而造成的损伤\n\n4. **运动量过大（局部负担量过大）** — 运动量超过了人体可能承受的生理负担，尤其是局部负担量过大\n\n5. **身体机能状况** — 在睡眠或休息不好、带伤带病或伤病初愈、疲劳以及在激烈比赛和训练中，会因肌肉力量差、反应迟钝、身体协调性下降导致损伤\n\n6. **组织方法** — 教学、训练和比赛中是否切实遵守系统性、循序渐进和个别对待的原则，以及教练员是否能做到缺乏正确示范、耐心教导、缺乏认真保护、纪律要求不严、日程安排不当等\n\n7. **饮食状况不良** — 过度的控制体重，偏食零食，往往会造成热能摄入不足，维生素矿物质缺乏，体质较弱，身体素质差，因而易伤易病\n\n8. **场地、设备、服装** — 运动场地不平，有杂物，或场地过软过硬，运动时服装鞋帽不合体等\n\n9. **气象因素** — 气温过高易发生中暑和疲劳；气温过低易发生冻伤或出现肌肉僵硬、身体协调性下降易引起肌肉拉伤；潮湿高温天气使人大量出汗影响体内的水盐代谢，易发生肌肉痉挛或虚脱，光线不良影响视力，使人反应迟钝\n\n10. **心理因素** — 情绪低落、紧张、害怕都可导致肌肉张力增加、动作协调性下降、反应速度减慢，而发生损伤\n\n11. **身体素质差或存在某些薄弱环节** — 是导致损伤发生的内在因素，须引起广大教练员、运动员的高度重视\n\n#### （二）运动损伤的预防\n\n1. **加强思想教育** — 加强安全教育、纪律性教育，加强防伤意识，养成良好体育道德等\n2. **合理安排训练** — 根据运动员的年龄、健康状况和运动技术水平安排训练；事先做好预防；提高身体素质，使运动员掌握正确动作技术要领；避免运动器官局部负担过重；合理安排伤后的运动训练；学习新动作时要循序渐进；安排训练内容时，要避免\"单打一\"的训练模式，遵循区别对待的原则\n3. **做好充分准备活动** — 目的是提高中枢神经系统兴奋性、加强条件反射性、克服各种功能惰性、提高组织温度、改善血液循环增加肌肉的力量和弹性，为正式训练做好准备\n4. **全面发展身体素质，加强易伤部位的训练**\n5. **加强医务监督与运动场地的监督管理** — 定期对运动员进行检查，严禁运动员带伤、带病参加比赛和训练；身体有不良反应时，要认真分析原因，并及时采取措施\n6. **在合理营养的前提下，获得理想体重**\n7. **及时消除疲劳、放松肌肉，预防延迟性肌肉酸痛，保证肌肉处于良好功能状态**\n\n---\n\n### 二、急性闭合性软组织损伤的症状、处理方法（p11）\n\n> 急性闭合性软组织损伤，如关节韧带扭伤、挫伤、肌肉拉伤等是运动损伤中最常见的损伤，根据损伤可以分成三个阶段或三个时期。\n\n#### （一）第一阶段：急性炎症阶段（伤后 24–72 小时）\n\n**症状：** 当软组织损伤（扭伤、拉伤或挫伤）发生时，会出现细胞和软组织结构破裂、肿胀和血管损伤。绝大多数运动损伤都以炎症反应为特征，包括疼痛、发红、肿胀和局部温度上升。\n\n**处理方法（RICE原则）：**\n\n| 步骤 | 英文 | 要点 |\n|------|------|------|\n| 休息 | Rest | 立即中断运动直至对损伤做出准确评估，继续运动会加重损伤程度 |\n| 冰疗 | Ice | 小范围采用冰按摩；冰浴；冰裹法（临场应用和大面积损伤）；化学冰法温度更低但使用时应在皮肤上垫一层布或包扎物以防冻伤。**冰疗每隔1–2小时进行20分钟，在受伤后期48小时之内采用** |\n| 加压 | Compression | 应在冰疗之间或之后采用；绷带应从肢体远端向近端牢固包扎，每一层绷带应有一半宽度前后重叠；冰裹法可在加压包扎的一层绷带上进行 |\n| 抬高肢体 | Elevation | 受伤部位应升高至心脏水平线上 |\n\n#### （二）再生和修复阶段（弹性纤维和胶原形成阶段，伤后48小时至6星期）\n\n> 此阶段，成纤维细胞开始合成瘢痕组织。应避免因为疼痛的消退会在受伤组织未恢复前训练和比赛。\n\n**1. 物理治疗方式**\n\n- 此阶段物理治疗的益处最大\n- 热疗可增加温度、血流和软组织的伸展性；热敷法、发热灯、热水疗法和石蜡浸泡法都可用来增加组织温度\n- 超声和短波透热法可进行深层热疗；超声可提高愈合过程中韧带的张力\n- 电刺激可以加强运动单位的募集，有利于肌肉能力恢复\n\n**2. 体疗练习**\n\n- **(1) 柔韧性练习** — 在安排康复训练中，应优先恢复柔韧性；组织温度升高后再进行伸展练习能取得更好效果，这种练习需要人的帮助；要求每天完成所有主要身体部分的伸展练习\n- **力量练习** — 从无关节动作（静力训练）→ 逐渐向不同关节角度下的随意收缩过渡 → 过渡到最大力量随意收缩 → 再过渡到重力负荷（训练者施加阻力）→ 最后过渡到自由重量练习、\"等动\"练习\n- **(2) 有氧能力训练** — 蹬车（定位）、游泳和划船可提高有氧能力和促进关节完全动作范围的恢复；应考虑练习种类、强度（最大心率的60%–80%）、持续时间（能够忍受的20–60分钟）和频度（每星期3–5次）\n\n**3. 减少粘连，改善瘢痕组织机能**\n\n- 在结疤的成熟阶段，适当进行活动，并牵拉瘢痕组织，可影响瘢痕组织最终的形态和机能；牵拉的刺激可使原有的瘢痕组织纤维平行排列，并表现出更好地弹性，它的丰富摺皱具有活动性，并且不会引起刺激或疼痛；活动及牵拉并不能消除结疤组织，但有助于恢复它的正常性质\n- 在伤后的第二阶段，适时对伤部进行按摩，有助于减少瘢痕组织，改善瘢痕组织的机能\n\n#### （三）重建塑型阶段（伤后3星期至12个月）\n\n> 胶原重建为标志，进而恢复肌肉、肌腱和其它组织的机能。\n\n- 处理原则：增强和恢复关节肌肉的功能，继续改善身体机能和提高素质训练，恢复运动技能和防止进一步损伤\n- 在这个阶段，运动员重新执行教练员的训练计划，进行身体、技术、战术训练和心理准备；健康专家和教练员间的信息交流非常关键；专项练习方法、手段和技术训练须根据损伤的严重性和前两个康复阶段情况逐步开展；医生应参与到训练课并评估运动员的机能恢复状况\n- **重返比赛是康复的最终目标**；但在允许运动员参加比赛之前，要求考虑：运动员症状消失、柔韧性正常、加强全面身体素质、有足够的力量（未受伤一侧的90%）和运动表现良好；另外，为了防止重复损伤应训练\n\n---\n\n### 三、肌肉拉伤（p13）\n\n> 在运动过程中，由于训练水平不够；准备活动补充分，肌肉的生理机能尚未达到适应运动所需要的状态，肌肉的伸展性、弹性、力量差；疲劳负荷过度使肌肉机能降低力量减弱、协调性下降；技术动作错误、动作过于猛或粗暴；以及气温过低、气湿太高、场地不良等原因都可引起肌肉拉伤。此外，原动肌与拮抗肌的肌力失调，也是肌肉拉伤的潜在致因。\n\n#### （一）症状\n\n伤部疼痛、肿胀、局部有压痛、肌肉紧张或痉挛，触之发硬，功能障碍。当受伤肌肉主动收缩时，疼痛加重，肌肉抗阻力试验阳性。如系肌肉断裂，受伤时可感到或听到断裂声，肿胀明显，皮下淤血严重。断裂严重或全部断裂时，局部可触到凹陷或一端异常膨大。\n\n根据拉伤严重程度分为：\n- **轻度（一度）** — 仅有很少肌纤维撕裂，组织炎症反应应水平低，肿胀及运动时不适感觉不明显，没有或很少力量素质丢失活动受限；另外，轻微的肌肉拉伤也会使运动员感到很痛苦\n- **中度（二度）** — 肌肉有实质性损害，肌肉虽没有完全断裂，但力量素质明显下降\n- **重度（三度）** — 指肌肉肌腱结合部完全断裂，功能完全丧失\n\n#### （二）处理\n\n**1. 损伤即刻的治疗**\n\n- 伤后即刻的治疗包括制动、冰疗、加压包扎和抬高肢体\n- 尽快开始加压包扎，要求：皮肤压力约为 85mmHg，以避免免或有效减少肌肉间隙血肿形成\n- 实施冰疗（冰袋）每次 15–20 分钟，间隔 30–60 分钟\n- 抬高肢体减少受伤部位出血，而增加静脉血液向心脏回流\n- 伤后休息 1–3 天，按摩在受伤一周后方可开始（严重的肌肉损伤要 10–14 天后开始）\n\n**2. 受伤 3 天以后的处理**\n\n经过最初的治疗后，较小的部分撕裂和较轻的肌肉间血肿应使用弹性绷带来保护，并对受伤肌肉进行肌肉功能锻炼为主的保守疗法：\n- **第一步** — 在不增加症状的前提下进行静力练习；要求在不增加疼痛的前提下增加负荷（有时疼痛只出现在增加负荷的最初阶段）\n- **第二步** — 不负重或负重动力训练，训练须十分小心和有控制地进行\n- **第三步** — 尽早开始负荷较轻的动力训练应\n- **第四步** — 进行以热疗为主的理疗；热疗同时，谨慎进行不产生疼痛的主动或被动拉伸练习；目的是使瘢痕组织仍有弹性时，有效预防功能的减退。在保证拉伸练习无痛的前提下，逐渐扩大拉伸的幅度，拉伸的时间由开始的10–15秒逐渐延长到1分钟；伤后进行力量练习时，要牢记准备活动的重要性；力量训练应当是全方位的，并应与伸展练习结合\n- **第五步** — 肌肉完全断裂者，尽快进行局部包扎，固定患肢，及时送医院进行手术缝合\n\n#### （三）肌肉拉伤的预防\n\n肌肉拉伤的预防比肌肉拉伤的治疗更重要。肌肉拉伤一旦发生，受伤的肌肉组织往往不能完全再生，而由瘢痕组织来取代，而瘢痕组织必然产生一定程度的牵缩，造成肌肉的韧性、伸展性、弹性降低，很容易再损伤。\n\n预防措施：\n1. 了解网球各个项目肌肉拉伤的发生规律\n2. **加强身体训练** — 身体训练是使肌肉发达，血管增生、循环改善，为肌肉做功提供更多营养物质而不易疲劳的重要途径；力量训练可以提高了能量的输入和增加了能量的储备，而阻止了损伤发生\n3. **合理安排训练** — 应遵循循序渐进、区别对待、全面训练的原则，避免因局部肌肉负担过重而产生慢性疲劳及肌肉僵硬\n4. **在技术成熟后，要有持续性的力量和素质练习** — 各主要肌群的力量练习，每周不少于两次；对抗肌之间的力量必须平衡，如果骨四头肌力量超过大腿后群肌力量10%以上，就会增加在最大负荷时后群肌拉伤的危险\n5. 定期安排离心力量练习，其时间间隔同上\n6. **充分作好准备活动** — 准备活动的量应根据个人的机能状况、气象条件、教学训练的具体情况而定；在兴奋性较低或气温较低时，准备活动的时间应适当延长；一般以身体发热、微微出汗为宜\n7. **重视整理活动，及时放松肌肉，以保持肌肉的良好状态** — 整理活动要在身体微微出汗的前提下，进行PNF练习或静力牵伸练习\n8. **重视发展项目所需的柔韧性** — 发展柔韧性应以静力牵伸练习为主（将肌肉韧带伸展至最大限度，并保持30秒至1分钟，重复2–3次）\n9. **积极治疗** — 拉伤后的康复训练，是预防由于恢复不足而导致再次损伤的一种重要方式；康复时要配合进行按摩、理疗、热水浴、针灸或点穴；运动员直到完全没有症状、伸展性已恢复到伤前水平、肌肉力量达到受伤前的90%以上，才能停止康复计划，转入正常训练\n\n---\n\n### 四、韧带扭伤（p14）\n\n> 关节韧带扭伤是在外力作用下关节发生超长范围活动而造成关节内外侧韧带损伤。轻者只有少量韧带纤维撕裂，重者部分韧带纤维撕裂，严重者可使韧带纤维完全断裂，引起关节半脱位或全脱位，同时合并关节内滑膜和软骨损伤。四肢关节中最易损伤的是踝关节和膝关节，其次是腕、肘、肩。\n\n#### （一）原因\n\n1. 训练水平低，局部肌肉力量差、韧带薄弱、协调性差，关节稳定性差或身体状况不良，对外力作用的耐受能力及自我保护能力差\n2. 运动场地有缺点，如场地不平、地面过滑、垫子对接不齐等\n3. 训练中踩在别人脚上，或受到碰撞，都可引起踝关节及漆关节扭伤\n\n#### （二）症状\n\n局部疼痛、肿胀，若伤及皮下血管，则出现皮下淤血，皮肤青紫。关节功能障碍；局部有明显压痛，牵拉受伤韧带时疼痛加重，如韧带完全断裂可出现关节松动或出现关节的超长范围活动。\n\n- **膝关节扭伤时**，要特别注意有无膝关节松动和关节绞锁。如果膝关节向内外侧的活动幅度增加，说明内侧或外侧副韧带断裂；如膝关节前后活动的幅度加大则说明十字韧带断裂；如出现绞锁现象，则表明有半月板损伤。\n- **踝关节扭伤时**，踝关节如有超长范围的内、外翻活动及关节的前后撼动，表明踝关节韧带完全断裂。\n\n#### （三）处理\n\n- 单纯性的关节韧带扭伤可按闭合性软组织损伤处理，原则与方法如前所述（见本章）\n- 如韧带断裂，应尽早到医院进行手术缝合或固定处理，若伤后一周还未进行手术或固定，断裂的韧带就会萎缩，严重影响愈合效果\n- 当关节的肿胀和疼痛减轻后，在不增加疼痛的原则下，应尽早开始功能锻炼，以防止组织粘连，促进恢复\n- 避免扭伤后因处理不当或过早恢复正常训练，造成急性损伤变为慢性损伤；伤后要及时处理，合理安排功能训练，开始活动时要循序渐进，带上保护支持带\n- 严重的踝关节扭伤后除进行一般的功能锻炼外，应着重强调本体感受功能的练习和小肌肉群力量练习（如负重提踵、足内外侧行走、慢跑或在专门的练习器上练习），提高自我保护能力，避免形成习惯性扭伤\n\n#### （四）预防\n\n1. 加强关节周围肌肉力量、柔韧性和协调性练习\n2. 加强运动场地的医务监督\n3. 运动前充分做好准备活动\n4. 熟练掌握必要的运动技术\n\n---\n\n### 五、疲劳性骨膜炎（p15）\n\n> 疲劳性骨膜炎又称应力性骨膜炎，是一种过度使用性损伤。常见于胫、腓骨和跖骨，也可见于尺、桡骨。\n\n#### （一）原因\n\n由于剧烈活动时，肌肉附着部的骨膜长期受到牵拉使该部骨膜组织松弛或分离，骨膜充血、淤血和水肿，血管扩张，血球溢出至骨膜下，形成骨膜炎。儿童少年在发育阶段，骨承重时骨膜反应较成年人明显，因此发病数较多。\n\n#### （二）征象\n\n1. **疼痛** — 常在运动后发生，多为局部钝痛或刺痛，有的在训练后可出现搏动样疼痛；腓骨骨膜炎疼痛多在离下端10厘米附近；胫骨骨膜炎的疼痛常位于中下1/3内侧缘及前骨面；跖骨骨膜炎常见于第二或第三跖骨部\n2. **肿胀** — 局部多有凹陷性水肿，早期肿胀面积较大\n3. **压痛** — 为骨膜炎的主要特征；在骨面上能摸到压痛点，有的较局限，有的较分散；其压痛部常可触及单或串珠样结节\n4. **后蹬痛或支撑痛** — 胫腓骨骨膜炎和跖骨骨膜炎患者常有后蹬痛；发生在尺、桡骨骨膜炎患者有支撑痛\n5. **局部灼热** — 早期可有局部皮肤发红，触之有灼热感；有的患者夜间灼热感更明显\n6. **X线检查** — 早期骨膜无明显改变，以后逐步出现骨膜增生，骨皮质边缘粗糙、增厚、骨质疏松、骨纹理紊乱等\n\n#### （三）处理\n\n- **早期或症状轻者** — 应适当减少局部运动量，调整训练课内容；伤肢局部以弹性绷带包扎；随着训练负荷的提高，经3–4周后症状可自行消失\n- **症状严重者** — 除减少局部负荷外，可先用冰敷，然后外敷新伤药并加压包扎；1周后改用温水浸浴配合按摩治疗，点压阿是穴和附近的穴位；亦可用紫外线照射患处，以加速异位骨化；待症状缓解后，逐步增加局部负荷，但仍应避免单一的、长时间的跳跃或支撑动作\n- 经以上处理后，如局部症状无改善或加剧者，需作X线摄片加以确诊是否有疲劳性骨折\n\n#### （四）预防\n\n训练中遵守循序渐进的原则，防止突然连续地加大运动量，避免长时间过分集中的跑、跳、后蹬、支撑等练习。训练前做好充分准备活动，训练后可采取自我按摩或其它放松练习，使肌肉放松，减少对骨膜的牵拉。\n\n---\n\n### 六、急性腰扭伤（p16）\n\n> 由于腰部用力超过腰部软组织（肌肉、筋膜、韧带等）的生理负荷量所造成程度不同的纤维断裂或小关节微动错缝，称为急性腰扭伤。\n\n#### （一）原因\n\n1. 负重超过所能承受的范围，可发生腰部肌肉和筋膜的撕裂伤\n2. 在训练中，动作（姿势）不正确\n3. 腰部的过伸或过屈活动，超越了脊柱的功能范围，可导致棘间韧带损伤或棘突骨膜夹\n\n#### （二）征象\n\n有明显的受伤史，严重受伤时有撕裂感。伤后腰部有不同程度的肿胀、疼痛和皮下瘀斑。轻者双手叉腰缓行，重者需他人搀扶行走。咳嗽、喷嚏时疼痛加重，疼点可向腰骶沟和骶后部放射。脊柱出现侧弯，腰曲减小或消失。伴有腰部活动障碍和肌肉痉挛，筋膜僵硬。\n\n疼痛和动作的关系：腰背肌拉伤，在弯腰和侧屈时疼痛；棘上韧带损伤者，过伸、过屈脊柱时可感疼痛，而侧屈时疼痛不明显；损伤的局部一般有明确的压痛点，肌肉损伤以第三腰椎横突压痛明显；而棘突发炎和棘上韧带损伤则以腰背部中线棘突和棘间隙压痛明显。\n\n#### （三）处理\n\n- 急性疼痛期应卧床休息，腰部垫一薄枕以便放松腰肌；也可与俯卧位相间交替，避免使受伤组织再受牵扯；轻度扭伤2–3天，较重扭伤需休息1周左右\n- 按摩对腰扭伤效果较好：患者俯卧位，脚下垫枕，使腰部放松，以舒活酒作擦摩，用掌根作揉、推压、按压等手法，力量逐渐由轻到重，然后在压痛部位进行分筋、理筋、按压、叩打，以及指针阿是穴、环跳、委中、肾俞等穴；阿是穴采用针刺，得气后留针半小时，有非常满意疗效\n- 此外，外贴活络止痛膏，内服活络止痛药，火罐疗法、理疗及局部封闭均有较好疗效\n\n#### （四）伤后训练\n\n急性腰扭伤后，应卧床休息至疼痛减轻。然后，逐渐采用仰卧、踝背伸、直膝举腿（屈髋）内收；仰卧，屈膝\"拱桥\"（将腰臀部抬起）；踝跖屈、腰腿后伸引体向上；仰卧，抱膝压腹和站立位左右旋腰等使用。受伤两周左右可开始参加非对抗性的练习，但应确保在无痛情况下进行活动或活动后疼痛未加重。损伤组织通常需要3–4周方能愈合，并能参加正规训练。\n\n#### （五）预防\n\n加强腰背肌力量练习；充分做好准备活动，经常对腰部进行自我按摩。\n\n---\n\n### 七、网球运动中膝关节急性损伤（p17）\n\n#### （一）原因\n\n1. **内侧副韧带损伤** — 膝关节屈曲（约130–150度），小腿突然外展外旋或足及小腿固定，大腿突然内收内旋，可使内侧副韧带损伤；如变向移动时，单侧小腿于外展外旋重重，身体重心推失去平衡等均可造成损伤；严重扭转力会使韧带完全断裂合并内侧半月板撕裂、前十字韧带损伤\n\n2. **十字韧带损伤** — 膝关节处于半屈曲位，突然完成旋转及内收、外展动作是其损伤重要的机制；十韧带的单独损伤并不少见，常合并内侧副韧带或半月板损伤\n\n3. **半月板损伤** — 如果膝关节在半屈位，小腿外展外旋或内收内旋的同时突然伸直，半月板来不及回到原来的位置，就会使半月板夹在股骨髁和胫骨平台之间，受到急剧的研磨、拧转，可直接导致半月板撕裂\n\n#### （二）诊断\n\n1. **膝关节疼痛** — 膝部某处常突然疼痛，但往往立即减轻，能继续坚持比赛，比赛后疼痛加重，能持重、行走；如受伤时，膝内有响声，同时伴有局限性撕裂样剧痛，患肢不能持重，不能行走，可能发生韧带完全断裂或膝关节联合损伤\n\n2. **膝关节肿胀** — 膝关节肿胀较轻，局限于某一处；如果韧带完全断裂，则局部肿胀较大，并有皮下淤斑；联合损伤者，迅速发生全膝关节肿胀，膝关节的周径增大，关节周围可见皮下淤斑，浮髌试验阳性，甚至小腿出现凹陷性浮肿\n\n3. **膝关节压痛** — 膝关节内侧近股骨内上髁处局限性压痛为内侧副韧带扭伤；膝关节外侧近腓骨小头处局限性压痛可能为半月板的边缘损伤；髌韧带两侧的压痛可能为半月板的前角损伤；半月板的内缘或后角损伤、十字韧带损伤，都靠近膝的中央部，不容易查到压痛点；如果在压痛点处扪到局部组织有缺损性凹陷，多为韧带完全断裂\n\n4. **膝关节活动障碍** — 急性膝关节损伤后，膝关节周围肌群肌痉挛，使膝关节处于轻度屈曲位置，但能主动缓缓将膝关节伸或届至正常范围；半月板损伤或十字韧带损伤者，当时即有膝关节不稳，膝部软弱无力，甚至倒在地上，不能完成正在进行的动作和持重行走\n\n5. **膝关节交锁** — 膝关节关节交锁见于半月板部分撕裂、十字韧带断裂、关节鼠形成（游离的关节内软骨）、内侧副韧带断裂端嵌顿在关节间隙而引起；关节交锁的表现为，偶然一次膝关节屈伸活动中，突然\"卡住\"于半伸或半屈状态\n\n#### （三）处理\n\n1. **轻微侧副韧带损伤** — 疼痛较轻，肿胀不明显，侧向运动试验无异常，无关节屈伸功能障碍者，置患膝于微屈曲位，停止活动2–3天，外敷活血止痛中药；用舒适酒作按摩治疗；由患处远心向近心作推摩，大小腿肌肉用揉捏法；每日练习直膝抬腿及负重直抬腿、抗阻直膝抬腿2–3次，总时间约40–50分钟；方法：步行锻炼、恢复本体感受功能的练习及稳定膝部的力量练习\n\n2. **较重的侧副韧带损伤** — 患处有较明显的肿胀，患膝呈半屈曲位，伸届功能受限，侧向运动试验无明显异常，但患膝有疼痛加剧倾向的病例，早期治疗着重于止血、止痛和保护受伤韧带不致进一步加重损伤；2–3天以后去除压迫材料，开始按摩治疗，按摩方法与轻微扭伤同，隔日1次；亦可配合外敷和内服活血散淤、消肿止痛中药或理疗，继续托板固定；与此同时，应开始每日作2–3次股四头肌静力收缩（绷颈），伤后10天左右可加大按摩力量，增加按摩手法，增加直膝抬腿练习并逐渐过渡到负重直膝抬腿练习，同时仍可配合外用和内服舒筋活络中药；2–3周以后解除托板固定，开始练习走路，继续按摩治疗，并开始练习膝关节屈伸运动，逐渐过渡到屈曲位抗阻力伸膝练习；此后，加入恢复本体感受功能的练习，其方法同上；刚恢复走路时，用粘膏支持带进行保护\n\n3. **十字韧带不完全断裂或完全断裂** — 均可先用长腿托板固定患膝于30度（伸直为0度）位6周；固定期间与解除固定后的按摩治疗和功能练习原则上与较重的扭伤相同；十字韧带断裂，时间不超过1周者，立即手术缝合为好\n\n4. **半月板损伤** — 急性期要待急性期症状缓解后再进行检查；急性期可参照重度扭伤处理；如有\"交锁\"征，必须\"解锁\"后固定；如系半月板边缘破裂沿有自愈可能；侧副韧带完全断裂合并十字韧带断裂、半月板损伤的病例应立即加压包扎与固定制动，转送到专科医院作进一步诊治；如需手术治疗，最好在1周之内，最迟不宜超过2周\n\n---\n\n### 八、踝关节扭伤（p18）\n\n#### （一）原因\n\n常由于场地不平，碰撞或因跳起落地时失去平衡，或不慎踩在他人足上，均可使踝关节过度内翻、跖屈或外翻造成踝关节韧带损伤。严重的踝关节扭伤，可发生韧带断裂，或伴胫腓下联合韧带损伤和撕脱骨折，以致胫腓联合分离，距骨向外侧移位。\n\n#### （二）征象\n\n有明显的踝足突然跖屈、内翻或外翻的扭伤史，损伤后踝关节外侧或内侧疼痛，走路和活动关节时最明显。踝关节外侧或内侧出现迅速的局部肿胀，并逐渐波及踝前部及足背，可出现皮下瘀斑，以伤后2–3天最明显。\n\n检查时，局部有明显压痛：\n- 距腓前韧带损伤，压痛点在外踝前下方\n- 距腓韧带损伤，压痛点在外踝尖偏后约1厘米处\n- 三角韧带损伤，压痛点在内踝前下方或内踝尖下方\n- 踝关节被动内、外翻时疼痛加重\n- **踝关节前抽屉试验**：检查者一手握住小腿，另一手握足跟在踝稍跖屈位，使距骨向前错动，如果有距骨前移位为阳性，说明有距腓前韧带断裂\n\n应注意检查和鉴别是否同是合并有第5跖骨粗隆骨折、伸趾短肌损伤或内踝撕脱骨折等。\n\n#### （三）处理\n\n- 伤后立即给予冷敷、加压包扎、抬高患肢、固定休息、外敷新伤药\n- 固定时应将损伤韧带置于松弛位，即外侧韧带损伤固定于外翻位，反之亦然\n- 疑有踝关节韧带完全断裂或合并有踝部骨折者，经现场急救处理后，及时转送医院诊治\n\n#### （四）伤后训练\n\n- 急性期应抬高患肢，固定休息\n- 肿痛减后，即应在粘膏支持带或弹力绷带固定下着地行走或扶拐行走\n- 1–2周后可进行肌肉力量练习\n- 外侧副韧带损伤时应着重腓肠骨肌练习，内侧副韧带损伤时着重胫骨后肌的练习\n\n#### （五）预防\n\n训练或比赛前做好充分的准备活动，搞好场地设施，培养和提高自我保护能力，提高足踝部的肌肉力量和踝关节的稳定性、协调性。对易伤者，训练和比赛时应戴保护支持带。\n\n---\n\n<a id=\"ch1_s5\"></a>\n## 第一章 · 第五节 · 不同年龄阶段训练要求（p20）\n\n> 表1-7：不同年龄阶段儿童少年网球运动员训练特点、参赛要求表\n\n### 各阶段概览\n\n| 项目 | 初学者阶段 | 基础学习阶段 | 青少年训练阶段 | 青年中级选手阶段 |\n|------|-----------|------------|-------------|---------------|\n| **年龄** | 6–9 岁 | 10–12 岁 | 13–15 岁 | 16–18 岁 |\n| **比赛:训练比例** | 30:70 | 50:50 | 55:45 | 65:35 |\n| **每年参赛次数** | 4 次 | 9 次 | 11 次 | 20 次 |\n\n### 各阶段训练目的\n\n**6–9 岁（初学者阶段）**\n让儿童喜欢球、学会打球，成功地打球。使他们了解网球，并参与其中。让他们关注技术方面的内容，不是比赛结果。\n\n**10–12 岁（基础学习阶段）**\n发展完整的技术、身体和比赛技能。重点应该放在技术上。允许孩子尝试不同的发球接法，探索自己的风格，发展身体素质。\n\n**13–15 岁（青少年训练阶段）**\n掌握在各种比赛情况下运用技术、战术的能力，具备参加比赛的能力。提高比赛意识。\n\n**16–18 岁（青年中级选手阶段）**\n提高专项训练，增强体能。理解各种战术，掌握自己的打法风格，并加以完善。\n\n### 各阶段训练重点\n\n**6–9 岁**\n- 技术：学习基础握拍、击球动作，不可要求太多\n- 体能：以游戏为主，发展基本协调性和球感\n- 参赛：以参与为主，不注重比赛结果；每周训练次数少，比赛为辅\n\n**10–12 岁**\n- 技术：系统学习各种基础技术，开始学习正手、反手、发球等全套动作；20米底线对打为主，初步建立正确技术框架\n- 体能：发展基础体能，开始有针对性的专项体能训练\n- 参赛：每周训练30次以上（含球感练习）；参加15次以下的比赛，重点仍在技术提升\n\n**13–15 岁**\n- 技术：在各种比赛情况下运用技术的能力；20米底线为主，能有效地在比赛中运用，拥有一定的自信\n- 体能：提高专项体能，针对网球动作链进行系统力量训练\n- 战术：掌握基本单打/双打战术意识，发展比赛策略\n- 参赛：每年50次比赛；每周30次以上训练；对抗性更强\n\n**16–18 岁**\n- 技术：完善个人技术特点，形成自己的打法风格；20米底线对打能力成熟\n- 体能：进入高强度专项体能训练阶段，提高爆发力、速度和耐力\n- 战术：理解并运用各种复杂战术，形成个人战术体系\n- 参赛：每年70次比赛；每周国内训练5次以上；参加高水平赛事\n\n---\n\n<a id=\"ch2\"></a>\n## 第二章  技术训练（p22 起）\n\n> 本章有部分小节未摘录。\n\n<a id=\"ch2_s1_rot\"></a>\n## 第二章 · 第一节 · 三、球的旋转（p43）\n\n### （一）旋转的基本原理\n\n**1. 为什么用旋转？**\n1. 帮助控制球\n2. 防止球飞出去过高而造成失误\n3. 现代网球技、战术需要旋转（如产生角度、破网等等）\n4. 现代的设备和不同的球场地面使旋转更具威胁\n\n**2. 旋转的作用是什么？**\n1. 旋转通过空气改变球的转动（马格努斯效应：球旋转时一侧气流加速→低压，另一侧减速→高压，球向低压侧偏转）\n2. 旋转改变球的飞行轨迹\n3. 旋转改变球的弹跳\n4. 旋转改变球弹跳后的飞行轨迹\n\n> 以Andy Roddick的一发（平击）和二发（上旋）轨迹对比，以及Roger Federer的反手削球（下旋）和正手击球（上旋）的轨迹对比，可直观看出旋转对飞行路线和落点的影响。\n\n### （二）底线击球中的旋转（p44）\n\n在底线击球中基本上有两种类型的旋转：\n\n| 旋转类型 | 拍子运动方向 | 挥拍方式 |\n|---------|-----------|---------|\n| **上旋** | 球拍从低处开始，击完球后高于击球点 | 由下而上的挥拍动作 |\n| **下旋/侧旋** | 球拍从高于击球点向下挥动，完成该动作时球拍低于击球点 | 从上向下的挥拍动作 |\n\n### （三）上旋球的优点\n\n1. **控制** — 打上旋球的主要优点是可使球过网较高，而又能落在底线以内\n2. **速度** — 对于击球速度快的选手上旋是非常重要的，因为球越快越易出界\n3. **弹跳高** — 上旋击球使球落地后反弹角度高，这可使球起跳很高\n4. **弹跳快** — 当初速度和射角相同时，上旋球比平击球或下旋球的弹跳快，使对手不好回击；上旋球不会像其它击球方法那样使球变慢（因为球在飞行途中是旋转的，这降低了球场地面对球的摩擦力）；有时当击球的实际速度较慢但旋转大时，球在落地后向前速度也可以得到提高（如上旋高球）\n5. **时间** — 无论上旋球是打向对手阻止对手随球上网，还是破网，对手都很难判断上旋球的时间，因为它下降速度快\n6. **深度** — 打上旋球可以很容易地把对手困在底线，因为上旋球弹跳高并且常可落到球场深区\n\n### （四）上旋球的不足\n\n1. **时间** — 打上旋球时非常难掌握时间；球拍在击球范围内的时间过程很短，因为拍头在向上的运动过程中非常快；当接对方快速来球时，这点尤其明显；因此它可使击球难于准确\n2. **低球** — 由于打上旋球的方法是拍头从下向上的运动，球拍开始的位置是从低于击球点的位置开始，因此将球拍从较低来球的下方开始挥动击球是非常困难的\n3. **力量** — 过多的上旋可损失击球中的力量\n4. **高球** — 如果击球点特别高，从球后方由下向上击打是比较困难的，尤其是采用单手反拍击球\n\n### （五）上旋球的程度\n\n决定上旋程度的因素：\n1. **球拍的轨迹**，或者说从低向高挥动的程度 — 挥动角度越小，旋转越大\n2. **拍头接触球时的速度**\n3. **拍头接触球时拍面的角度** — 在大多数底线击球中，拍面在击球时成垂直地面状\n\n---\n\n### （六）下旋球/侧旋球的优点\n\n1. **出现滑行** — 如果被击出后飞行轨迹低，它将使球落地后出现滑行，并起跳很低，使对方很难回击\n2. **时间** — 下旋击球动作小，因此易于掌握时间；因为球拍在击球区内球拍接触球时间较长\n3. **用力小** — 用最小的力量便可打下旋球\n4. **低球** — 当来球较低，打随上球时，用下旋球便于将球击过网\n5. **防守** — 当需要时，在防守中所有的球都可用较短的拉拍和开放的拍面打出有效的下旋球\n6. **高球** — 用下旋打高球较容易，因为在这个位置肩部用力相对较弱\n\n### （七）下旋球/侧旋球的不足\n\n1. **速度** — 很难加速打，因为这种球容易平着飞出场外\n2. **上升** — 下旋球由于射角较高容易使球在特殊场地上落地后上升，使对手便于回击\n3. **漂动** — 下旋球容易出现漂浮，容易造成对方拦击\n\n### （八）削球/下旋的程度\n\n由以下几点决定：\n1. **球拍的运动轨迹** — 向下运动越多，越容易向下切\n2. **接触球时拍头的速度** — 接触球时拍头速度越快，产生的下旋越大\n3. **接触球时拍面的角度** — 拍面越开放，旋转越大（在底线，它只能超过5°）\n4. **接触球时的旋转** — 上旋的程度越大，产生的下旋越多\n\n---\n\n<a id=\"ch2_s1_move\"></a>\n## 第二章 · 第一节 · 四、判断和移动（p46）\n\n> 通常一个经过网球专项训练的人与一个跑得很快但没有经过专项训练的人比赛时，受过训练的人在场上跑的比这个没有受过训练的人跑的要快，体力也节省。原因就是受过训练的人判断要早，在网球场上的移动能力要强。\n\n**关键时间数据：**\n- 球从场地一端至另一端平均用时 **0.4 秒**（职业选手发球速度，从对方触拍到球落地的用时，没有包括球反弹起来的时间）\n- 选手从起动到击球用时在 **0.3–0.5 秒**之间\n- **回球手判断来球用时 0.2 秒**\n\n> 移动的学习要注意移动前和移动后的动作。移动前最典型的就是要作好分腿垫步，它可以克服身体的惯性，减轻体重。移动后就是为下一拍击球做好准备。现代网球很大的一个特点就是开放式步法，而开放式步法其中重要的一点就是作动作还原快，因为现代网球球速越来越快，球的力量越来越大。\n\n### （一）判断\n\n**判断** = 在对手触球前预测来球的位置和使用这一信息合理回球。\n\n**1. 判断的分类**\n- **(1) 整体判断** — 预测对手在一定情况下要做什么\n- **(2) 局部判断** — 预测对手不能做什么；局部判断非常有用，因为排除各种可能性后，选手可对来球作出更快的反应\n\n**2. 判断的类型和特点**\n\n| 类型 | 特点 |\n|------|------|\n| **跟踪判断/感性判断** | 预测对手触球后球的飞行线路；来球的速度、高度、方向和旋转 |\n| **临场战术判断** | 对手在一定条件下所采用的习惯的回球、战术处理和打法类型；要做什么或不要做什么 |\n| **临场几何判断** | 从对手在场上的站位就可观察到对手的意图；包括其它三种类型及对场区、角度了解的深度；影响防守范围和步法；感性一决定一实施一反馈；取决于选手经验的广度 |\n| **技术判断/动态判断** | 通过观察对手的技术动作，如平衡、握拍、挥拍、身体动作或姿势、步法、站位姿势、抛球、击球类型等来预测选手要做什么或不要做什么 |\n\n> 临场几何判断和技术判断为触球前产生的判断。\n\n**3. 判断的依据**\n1. 对对手习惯的了解 — 不同的选手可能有不同的习惯\n2. 对在独特情况下的反应的了解\n3. 对可能的选择、对策和应变的了解\n\n**4. 对球的跟踪**\n\n研究表明：有经验的选手在球离开对手的拍面后看见球，然后变脱离他们的视线1–2米，当球处在网的上空时，他们又见到球，球离他们1–2米时，又脱离他们的视线；发生这一情形的原因是，人的眼睛不能跟踪球整个的飞行线路。也同时告诉我们，平时教练所说的打球时要盯住球，是要注意力集中和涉及保持身体平衡的问题。\n\n**5. 怎样提高判断力**\n\n- **(1) 用暗语** — 对于初学者和中等水平的运动员，使用训练用语或暗语帮助他们提前辨别来球；例如：旋转球（上旋、下旋）、球速（快速、中速、慢速）、高度（高球、平球、低球）、方向（左、右）、深度（深球、中场球、短球）\n- **(2) 建立数据库** — 选手可通过对对手在别的场次比赛、练习、准备活动和比赛中的观察建立数据库\n- **(3) 改变看球方式** — 研究表明：初学者在球处于飞行线路最高点时看球；高水平的选手是在球处于飞行线路第一阶段时看球\n- **(4) 提高判断的途径** — 判断的专项训练；增加比赛的数量和类型；根据处理问题和有效提问的技能改进教学方式；安排训练时尽量贴近实战\n- **(5) 怎样提高观察技能** — 选手在场上的站位；对手的握拍和姿势；球（弹性好/不好）；挥拍动作（幅度大/小、高/平等）；击球位置（底线外、一侧、底线内、靠近身体、远离身体等）；对手身体动作；高水平的选手，对手的手臂是帮助判断的最好助手；击球（轻击、猛击）时的声音；多球训练（喂球后说出喂球意图）；网球比赛是一种在移动中进行的比赛项目，并应按此进行训练\n\n### （二）移动（p49）\n\n> 运动员在场上移动的方式决定他作为一名网球选手能否获得成功。网球比赛中的发挥取决于各种不同的快速侧向和向两侧移动的速度和快慢。\n\n**关键数据：**\n- 顶尖水平网球赛中，10个来回球只需 **15秒钟**，每得一分平均 **4次变线**\n- 多数冲刺距离界于 **2.5–6米**之间（最长14米，平均4米）\n- → 起动的爆发力和速度爆发力（短距离冲刺）对网球选手十分重要\n\n**1. 影响移动的因素**\n\n| 因素 | 说明 |\n|------|------|\n| 知觉 | 运动员以何种速度和清晰度观察到对手的球拍将球击出的线路和速度 |\n| 决策 | 运动员以何种速度处理这一信息并决定采取什么行动 |\n| 反应速度 | 中枢信号从大脑传至肌肉的快慢 |\n| 动作速度 | 运动员跨出第一步的速度 |\n| 对准来球 | 运动员对准来球的能力，击球时保持整个击球动作过程中的平衡 |\n\n**2. 灵活性、速度和加速**\n\n- 灵活性能使运动员进入正确的位置并为击球提供牢靠的根基；速度对迎击来球是重要的，但提高速度的方法有限，因为它基本上是天生的\n- **加速是你提高速度的能力**\n\n**3. 爆发性速度和复位**\n\n- 接边线球或短球时前 2–3 步过程中需要爆发性速度\n- **复位** = 在场上急停、恢复平衡，恢复准备姿势和准备再次移动（快速起动）的能力\n- 网球运动基本上属于下肢的运动项目，需要有力的腿部以便有效地运用步法（爆发力和复位的技能）\n\n**4. 平衡**\n\n- 两种基本类型：**静态平衡**（保持静止姿势的能力）和**动态平衡**（在移动中保持平衡的能力）\n- 对于网球运动，动态平衡是最重要的\n- 检验动态平衡的有效方法：看运动员在击球后能否朝击球方向向前移动（**即双肩是否处于双脚脚尖上方**）\n- 在击球动作之间能保持平衡的运动员不太费力就能自如地运用技术\n\n**5. 反应时间**\n\n- 影响反应时间的因素：对见到的所作出的判断；对作出何种反应的选择；整理向肌肉输送的信息的能力\n- 缩减反应时间的方法：研究来球的信息（球路）、对手的信息（移动、握拍等）和比赛形势的信息（对手的擅长和弱点）\n\n---\n\n**移动框架（四个组成部分）：**\n\n```\n1. 姿势                    2. 向来球的移动\n   准备姿势/状态               移动重心\n   传统的站立姿势               侧跨步\n   中和的站立姿势               转体：爆发式第一跨步\n   屈体的程度                   移动方向 / 移动距离\n                               身体、球拍、思想\n\n4. 复位                    3. 根据来球方向的站位和击球时的站立姿势\n   平衡和爆发性的最后跨步         针对来球的姿势\n   复位的技巧                   击球时的站立姿势\n   何时复位 / 在何处复位          调整步法和平衡\n```\n\n**（1）站位**\n\n① **准备姿势/状态**\n- 好的平衡是非常重要的；运动员在准备接球时必须设法让双脚一直处于活动之中，而且只需暂时的稳定\n- 有两种基本姿势：传统的准备姿势和中和的准备姿势\n\n② **传统的准备姿势特点**\n- 重心在支撑面以内；预动态姿势便于更好地朝来球突然起动（对手击球时立即侧跨步）\n- 昂头并与肩部在一条线上；下巴抬起\n- 肘部贴近身体以便更好地移动和反应（如接发球）\n- 上体于腰部处向前微倾；稍微屈膝\n- 双脚分开大约与肩同宽；身体重心前移至双脚脚尖\n- 保持重心前移并低于正常情况\n\n③ **中和站立姿势特点**\n- 这是一种适合于运动员个人特点的自然的姿势\n- 运动员在等待击球时自由站立；不需屈膝\n\n④ **屈体的程度**\n- 避免向前屈体过度（90度的角度），因为即使处于这种姿势，你能向前快速移动，但更难于侧向或向后移动\n- 当发球方正要抛球时，运动员应从适度屈体状态中挺起身并侧跨步，这样运动员就可快速作出反应\n\n**（2）向来球移动**\n\n为了更有效地移动身体，运动员必须首先移动重心，而不是头或肩。移动是由上体开始的。运动员应力求保持动态平衡。\n\n① **挺身** — 在对手触球时或恰好在对手触球前，运动员应挺身（快速屈膝并立即伸直），以便运动员在瞬间减轻体重；由于屈膝而使重心下移，然后运动员蹬地；这一挺身动作可增加蹬地的力量，从而有助于朝来球做爆发式移动动作\n\n② **侧跨步** — 当对手击球时，向前跨步；这一动作可调整肩部位置，降低重心并使运动员对对手的击球快速作出反应\n\n③ **转体和爆发式的第一跨步**\n- 侧跨步完成后即可转体用靠近来球的脚作一箭步\n- 第一跨步应向前并与来球成对角；形成一种稍前倾的不平衡状态，有利于快速侧向移动\n- 这一动作也是为了形成稍微转体和转肩并开始向后引拍动作\n- 转体时使用抹拍臂做\"上下提拉\"动作\n- 不要用头或肩带动动作，也不要用前脚向后移步\n- **记住：运动员的速度来源于他的起动速度**\n\n④ **移动的方向（跨步、跑步）**\n- 转后，运动员应使用交叉步确保正确的侧向移动，然后开始跑步\n- 跑动时挺直身子（向前微倾），接近来球时压低身子\n- 接近来球前应使用大跨步，离来球越近步幅应该越小\n- 跑动时，双肩应该总是在双脚的前面\n- 不同类型的移动步有：原地踏步、侧步、交叉步、调整步和冲刺步\n\n⑤ **移动的种类**\n\n| 侧向移动 | 向前移动 | 向后移动 |\n|---------|---------|---------|\n| 从转体开始 | 总是将球拍置于前面 | 脚快，手则活 |\n| 用交叉步开始向来球跑动 | 使用爆发式第一跨步 | 力求将身体重心前移，以确保动量和角动量在触球过程中发挥作用 |\n| 如果来球不是太远，结合使用侧步（滑步）和交叉步 | 冲刺时，朝移动的反方向用一小跨步开始冲刺 | |\n\n⑥ **移动的距离**\n\n| 向近距离的球移动 | 向远距离的球移动 |\n|--------------|--------------|\n| 运动员只需十分迅速地用双脚侧向跨步 | 爆发式的第一步，运动员必须冲刺 |\n| 这种动作是短距离侧向移动的最快的方式，并能使运动员随时处于准备状态 | 用有力的大跨步开始冲刺去接球 |\n| 当向近距离的球移动时，使用小跨步 | 为了跑得更快，手臂和腿必须配合，用力上下摆动，动作犹如一个整体，要知道怎样持拍跑动 |\n| | 尽可能要求运动员在击球整个过程中奔跑，以便在一跳后接住来球，可能时斜向移动 |\n\n⑦ **身体和球拍以及移动和心理之间的关系**\n\n| 身体和球拍 | 移动和心理 |\n|----------|---------|\n| 利用球拍保持平衡和速度 | 确定移动的方向，然后\"按此移动\" |\n| 合理地使用手臂，利用上体和腿部的动作协调手臂动作 | 步法要具攻击性：向前，斜向移动，跨步，使用向前的线动量 |\n| 当球在空中时，作好击球的准备 | 运动员应该首先集中精力快速接住来球，然后集中精力准备击球 |\n| | **决不要犹豫。如果你提出这样的问题：\"我能做到吗？\"你就不会做到！** |\n\n**（3）根据来球方向的站位和击球时的站立姿势**\n\n① **针对来球的姿势**\n- 做一小调整步以保持平衡\n- 击落地球时，离网越近，调整步越小\n- 力求使后脚与来球的线路处于同一条线上，然后朝来球跨步\n- 重心应置于后脚上以便跨步击球；感觉好象你有充足的时间完成击球动作\n- 当运动员根据来球方向移动时，必须保持对身体和球拍的控制（动态平衡）\n- 使你的身体（肩部）一直处于双脚上方\n- 在接近触球时，不能弯腰去接球，因为这会导致失去平衡\n- 在倒数第二步时（反手击球时用右脚，正手击球时用左脚），力求达到理想的位置\n\n② **击球时的站立姿势**\n\n在可能的情况下，侧立（半开/侧立）姿势较好，开立姿势不错，双脚靠拢站立姿势最次。击球点越高，双脚越需靠近。\n\n| 用侧立姿势击球 | 用开立姿势击球 |\n|------------|------------|\n| 建议单手反手击球时采用 | 时间更充足 |\n| 这一方法有助于改进步法，击球时控制较好 | 运动员必须稍微靠近来球并更快地作好挥拍的姿势 |\n| | 适用于单手正手击球和双手反手击球 |\n\n**（4）复位（p54）**\n\n① **平衡和爆发性的最后跨步**\n- 平衡重心从一脚突然转移到另一脚，由此可进行有效击球\n- 在接近击球位时，使用最后跨步保持平衡，完成击球后立即将重心转移出去\n\n② **复位步**\n- 击球后立即开始复位；重新获得正确的准备姿势\n- 使用外脚蹬地恢复平衡，复位时保持动态平衡\n\n③ **何时复位**\n- 在击球后立即复位；不要停留在击球位上等待结果\n- 复位过程中始终注视球路\n\n④ **在何处复位**\n- 回到与对手可能回球角度相关的中间位置（参考击球线路与回位的规律）\n\n---\n\n**3. 不同场区的移动特点（p54–55）**\n\n**（1）底线**\n- 击球前，脚抬起、脚后撤的技术在很大程度上取决于运动员个人的特点\n- 空中击球（跳起击球）是有效的，其条件是，你具有良好的\"动力链动作\"，它能确保全身冲力有效地协调\n- 跳起是发球击球时达到最高速度的结果\n- 用发球的步法在场内结束发球动作，以便能更好地进攻；如果不进攻，落地后再跨一步（急停步），然后后撤至底线以外\n\n**（2）中场**\n- 根据来球高度调整膝部的屈伸：击反弹球或低截击球时最大程度地屈膝；抽球式截击或截击高球时最大程度地伸展\n- 处于\"无人区\"时要快速跑动；可能向前跑，采用进攻型步法\n- 如可能，采用\"加里奥加步\"反手削球上网\n- 用外脚蹬地产生更大的力量，以便正手进攻上网\n- 在应急的情况下，跑动中击球上网\n- 当打发球上网截击时，力求用横跨步调整步法；但如果没有时间，要注视球路\n- 在跑动中截击或击反弹球时，只需用离球较近的脚跨一侧步，或用开脚站立姿势击球\n\n**（3）网前**\n- 你的对手击出高质量的球时，站在两条边线之间的中央\n- 站位离球网约 **2–3 米**；用屈膝降低重心，使运动员快速有力地向任一方向移动（蹬地）\n- 截击时，向前移动防守，封住角度\n- 你离网越近，你越能更好地斜线移动截击，对手的角度就越小\n- 你击球时，对准球跨步\n- 随球上网击球或截击后要注视球路\n- 高压球后上网，但要当心对手可能挑高球\n- 复位时用外脚蹬地\n- 当对手击球时，侧跨步（小垫步），以防步法错乱并保持准备姿势\n\n---\n\n<a id=\"ch2_s1_footwork\"></a>\n## 第二章 · 第一节 · 五、步法（p61）\n\n> 步法是移动的一个具体环节，移动包括全身各部分的环节，步法会受到多方面的影响，甚至会受到体能的影响。\n\n### 核心概念：Athletic Foundation（运动的基础）\n\n- 运动场上最令人羡慕的是那些像羚羊和豹子一样快速移动奔跑的高手：迅速的第一反应、爆炸性的加速，是敏捷、弹性、流畅的动势，是控制极佳的平衡感，是精确到位的力量\n- **Athletic foundation = 快速反应与到位**（网球中就是对来球做出判断和移动）\n- **运动的基础**：压低重心（在网球击球过程中，身形的平均高度要比站立高低 **30厘米**左右）；张开脚步以便做出快速反应和击球动作，同时保持稳定的支撑和反弹的准备\n- 压低身形、张开脚步承担身体负荷，同时不断变化的姿势和肌肉韧性组成一个紧凑的 **\"悬挂系统\"**；当它发挥作用时，正确的步法和跑位技巧只不过是其中的副产品而已\n\n### 关键数据\n\n- **70% 的击球失误都是由于步法不到位**\n- 网球运动中移动方向分布：侧移占 **48%**，前移占 **47%**，后移占 **5%**\n- 一场单打比赛中，一般需要 **300–500 次**的能量爆发\n- 底线到网前的距离约为 **12 米**；短跑运动员一般需要在前20米进行加速，而网球场地在这个距离内不断地加速冲刺，还要在击球前减速，以便调整好每次击球的准确位置\n- → **提高网球运动员步法的重点是提高他们的起动速度、加速度和有效的减速**\n\n### 影响步法移动的因素\n\n- **洞察力** — 从球离开对方球拍那一刻起，对来球的方向和速度准确判断的能力\n- **决断力** — 在对来球做出速度和方向的判断后做出快速反应的能力\n- **反应速度** — 神经向肌肉传导信息的速度\n- **身体调整能力** — 在击球过程中保持身体平衡的能力\n\n### 灵活性\n\n灵活性是指运动员在变换方向时速度损失最小的能力。研究发现，网球运动员在一分球中平均要改变 **4–5次**方向。\n\n---\n\n### （一）十字交叉步法（p62）\n\n西班牙球员特有的步法，引起了广泛关注。\n\n**原理：**\n- 取底线中点处为十字交叉步法的中心位置\n- 从此处分别向左前方、右前方、左后方和右后方延伸用胶条标示出两条短直线，构成一个倾斜 **45°的十字形**\n- 每段线长大概在一步左右，每个斜线方向就是击球所要移动的方向\n- 动步法是要通过两个灵活自如的滑步，以更好地制动，控制身体平衡并找准击球点，**切不可一大步到位**\n- **基本移动步法没有直线移动，都是斜线移动**；来球在前时向左前或右前移动；来球在后时向左后或右后移动；向前向后处理完球后，应再回到中心点处\n\n> 这是一种最基本也是最应该遵循的准则，在此基础上根据不同来球的状况再灵活处理。\n\n**1. 基础练习**\n\n在场地的步法标记上，持拍在无球情况下连续向四个方向做两次滑步击球。\n\n要求：\n1. 每个方向做完都必须返回到中心位置（这是击球的基础位置也是最关键的位置，守候这里你的场地就不会出现大的空当）\n2. 在练习移动过程中，两个滑步之后腿部要屈膝制动，一方面有利于身体平衡，一方面积蓄爆发力击球\n\n**2. 有球练习**\n\n教练员隔网站在练习者对面场地中央位置，连续向练习者的前后左右方向供球，调动练习者按着场上标示移动击球。\n\n要求：\n1. 教练员供球时需要控制好时间和节奏，既要给练习者充分的时间回位，又要使练习者的步法连贯流畅\n2. 练习者在任何状态下都要有准备随时向前向后移动，并且一定要有意识回到中心点那个最重要的位置上（**不要从后方就直接横向来到左后方，否则这样来回几次你就会离底线越来越远，防守范围越来越大，从而失去进攻位置**）\n\n**3. 实战练习**\n\n当能够熟练地而且习惯地运用这种十字交叉滑步后，就可以进入实战练习。\"交叉的十字\"不只局限在底线附近，而是可以平移到场地的任何角落；在底线如此，在中场和前场依然如此，原理不变。\n\n> 费德勒之所以能够在场地任何位置回击出高水准的球，除了准确的预判、良好的技术外，就要得益于他流畅精准的步法了。\n\n**(1) 接发球练习**\n- 教练在对面场地（底线或者发球线）进行大力发球，练习者准备接发球\n- 当对手发球很有威力时，接发球人便处于被动的防守形势，接发球位置可能比较靠后\n- 注意接发完成后要随即回到那个头脑中的\"十字交点\"处，准备随时应对下一个来球\n- 要求：移动时腿部需要支撑和制动，以控制身体平衡\n\n**(2) 向前推进练习**\n- 当要发动进攻或由防守转向进攻时，必须要能够有效地向网前逼近以给对手更大的压力，与此同时还要坚固自己的防守，避免被对手穿越\n- 在底线\"十字交叉\"的步法标记基础上，可以继续在中场和前场位置用胶条做出同样的标志，然后由教练在对面球场中央连续供球，选手按照脚下的标线主要利用滑步结合其他步法来回球，同时向网前斜线推进；其间可以根据进程及来球不同状况打出底线球、中场截击、网前截击或高压等\n\n要求：\n1. **不要径直冲向网前**，那样你的边线两侧会出现不小的空当等待对手攻击；相反要采取左右斜线地边进攻边逼向网前\n2. 前移和变向时注意制动腿的控制，积蓄力量并保持身体平衡，以利于下一个动作的顺畅衔接\n\n---\n\n<a id=\"ch2_s2_fh\"></a>\n## 第二章 · 第二节 · 一、正手击球（p88）\n\n### 一、握拍选择\n\n| 来球情况 | 推荐握拍 | 原因 |\n|----------|----------|------|\n| 低于球网高度的球 | 东方式 | 容易控制让球过网 |\n| 球速慢（慢速场地）| 西方式 | 旋转球威胁更大 |\n\n---\n\n### 二、引拍技术要点\n\n**① 引拍高度**\n- 高球：引拍要高，肘关节远离身体向上抬，保持拍面垂直击球（不后仰）\n\n**② 引拍时机**\n\n| 来球速度 | 引拍时机 |\n|----------|----------|\n| 球速较慢 | 球落地后再开始引拍 |\n| 来球较快 | 尽早将球拍引向身体侧面，球落地时立即完成引拍 |\n\n> ⚠️ 引拍不能停顿——如同汽车行驶中加速比静止启动更容易提速\n\n**③ 引拍幅度**\n- 标准：拍柄底部指向击球点即可\n- 引拍过小 → 加速距离不够，肌肉缺乏牵张，发力受限\n- 引拍过大 → 用时过多，向前挥拍时身体旋转过多，击球难度增加\n\n**④ 拍面控制**\n- 向后引拍时，拍面应**向前倾**，防止向前挥拍时翻转球拍\n\n**⑤ 向前挥拍**\n- 以**肩为轴**转动，前臂和手腕不要主动发力\n- 肘关节和腕关节保持水平，球拍固定于手腕，发挥全身力量\n\n**⑥ 击球**\n- 拍面保持垂直或**略微前倾（不超过 5 度）**，过度前倾导致球下网\n- 击球点差异：\n  - 东方式 < 西方式（更低更靠后）\n  - 直线球 < 斜线球（略靠后）\n\n**⑦ 随挥**\n- 随挥 = 随球挥拍，击球是瞬间，随挥是过程\n- 标准：球拍沿击球方向再向前移动**三个球的距离**\n- 目的：打实球 + 保持正确击球方向\n\n---\n\n### 三、身体控制\n\n**① 重心**\n- 引拍时：重心放在持拍手**同侧**，保持停留\n- 击球时：重心从**后向前**转移，膝关节蹬直\n- ⚠️ 膝关节没伸直 = 只用了手臂力量 = 击球无力\n\n**② 平衡**\n- 向后引拍时，非持拍手与持拍手**同时向后**，帮助身体转动到位（用身体打球而非手臂）\n- 头部：从球落地到挥拍结束，**眼睛始终盯球，头部不随球转动**\n  - 头部随球转 → 身体方向与击球方向不一致 → 不敢发力或发力失误\n\n**③ 放松与发力（紧张度管理）**\n- 引拍时：只需用 **2～3 分力**\n- 向后引拍轨迹：\n  - 东方式：直接向后引拍\n  - 西方式：先向外再向前，形成从外向里的轨迹\n- 无论哪种方式：引拍时球拍都要移到**球的下方**，为向前挥拍做准备\n\n---\n\n### 四、向前挥拍：自下而上的发力链\n\n发力顺序（人体协调链，自下而上）：\n\n1. 膝盖弯曲 → 伸直（蹬腿）\n2. 转髋与转体\n3. 手臂绕肩\n4. 肘部伸直\n5. 前臂内转与转腕\n\n> 💡 训练建议：体侧双手掷实心球练习 → 体会转髋、转体及手臂发力顺序\n\n- 向前挥拍时，拍头应**低于手腕**（合理利用作用力与反作用力，给手臂留出向上空间）\n- 练习时：**忘记手臂，注意力放在腿和髋部**\n\n---\n\n### 五、击球点的三个维度\n\n**① 上下（弹跳高度）**\n\n| 水平 | 适合击球时机 |\n|------|-------------|\n| 初学者 | 球弹到腰部高度（容易借力） |\n| 高水平 | 球弹到肩部高度（进攻发力机会） |\n| 职业级 | 上升期（刚跳起时）击球，难度极大 |\n\n> 弱势一方通常在**下降期**才击球\n\n**② 前后（与身体前后距离）**\n- 击球点应在**身体前方**\n- 常见问题：击球点偏后（准备时间不够，或前方击球借力感不强）\n\n**③ 左右（里外侧距离）**\n- 初学者：手臂伸得过直，从外向内击球 → 转动惯量不足 → 方向偏内\n- 高水平：肩部高度发力时若手臂夹太紧 → 线动量不足\n\n> 向初学者描述挥拍方向：**从后向前、从下向上、从里向外**\n\n**击球部位：从 4 点钟打向 10 点钟（逆时针弧线，不走捷径）**\n- 从球的**中下部**开始，而非中部\n- 保持从下向上的正确轨迹\n- 轨迹走弧线，击出弧线球 → 稳定安全\n\n---\n\n### 六、随挥\n\n- 作用：逐渐减速各身体环节（防止运动损伤）；使球拍在接触球时接近最大速度；为下一拍做准备\n- 击球后腿部膝关节：**由屈到伸**的过程\n- 初学者练习方式：随挥结束时，用**非持拍手在肩上抓住球拍颈部**，以确保完成随挥动作\n\n---\n\n### 七、移动击球\n\n**不同水平选手的击球力量来源：**\n\n| 水平 | 手臂 | 转体 | 腿部 |\n|------|------|------|------|\n| 初学者 | **60%** | — | — |\n| 中等水平 | — | **60%** | — |\n| 职业选手 | — | — | **60%** |\n\n**\"死区\"概念：** 场地中央是\"死区\"——对方来球大多落在此处，打落地球难，打空中截击更难，倒退击球难度最大。\n\n**正确习惯：** 每打完一球 → 退回端线后中间位置准备 → 保持从后向前击球的节奏\n\n---\n\n### 八、步法要点\n\n**① 基本原则：\"快跑慢打\"**\n- 以最快速度接近球（起步有爆发力）\n- 以最合理时机击球\n- 接近球时以小步调整\n- 击球最后一步外侧脚落地：**脚后跟先着地**（制动 + 稳定）\n\n**② 远距离移动：交叉步 + 并步**\n1. 先做分腿垫步\n2. 重心先导向移动方向（后撤步），再做交叉步\n- 要求：上体平稳、髋关节放松、双臂自然摆动、由慢至快\n\n> ⚠️ 交叉步同样用于击球后**复位回原位**\n\n**③ 侧身攻（inside-in / inside-out）**\n- 反手位用正手击球（男子尤其常用）\n- 侧身攻直线（inside-in）：对方回球较浅、空位明显时\n- 侧身攻斜线（inside-out）：从里向外打\n- 步法：均以**关闭式步法**为佳\n- 击球前最后一步：先**后撤同侧脚**，保持重心从后向前\n\n---\n\n### 九、常见错误与纠正\n\n**❶ 身体重心过高（最普遍）**\n- 表现：靠手臂发力，击球无力，打不出上旋\n- 纠正：**坐凳击球练习**（40cm 高凳）\n  - 坐好 → 自己抛球 → 臀部离凳但保持膝关节弯曲 → 重心不起来，腰不弯曲\n  - 目标：**弯腿不弯腰**，体会腿部肌肉的本体感受\n\n---\n\n### 十、上旋球与削球\n\n**正手上旋球：**\n- 初学者喂高球 → 自然采用西方式握拍 → 找到上旋击球感\n- 逐渐靠近网喂球 → 增加摩擦感，否则球下网\n\n**正手削球（紧急补救）：**\n- 适用：球离身体较远、来不及用正手击球时\n- 握拍：大陆式\n- 技术要点：\n  1. 左肩转到对准来球\n  2. 肘关节在击球前到达体前\n  3. 球拍轨迹一直向前，保持在身体侧面\n  4. 拍面略微打开\n  5. 重心随球跟上\n\n---\n\n---\n\n<a id=\"ch2_s2_bh\"></a>\n## 第二章 · 第二节 · 二、反手击球（p103）\n\n> 反手已不仅是防守和过渡，已发展为可主动进攻的技术。部分选手反手进攻能力强于正手。\n\n### 一、为何正手通常强于反手\n\n1. **练习频率**：追求力量感 → 更多选择正手 → 反手练习少\n2. **心理偏好循环**：做擅长的事 → 正手越来越强，反手相对滞后\n3. **教学侧重**：通常先学正手，练习时间更多分配给正手\n\n> 初学者：双手反手比单手反手更容易掌握，且不易受伤。以下主要讨论双反。\n\n---\n\n### 二、双手反手握拍三种方式\n\n| 握法 | 左手 | 右手 | 代表选手 |\n|------|------|------|---------|\n| 第一种 | 东方式 | 东方式 | 阿加西 |\n| 第二种 | 东方式 | 大陆式 | 休伊特 |\n| 第三种 | 西方式 | 大陆式 | 大小威、莎拉波娃 |\n\n---\n\n### 三、各握法的技术特点对比\n\n**引拍轨迹：**\n- 第一、二种：从外向里（线速度角度）\n- 第三种：从里向外（角速度角度）\n\n**向前推拍的左右手用力比例：**\n\n| 握法 | 左手（推） | 右手（拉） |\n|------|-----------|-----------|\n| 第一种 | 60% | 40% |\n| 第二种 | 70% | 30% |\n| 第三种 | 80% | 20% |\n\n**击球点位置：**\n- 第一种：最靠前\n- 第二种：居中\n- 第三种：最靠后 → **便于打直线**\n\n**随挥动力来源：**\n- 第一种：以前脚的**线动量**为主（男子多用，依赖臂力和肩宽）\n- 第三种：以转体产生的**角动量**为主（女子多用，髋部转动更有利）\n\n---\n\n### 四、常见难点与纠正\n\n#### ❶ 击球点偏晚\n\n- **原因**：反手击球点比正手更靠前（由解剖位置决定——到反手位时击球肩从后方移到前方），但习惯按正手感觉找点 → 击球偏晚\n- **修正**：**提早引拍**\n\n#### ❷ 重心过早前移\n\n- **问题**：还没开始向前挥拍，重心已经压在前方右脚\n- **后果**：\n  - 没利用重心前移的力量\n  - 无法从下向上击球 → 球打平，制造不出上旋\n  - 产生\"掰着打球\"的习惯，难以控制\n- **修正**：重心在击球动作**过程中**才向前移动，不要提前\n\n#### ❸ 引拍不到位（最普遍问题）\n\n- **标准**：引拍引到\"引不动\"为止 → 产生个人最大力矩\n- **意义**：引拍到位 = 成功了一半\n\n#### ❹ 转体过早\n\n- **问题**：身体过早转向正面 → 击球向前的力量不足\n- **正确感觉**：击球过程中，**右肩先碰下颚，左肩再碰下颚**\n- 保持头部稳定、左右脚不转动\n\n#### ❺ 随挥不充分\n\n- **问题根源**：初期不熟练 → 习惯\"碰球\" → 靠力量大小控球 → 力量稍大就出界\n- **充分随挥的作用**：给球充分旋转 → 安全性增加 → 力量可以充分施展\n- 充分用力 = 施加在旋转上，而非蛮力\n\n---\n\n### 五、单反 vs 双反的区别\n\n| 对比项 | 单反 | 双反 |\n|--------|------|------|\n| 击球点 | 更靠前 | 靠前（但不如单反） |\n| 步法 | 封闭式为主 | 开放式 |\n| 发力结构 | 腿 → 髋 → 上体 → 手（四段式动力链） | 腿部 + 上体（两段式） |\n| 肚脐朝向 | 击球时转向球网 | 引拍到随挥，肚脐始终朝向球网 |\n| 手臂作用 | 手臂（第三段）单独发力 | 上体共同转动完成，最后瞬间用前臂微调方向 |\n\n---\n\n### 六、反手削球（截击的加长版）\n\n**引拍：** 开放式引拍，进行肩部拉伸\n\n**向前挥拍要点：**\n1. 先肘关节向前，再前臂向前\n2. 击球位置始终保持在**身体侧面**\n3. 手臂不向侧方偏移，一直向前挥动\n\n**挥拍轨迹：** 从上到下，再向上的弧线（非单纯向下）\n\n**身体控制：**\n- 肘关节保持稳定\n- 腕关节不僵硬\n- 注意击球的外侧部\n\n> 反手削球技术相对简单，但简单的东西往往最难掌握。\n> 需要坚持每天 **400 次练习**。\n\n---\n\n---\n\n<a id=\"ch2_s2_serve\"></a>\n## 第二章 · 第二节 · 三、发球（p115）\n\n> 发球是网球中难度最大、最费力的技术环节。现代发球趋势：简化引拍，类似排球扣球和棒球投球，去掉冗余动作，爆发力反而更强。\n\n---\n\n### 一、基础动作要点\n\n**① 握拍**\n- 尽量采用**大陆式握拍**（为将来调整打基础）\n- 握拍要**放松**，握太紧反而发不上力\n\n**② 抛球**\n- 持球方式：**手指持球**（不是手心），保持稳定\n- 手臂：**直臂**，发力在肩（不屈肘）\n- 抛球顺序：抛球手先**随身体向后**，再向前向上抛出（非原位直接上抛）\n- 手臂伸直后：有一个**短暂停留**以保持平衡\n- 击球前：抛球手臂落下做**\"抱腹\"动作** → 延迟躯干前倾 → 增加拍头速度\n\n**③ 引拍**\n- 倡导类似排球扣球的**简单引拍**，积蓄能量，易于控制\n- 关键细节：向后引拍最后阶段，前臂有一个**旋外**动作，为向前挥拍增加了距离\n\n**④ 向前挥拍**\n- 必须有**向上**的动作（形成弧线，确保安全）\n- 同时要有**向外**的动作（充分\"包住\"球）\n\n**⑤ 击球点（不同发球方式）**\n\n| 发球类型 | 击球位置（时钟方向） | 球拍移动方向 |\n|----------|---------------------|-------------|\n| 上旋球 | 从 7 点钟 → 打向 2 点钟 | 从左下向右上 |\n| 切削球 | 2 点钟位置 | 向侧下方 |\n| 平击球 | 球的中部 | 横向 |\n\n**⑥ 随挥**\n- 随挥完成的标志：动作结束在**身体右侧面**，**手心向外、大拇指朝下**\n- 球拍移到身体左侧是随挥完成后的自然动作，不是随挥本身\n- 随挥直接影响对球的控制\n\n---\n\n### 二、常见难点\n\n#### ❶ 紧张度（用力比例）\n- 发球是所有击球中要求**紧张度最低**的技术，一般用 **70% 的力量**\n- 过度紧张多源于不自信，不自信源于技术掌控不稳\n\n#### ❷ 用力顺序错误（最普遍问题）\n- 正确顺序：**脚 → 腿 → 髋 → 肩 → 手臂**\n- 常见错误：\n  1. 肘部没有充分向上、向前顶就向下落\n  2. 手臂还未伸直，手腕已经向前转动\n     - 结果：既没有充分包球，也没有最后的鞭打动作\n\n#### ❸ 视线与头部控制\n- **抛球前**：先抬头，眼睛**看着要抛向的击球点位置**再抛球（不要盯着球）→ 抛球更稳\n- **击球后**：头部在击球位置**停定一下**，不随球转动 → 有利于手臂向上、向外推球\n\n---\n\n### 三、切削发球\n\n**击球要点：**\n- 抛球略向右\n- 球拍从球的**右侧刷过**（前臂内旋较少）\n- 可适当增加上旋，让切削更有效\n\n**验证方式：** 球落地后向**左侧旋转**即为切削成功\n\n**战术运用：**\n\n| 战术 | 说明 |\n|------|------|\n| 拉开正手边 | 发对方正手边缘，使对方远离中央 |\n| 攻击正手 | 对方正手较弱时，直接攻击 |\n| 针对左撇子 | 发向其反手，并易于发左区中路 |\n\n**落地特点：** 轨迹射角低、速度慢、弹跳低 → 难以回击；球在空中旋转方向不易判断，可发向对手身体\n\n---\n\n### 四、上旋发球\n\n**击球动作：** 从球的**后下部向上**击出（7 点钟 → 1 点钟方向），击球位置在身体稍**左侧**\n\n**优势：**\n\n| 优势 | 说明 |\n|------|------|\n| 稳定性高 | 过网高度更高，仍能落在发球区内；比平击球下落更快 |\n| 回击难 | 落地弹跳高，尤其反手接发困难；挡球时旋转易打飞 |\n| 争取上网时间 | 飞行时间比平击球长，发球者有更多时间冲向网前 |\n\n> 主要用于**二发**或一发的变化球。双打左区发球时，可迫使接发方失去有利站位。\n\n---\n\n### 五、常见错误详解\n\n#### ❶ 发球速度不足\n\n- **根源**：想用力 → 握拍太紧 + 手腕僵硬 → 甩不出速度\n- **修正**：手腕要灵活，像**鞭打**一样将球拍甩出去\n- 初学者：先体会上肢转动感，挥拍动作向前流畅进行，力量传递连贯提升拍头速度\n\n#### ❷ 抛球不稳\n\n- **持球方式**：球放在食指与中指**根部中间**，像端酒杯一样轻轻托住（避免用指关节捏球）\n- **抛球发力**：**由肩部发力**，抛球时肘关节和腕关节保持不动，充分伸直，有\"绷直\"感\n- **释放时机**：将球送到头部上方后再让球离手，应是**不知不觉的释放感**，而非刻意扔球\n- **抛球高度**：球离手到击球约 **0.8 秒**\n\n#### ❸ 内旋动作不明显\n\n- **常见误区**：\n  - 用拍面直对着球去打（无内旋）\n  - 误以为手臂应一直保持伸直（实际手臂在**击球瞬间**才完成伸直）\n- **正确做法**：\n  - 尽可能**保持肘部抬高**，让肩部围绕肘部转动 → 内旋自然体现\n  - 握拍角度：手指与球拍保持一定角度 → 有效引导内旋\n- **生活类比**：\"扇扇子\"——必须先有充分外旋，才能保证有效内旋\n  - 保持手腕与球拍的角度 → 加快挥拍速度 + 充分转向 + 形成上旋\n\n---\n\n<a id=\"ch2_s2_volley\"></a>\n## 第二章 · 第二节 · 四、截击球（p127）\n\n### 一、上网的战略逻辑\n\n- 网球本质是\"推人\"的游戏：不断给对手施压，逼对方回球变慢、变浅\n- 逼近网前 → 迫使对手冒险 → 得分概率上升\n- 没有截击技术 = 失去得分机会，同时解除了对对手的压力\n\n**打法类型（4种）：**\n\n| 类型 | 特征 |\n|------|------|\n| 上网型 | 主动压迫，积极上前 |\n| 底线进攻型 | 底线主导，伺机上网 |\n| 底线防守型 | 稳定为主，等待对手失误 |\n| 全能型 | 根据场上情况灵活切换 |\n\n> 打法很大程度上由性格决定。冒险 vs 稳定，是性格在球场上的体现。\n\n---\n\n### 二、上网的三种方式\n\n1. **强压后上网**：底线正手或反手一记强压后随即上网\n2. **发球上网**：发完球后立即占据网前\n3. **凌空抽击后上网**：对手回出防守高球后，上前凌空抽击，顺势来到网前\n\n**上网唯一先决条件：给对手施压**（球速 + 旋转 + 深度）\n\n> ⚠️ 过多上旋反而给对手高点击球、打穿越的机会。上网时应适当调整握拍，打更平或使用切削。\n\n---\n\n### 三、凌空抽击 vs 普通截击\n\n| 对比项 | 凌空抽击 | 普通截击 |\n|--------|----------|----------|\n| 攻击性 | 强，速度快，带强烈上旋 | 相对温和 |\n| 目的 | 一拍结束这一分 | 为下次截击做铺垫 |\n| 发力来源 | 躯干冲量 + 手臂强烈加速 | 蹬腿、转髋、送肩 |\n| 拍头速率要求 | 很高 | 中等 |\n\n---\n\n### 四、非持拍手的作用\n\n非持拍手 = 催化剂，可增加也可抑制角速度：\n\n1. **增加能量与风险**：加大引拍幅度 → 身体能量更多，但斜线球准确性下降\n2. **制动与平衡**：放在胸前 → 起制动作用，维持身体平衡\n\n> 击球练习中要有意识地关注非持拍手的动作。\n\n---\n\n### 五、站位与防守\n\n- 担心挑高球 → 站得离网更远（发球线附近处理高球最舒适）\n- 站发球线 → 容易被穿越\n\n**站位的核心判断：对手是要挑高球还是打穿越？**\n- 判断对手不会挑高 → 立即上步贴网\n- 离网越近 → 球网防守面积越大，截击成功率越高\n\n> ⚠️ 不存在既能从容处理挑高球、又能防范穿越球的\"绝佳站位\"，判断是关键。\n\n**分腿垫步**：不确定来球从左还是右时，两脚分开保持重心，随时可以倒向任意一侧。\n\n---\n\n### 六、握拍\n\n- **理想握拍：大陆式**（正反手截击均不换拍）\n  - 原因：网前来球快，来不及换拍\n  - 是正反手截击兼顾的折中方案\n- 东方式正手握拍：正手截击时感觉更舒适，学习阶段可接受\n\n---\n\n### 七、引拍：越早越短越好\n\n**引拍原则：**\n- 不同于落地球\"不能提前引拍\"，截击**越早引拍越好**\n- 要求：引拍引到**击球者眼睛能看到拍面背面**为止\n- 加上身体转动，实际上几乎等于\"没有引拍\"\n\n**原因分析：**\n\n| 原因 | 说明 |\n|------|------|\n| 来球通常快而低 | 没有时间大幅引拍 |\n| 防止人体升降反射 | 拍子从下向上抬起后，会顺势往下，向前击球受阻 |\n| 合理发力部位 | 应靠腿、胯、肩，而非前臂；引拍过大 → 前臂过度参与 → 击球无力甚至受伤 |\n\n---\n\n### 八、步伐：三步节奏（慢-快-快）\n\n**基本步伐顺序（正手截击）：**\n1. 出同侧脚（慢）\n2. 上对侧脚（快）\n3. 跟进同侧脚（快）\n\n> 如同舞蹈三步：第一步慢，后两步快。不能省略第三步，否则无法随挥、无法发力，影响回位。\n\n**上下肢协同：**\n\n| 脚步 | 同步动作 |\n|------|----------|\n| 出同侧脚 | 举起球拍（引拍） |\n| 上对侧脚 | 向前挥拍 |\n| 对侧脚脚后跟落地 | 球拍触球 |\n| 随挥向前 | 对侧脚前掌着地，同侧脚跟进 |\n\n---\n\n### 九、截击常见难点与修正\n\n#### ❶ 手腕松动\n\n- **原因 A**：全身紧张度不够（截击比落地球需要更高的身体紧张度）\n- **原因 B**：拍头没有抬起——拍头要与眼睛等高且明显高于手腕，手腕才能自然锁住\n- **修正**：提醒自己抬拍，保持\"恶虎扑食\"的蓄势待发状态\n\n#### ❷ 挥拍方向没有充分向前\n\n- **原因**：面向击球方向过多 → 向身体侧面挥拍 → 从外向里的轨迹\n- **修正**：先转体，让身体**侧面对准来球**，再向前直线挥拍\n\n#### ❸ 拍面在击球时过分后仰\n\n- 高手击球瞬间：拍面从后仰**逐渐转为接近垂直**，而非始终后仰\n- 把截击理解为**\"活动的墙\"**：根据球速、力量、离网距离、击球高度，灵活调整拍面角度\n\n#### ❹ 随挥过大\n\n- 想一拍打死对手 → 随挥过大 → 失误率升高\n- 来球慢且高时，可适当增大随挥幅度；**球快而低时，动作要紧凑**\n- **修正要点**：\n  - 忘记手臂，改用**身体重心的力量**击球\n  - 挥拍向前，发力如同**\"磕鸡蛋\"**——力道恰到好处，不多不少\n\n#### ❺ 正手截击转体\n\n- 转体体现在**非持拍手随持拍手一起转动**\n- 形象比喻：左右手关系如同**\"戴着手铐\"**\n\n---\n\n<a id=\"ch2_s2_smash\"></a>\n## 第二章 · 第二节 · 五、高压球（p138）\n\n> 高压球与发球动作高度相似，但最大区别是：**无法控制来球线路**，必须在移动中寻找最佳击球位置，掌握时机是关键。\n\n### 一、高压球的类型\n\n- 落地高压球\n- 跳起高压球\n- 反手高压球\n- 靠近边线的高压球\n- 打低而快速的挑高球\n\n### 二、技术重点\n\n**① 非持拍手**\n- 对方挑出高球 → 先引拍，同时非持拍手**指向球**\n- 作用：帮助寻找击球位置，充当**参照系**（没有参照系难以找准击球点）\n\n**② 步法（与发球的关键区别）**\n\n| 环节 | 动作 |\n|------|------|\n| 向后移动 | 先用**对侧脚**做向后交叉步（更快后移，保持自然转体） |\n| 起跳脚 | **同侧脚**（\"从前向后再向前\"的移动过程，同侧脚更协调） |\n| 落地脚 | **对侧脚** |\n\n---\n\n### 三、常见难点与纠正\n\n#### ❶ 不转体（最常见）\n- **原因**：心里慌张、急于打死 → 肩关节发紧 → 急于挥拍 → 变成\"拍苍蝇\"的手臂动作\n- **修正**：像发球一样**身体放松**，用身体去击球，而非手臂死力\n\n#### ❷ 站在原地不动\n- **原因**：没意识到高压球需要脚步调整，习惯等球\n- **修正**：多训练脚步移动，养成习惯\n\n#### ❸ 肩部过紧 / 心态紧张\n1. 尽早引拍，**非持拍手与持拍手同时举起**\n2. 非持拍手指着来球并对准来球方向\n3. 持拍手臂高举后，再开始调整步伐（先举拍，再调步）\n4. 过高的球可等**落地后**再打\n\n#### ❹ 发不出力\n- **原因**：没用上蹬、转、送的力量\n  - 向后转肩不够\n  - 肘部放得过低\n  - 向前挥拍时缺乏向上迎球意识\n- **修正**：\n  - 击球前重心保持在**后腿**，蹬力 + 重心前移\n  - **充分转体展肩**（形成牵张反射和弹性势能 → 才有转髋和送肩）\n  - 以**腿部用力**为主，手臂动作要小\n\n#### ❺ 找不到最佳击球点\n- **方法**：用**非持拍手去抓**对方挑来的高球\n  - 能轻松稳定抓到球的站位 = 打高压球最舒适的站位\n\n---\n\n<a id=\"ch2_s2_return\"></a>\n## 第二章 · 第二节 · 六、接发球（p143）\n\n> 接发球可能是现代网球中最重要的技术之一。一场比赛中约**一半的得分从接发球开始**。\n\n### 一、接发球的两种基本类型\n\n| 类型 | 目的 | 适用场景 | 技术特点 |\n|------|------|---------|---------|\n| **进攻型** | 给发球方施压 | 对付力量较小的一发或二发 | 侧身正手攻击；针对上旋 / 平击球 |\n| **防守型** | 稳定接回 | 对付威力极大的一发或大侧旋二发 | 挡击控制球速；可打高打深（对手在后场时）|\n\n---\n\n### 二、站位与步伐\n\n1. 稳健的准备姿势，以便快速回击任何类型发球\n2. 全部注意力集中在发球手的**抛球动作**上\n3. 发球手击球时，球员**向前跨步**\n4. 触球时将**身体重心整体前移**，利用线动量击球\n5. 面对强力发球时，可向后移动以**留出时间和空间**发动进攻\n\n---\n\n### 三、技术要点\n\n**重点一：准备动作**\n\n- 站位：重心脚较低、**两腿分开**，上体略微前倾\n- **分腿垫步**：每次接发球必做 → 使腿部肌肉获得弹性势能 → 身体更快移动到位\n- 高水平选手：垫步与移动合为一个**连续动作**\n\n**握拍选择：**\n\n| 情况 | 握拍方式 |\n|------|---------|\n| 一般情况 | 正手握拍 |\n| 判断发向反手位 | 换为反手握拍 |\n| 防守型接发、来不及反应 | 大陆式（中间握拍法） |\n| 时间充裕 | 根据击球侧选择最适合的握拍 |\n\n**重点二：引拍**\n- 接发球难度越大，引拍幅度应**越小**\n- 提前**向前斜向移动**击球 → 缩小发球角度，减少对方回球准备时间\n\n---\n\n### 四、常见难点与修正\n\n#### ❶ 紧张度不够（接发球要求最高的紧张度）\n\n- **表现**：动作迟缓、质量低或直接失误\n- **修正**：\n  1. 注意力高度集中，双眼盯住对方\n  2. 心理：像阿加西那样，保持**渴望接球的欲望**，眼神充满斗志\n  3. 身体重心**自然前移**，积极迎前，而非消极等待\n\n#### ❷ 引拍过大（最普遍问题）\n\n- 接发球大多是**借力回击**，无需大幅引拍\n- **修正**：\n  1. 采用**身体整体转动**，及早准备球拍\n  2. 外侧脚向移动方向转动，**非持拍手横穿过身体**协助转动\n  3. 找准击球位置，利用身体能量完成**小幅引拍**\n\n<a id=\"ch2_s2_other\"></a>\n## 第二章 · 第二节 · 七、其它击球（p148）\n\n### （一）挑高球（Lob）\n\n**战略价值：**\n- 不再只是双打手段，单打中同样可以给上网型选手和底线相持型选手施压\n- 最佳时机：对手发球上网截击时，或对手放短球时\n- 关键：**隐藏意图**，做出打落地球的姿势，尽量少用（用多了对手会提前预判）\n- 对付上网对手：穿越球 + 挑高球两种手段并用\n\n**两种类型：**\n\n| 类型 | 特点 | 难度 |\n|------|------|------|\n| 攻击性上旋高球 | 落地弹跳高且远，难以追赶 | 对手更难应对 |\n| 防守性高球 | 争取时间，稳定过渡 | 相对容易执行 |\n\n**战术运用：**\n- 判断对方哪位球员高压球较弱 → 优先挑向弱者\n- 混双：尽量挑向女球员\n- 双打：对方截击手打出深斜线后继续靠近网前 → 对角线上旋高球（斜线路线长，安全性高）\n\n---\n\n**技术要领（正手挑高球）：**\n- 采用**半开放式**准备姿势，提早进入击球准备状态，与打穿越球姿势相同（让对手看不出意图）\n- 引拍时：重心落于**后腿**，上体稍后仰，让球稍微靠近身体（不急于击球，而是稍等对手靠近）\n- 利用转体完成击球，以右腿为轴\n- 挥拍轨迹与水平方向角度约 **50～70°**\n- 随挥过程中：拍头在位置上要低于拍柄\n\n**反手挑高球：**\n- 双手反手上旋高球隐蔽性好，不易被识破\n- 单手反手挑高球：必须使用**完全的大陆式反手握拍**，肩部旋转越多上旋越容易拉出\n  - 完成由低到高的随挥 → 拍子靠近**持拍耳朵**（正手靠右耳，反手靠左耳）\n\n---\n\n**提高挑高球质量的 3 要素：**\n\n**① 弧度**\n- 防守时：要高 → 给自己时间回位，同时有机会打落地高压或落地球\n- 进攻时：控制时机，挑得过高会给对方更多后退时间和打击机会\n- 反拍高压是网球技术中难度最大的 → 尽量挑向对方**反手侧**\n\n**② 方向**\n- 大部分优秀球员将球挑到对方**反手侧头顶处**（反拍高压最难）\n- 如果对方反手高压能转为正手高压 → 说明挑球质量不够\n\n**③ 风向**\n- 顺风：大胆使用进攻型挑高球\n- 逆风：用**上旋高球**引导好球的方向，使球随风加速\n- 强烈阳光：**千万不要错过挑高球机会**（阳光让对手看球困难）—— 非常有效的战术\n- 切削挑高球在逆风时容易被吹出界，慎用\n\n---\n\n### （二）放小球（Drop Shot）\n\n**战略定位：**\n- 深浅结合战术中**精心伪装、巧妙运用下旋**的制胜手段\n- 深的底线削球与伺机切削上网的组合，加上突然而隐蔽的小球技术 → 令对手痛苦\n- 大幅度两边调动创造空当还不够，深浅结合才能给球路带来更有效的维度\n\n**高质量小球的标准：**\n- 近**擦网**而过\n- 在对方发球区内有**两次弹跳**且不高于球网\n- 最理想：由于强烈下旋，第二落点朝反方向运行，甚至能直接弹回本方场地\n\n---\n\n**什么时候放小球？**\n- **不要在错误时机放** → 很多球员在想用小球赢分时反而输掉\n- 不要在连续底线拉锯后冲动地放小球（对手察觉你的套路后会早早跑到位）\n- 时机：建立了深浅结合的切削战术体系后，才适时放出（要经常切削，使对手难以判断）\n\n**影响小球质量的因素：**\n- 动作的隐蔽能力\n- 对手的强弱\n- 天气、场地等\n\n---\n\n**如何隐蔽地放小球（4 要素）：**\n\n**① 有心设计**\n- 必须用与切削深球**完全相同的准备动作**来准备小球\n- 在连续的底线削球之后放出小球（前置铺垫必不可少）\n- 不能使用平击或上旋抽球的挥拍过程放小球\n\n**② 准备动作**\n- 向后拉拍 → 对手预期一个抽击\n- 球拍在拉动时停住 → 对手判断是深或浅的下旋削球\n- 因此准备动作要**尽量同平常击球姿态一样**\n\n**③ 挥拍和出手**\n- 隐蔽动作体现在球拍**向前推出的过程**中\n- 挥拍线路的改变要尽量类似抽击中的角度、旋转调整\n- **延缓对手彻底看清楚的时间**\n\n**④ 脚步**\n- 脚步和身形要**与平常抽击无异**\n\n---\n\n**方向与高度的设计原则：**\n\n- **方向**：人眼对纵深判断精确只有 4.5～6 米 → 小球**横向飞行**时对手预判能力大大提前，正面对打时成功率更高\n- **高度**：在深的底线削球节奏中放小球，要让球有一定高度，**正面初看仍像底线来球**（既要有高度伪装，又不能过高给对手奔跑抢击的时间和高度）\n\n---\n\n**技术要领（制造下旋）：**\n- 拍弦要恰好地**\"刷\"**向球的后侧\n- 拍面向上倾斜卸力\n- 不要试图用小球直接打 winner → 通常导致失误\n- 放小球也需要一点安全的空间，讲究安全的小球也能造成很大威胁\n\n---\n\n**放小球的效果：**\n- 对稳定底线型、很少冲网且在网前不适应的选手效果极佳\n- 对易于疲劳的选手效果好\n- 落点要离网很近，速度慢且带下旋，第二落点离第一落点很近\n\n---\n\n### （三）反弹球（Half-volley）\n\n> 反弹球是网球中**最难的技术之一**，特别是正手反弹球。球落在脚下时被迫的击球，介于截击和落地球之间——既不像落地球那样大挥拍，也不是突然冲击的截击。运动员通常不主动选用这种方式，但会被球选择，必须为此做准备。\n\n**核心要点：**\n\n| 要点 | 说明 |\n|------|------|\n| 主动移向球 | 不要等球来到脚前，要向球移动 |\n| 眼睛盯球 | 不要看远处，球很快就到脚前 |\n| 体前击球 | 必须在身体前方完成击球，要求精确的时间感 |\n| 低重心到底 | 把重心降到与球同高，保持低姿态**直到球离开拍面** |\n| 击球后才起身 | 完成击球后再试图站起 → 这样才能使球过网 |\n| 心态稳定 | 借助蹲伏和稳定，不要因反弹球而惊慌 |\n\n**技巧：**\n- 目标：球控制在对方**底线深处**，并尽量靠近网\n- 垫步并向球移动\n- 拍面尽量**垂直于地面**，做**向上提拉**的动作\n\n---\n\n\n<a id=\"ch2_s3_tactics\"></a>\n## 第二章 · 第三节 · 战略和战术（p153）\n\n> **战略**：有关比赛全局的计划。**战术**：比赛中具体计划的各个组成部分，受场地、环境（风、阳光）和心理因素影响。\n\n### 背景与核心观点\n\n- 网球被称为\"自杀性的项目\"：即便 ATP 高排名选手中，也只有天王级别才能做到主动得分多于主动失误\n- **初学者与职业选手的核心差别：\"谁发球谁输\"** → 初学者在学习时需注意个人情况与职业选手的区别\n- 战术意识应从技术学习阶段就同步融入，而非等到技术成熟后再补\n\n### 双打战术精髓\n\n- 双打精髓 = **利他性** + 两人场上的**站位**\n- 双打与单打最大区别：不是一个人打\n- 如果两人击球时都想着给同伴创造更多机会 → 配合自然好\n\n---\n\n### 一、单打比赛中简单的战略和战术（p153）\n\n**对于初学者：最重要的战略是保持球始终不失误（减少无故失误）**\n\n#### （一）一贯性与冒险性\n\n在比赛中，运动员击球的目的是使对方无法回击。有两种达到这种目的的方法：\n1. **坚持/稳定** — 保持不失误\n2. **冒风险** — 设法进攻、打死对方或迫使对方失误\n\n不同水平选手稳定击球与冒险击球的比例：\n\n| 水平 | 稳定 | 冒险 |\n|------|------|------|\n| 初学者 | ████████████ | 无 |\n| 稍有水平初学者 | ████████ | ████ |\n| 中等水平运动员 | ██████ | ██████ |\n\n> 早期训练以稳定性为主，鼓励保持击球成功率、避免无故失误。随信心与技能提升，逐渐将注意力集中在击球落点上，尝试打有控制的威胁性球，目的是迫使对方失误。\n\n---\n\n#### （二）把球击深\n\n将球击深（发球线后，接近底线）有许多好处：\n1. 迫使对手向后移动\n2. 迫使对手回击过来的球落地后起跳较高\n3. 与浅球相比，回击深球不易使对手打出角度\n4. 使对手远离底线，可降低对手回球的精确度\n5. 回击深球可常使对手回球较浅，使自己有更多进攻角度\n\n---\n\n#### （三）抓住对方的弱点\n\n若能真正地抓住对方弱点，则无需把球打得角度太大或打出致命球，便可收到很好效果。\n\n常见弱点：\n- **底线击球** — 正手或反手经常出现一边比另一边差\n- **处理球** — 初学者往往难于处理高而深的球\n- **击球步法** — 通常运动员在移动中比静止击球要困难\n\n---\n\n#### （四）提高击球的安全性\n\n在运动员早期训练阶段，用\"击球过网稍高\"和\"击出的球落在场地内一米左右\"的要求来鼓励他们提高安全感。\n\n---\n\n#### （五）击球线路与回位\n\n击球后回位较好的选手，不易被对方逼至防守。回位时，在对手回球前应设法回到与场地中间相关的位置，或回到对方回击角度的中间。\n\n**回位距离规律：**\n- 底线击球后：**击出斜线球**，回位距离比击直线球**短**（斜线防守覆盖面更小）\n- 网前截击后：**击出直线球**，回位距离比斜线球**短**\n\n> 击球线路的选择在很大程度上影响回位距离，应将二者作为整体考虑。\n\n---\n\n### 二、在五种比赛情况下使用的单打战术（p155）\n\n> 对于每种比赛情况都有一系列战术可供选手采用。运用这些战术需要具备相应的技术手段，可能要求在运用战术前经过进一步的技术训练。\n\n---\n\n#### （一）当自己发球时\n\n**1. 一般原则**\n1. 利用发球从一开始就控制局势\n2. 对自己的发球具有信心\n3. 变换发球位置和目标，使对方捉摸不定\n\n**2. 第一次发球**\n1. 通常将球击向对手弱的一侧\n2. 不要忘记发追身球\n3. 不要用力过大，通常用 70–80% 的力量即可\n4. 要稳，力求一发 70% 的成功率\n5. 如是大力发球，上网截击\n6. 如用中等力量发球（不靠发球得分），但有角度、球路明确，或跑至反手一侧，用绝招（正手）侧身击球\n7. 如一发很弱（防守型发球），呆在后场等待对手回球，回球可能击向你最弱的一侧\n\n**3. 第二次发球**\n1. 要稳，二发 100% 的成功率\n2. 用二发进行进攻\n3. 不要忘记发追身球\n4. 不要发短球，宁可发深球失误，不可发近网球\n5. 变换旋转和速度\n6. 如发球好，向前移动或上网截击，或跑至反手一侧侧身正手击球\n7. 如二发很弱（防守型发球），留在后场等待对手回球\n\n**4. 球路与旋转**\n1. 变换发球，使对手捉摸不定\n2. 关键分，发追身球\n3. 关键分时，用发球角度对付双手握拍左右击球的对手\n4. 根据场地类型采用旋转发球\n5. 右区发外角侧旋球，左区发中路侧旋球\n6. 发平球时，发左右区的内角\n7. 发上旋球时，右区发内角，左区发外角\n8. 留心对手是否是左手握拍或双手握拍击球的选手\n\n**5. 发球上网截击**\n1. 沙地：作为不寻常的打法令对手意外\n2. 快速型场地：多数情况下利用一发进攻得分\n3. 当对手接发球时，快速向前移动截击或快速跨步\n4. 沿可能的回球线路移动上网\n5. 发球时坚持发内角或追身球，越深越好\n6. 变换发球落点\n7. 关键分又是二发时，发球上网截击不失为出奇制胜的一招\n\n**6. 发球后击落地球**\n1. 发球后用正手进攻\n2. 发球后移至左侧和中央位置（右手握拍型选手）\n\n---\n\n#### （二）当接发球时\n\n**1. 一般原则**\n1. 让对手打，处理好接发球\n2. 力求将球击入场地一个特定位置（如对手的弱点）\n3. 变换接发球方式\n4. 可能时，改变接发球的速度和旋转\n5. 根据发球方的站位变换你接发球的位置\n6. 对付大力发球时，采用挡球式接发球：球落地后提前击球，迎上去挥拍，而非撞击；用正确的转髋转肩动作向后引拍，动作要小\n7. 接力量小的发球或弹跳较高发球时，动作要小\n8. 接有角度的发球时要提前准备，朝球方向斜线移动；打斜线球，留在后场\n9. 接发球时力求打深，不打网前球\n10. 接发球进攻时用上旋球和平击球，防守时用削球和挡球\n11. 力求判断和\"看穿\"发球方的意图（注意抛球动作）\n\n**2. 接第一次发球**\n1. 接一发要稳，力求不让一发\"轻易\"得分\n2. 如对手留在后场，接发球时用挡击打深的直线球，或有角度的球，或用挑高球送至对方反手；根据接发球的质量，上网截击或留在后场\n\n**3. 接第二次发球**\n1. 每当出现机会时，应有攻击二发的意识\n2. 攻击二发时，当球上升至肩高时击球，以保持场上主动\n3. 用正手侧身攻或跑动中正手打直线球\n4. 偶尔打一个轻吊球\n5. 对手二发时，向前移动或向反手一侧移动侧身正手进攻\n6. 如对手上网或留在后场，用近网上旋斜线球或深的直线球攻击；根据接发球质量，上网截击或留在后场\n\n**4. 如对手发球好、截击也好**\n1. 回一低的追身球封住角度；留在后场，使用两次穿越球战术\n2. 接发球时用深的直线球或小斜线球将球挡至对方脚下，留在后场\n3. 如对手发球后截击，设法朝对手果断回击，让发球方尝一点畏惧的滋味\n\n**5. 如对手发球好、截击不好**\n\n力求让对方截击，留在后场打间接的穿越球、挑高球或上网截击。\n\n---\n\n#### （三）当双方都在底线时\n\n**1. 一般原则**\n1. 通过连续施压迫使对手出现失误；保持高节奏；可能时，从 3/4 的场地击球\n2. 少让对手得\"便宜\"分；要稳，不要出现自杀性失误；底线球是最好的朋友，坚持打深\n3. 要利用整个场地；在底线后面挡球时不要打得太远\n4. 使用斜线对拉战术争取时间和控制；朝球的方向斜线移动；采用组合击球战术（如打深的直线球后接打对角斜线球）\n5. 处于被动时，放高球、打深、多打控制球、少发力\n6. 用平击球和上旋球进攻；对攻时变换节奏；用高而深的慢速球变换速度，然后打角度刁的或快速球\n\n**2. 击落地球时**\n1. 正手：在 3/4 的场地内用正手进攻和回击所有可能的回球\n2. 反手：打斜线是为了底线对攻，打直线是为了随球上网抢分\n3. 感到紧张时，避打轻吊球\n\n**3. 处于进攻时**\n1. 使出拿手好戏，力求调动对方，抢分\n2. 使用轻吊球，令对手措手不及，以便上网\n\n**4. 相持时**\n1. 打高而深的球和斜线球，调动对方\n2. 不可打穿越球\n3. 如对方主动打你的反手，朝反手方向跨步，用正手攻击\n\n**5. 处于防守时**\n1. 打调整球瓦解对手的优势\n2. 打高球、深球、角度刁的球\n3. 跑动救任何可能救起的球\n4. 朝球的方向斜线移动，对准球\n\n**6. 对手让出许多角度时**\n1. 打中路\n2. 不给对方让出角度\n3. 如对手打小斜线，用直线球抢分\n4. 尤其是对手的站位处于底线后的一侧时，有时不妨冒险一次，打一小斜线\n\n**7. 对手击出一个好球时**\n1. 朝对手弱的一侧击球，但朝对手强的一侧击球可得分\n2. 全身加力击球使对手暴露弱的一侧\n\n**8. 对手移动差时**\n1. 力求用组合击球、低球、挑高球等打乱对手的步法\n2. 当对手在跑动中或从远离的位置击出直线球时，可打一小斜线\n\n**9. 对手是一个好的底线型选手时**\n1. 吸引对手上网\n2. 使用发球上网截击战术\n3. 要耐心\n4. 用角度刁的近网削球将对手吸引过来\n5. 不要过多地放小球\n\n**10. 对手是技术全面型选手**\n1. 击落地球时要稳\n2. 不要出现自杀性失误\n\n**11. 对手使用极端型握拍法**\n1. 要尽力降低击球出的高度（如削角度刁的近网球）\n2. 迫使对手改变拍型\n\n**12. 对手是上网型选手**\n1. 打深球和角度刁的球\n2. 将对手压在后场\n\n---\n\n#### （四）随球上网或在网前\n\n**1. 一般原则**\n1. 用随球上网法（反常上网法）威胁对手，使之处于被动\n2. 从中场使用大力的准确击球或球在上升时击球，控制局面，威胁对方\n3. 上网，令对手措手不及\n4. 使用拿手好戏，随球上网\n5. 击球后朝对手弱的一侧随球上网\n6. 击向对方反手的深球、低的或高的弧圈球、反弹高的上旋球（攻击性的弧圈球）非常有效\n7. 打直线随球上网是安全的，打斜线随球上网可调动对手多跑\n8. 截击前先跨步\n9. 不要过多地使用轻吊球或空中短击，使用它们是为了将对手调至网前或作为一种出其不意的战术\n10. 步法要跟上球路，随球上网后上前截击\n11. 力求击出的网前球不超过 3 次（将球击出此区域）\n12. 斜线移动，保持平衡\n13. 要警惕，力求\"看穿\"对手的意图\n14. 中场截击球要深而低，网前区截击球应有角度、短而有力\n15. 随时防备对手挑高球\n\n**2. 中场打法如何运用**\n1. 截击：连续截击不要超过 3 次，截击空当抢分\n2. 击高球：始终将球击向对手弱的一侧\n3. 随球上网：先打一直线，随球上网，朝空当截击；除非对手步法错乱需退向后场，否则随球上网时不要打斜线\n4. 如果打出深而高的球，等候对手的反应，对手回球时上去封住直线穿越球\n5. 如果挑一高球，对手不用高球扣杀，你上网，但当心对手挑高球\n6. 如果击出一轻吊球，对手上来救球，你上网封死角度\n\n**3. 中场打法如何反应**\n1. 短球：上网用最佳击球打向对手弱的一侧\n2. 没有威力的中场高球：用空中截击、空中扣杀或空中抽杀攻击对手\n3. 齐腰高的中场球：打一深的截击球，移动至网前\n4. 打在脚下的低中场球：击一深的反弹球，或击一直线低截击球，或让球弹起后击落地球\n\n**4. 网前打法如何运用**\n1. 齐腰高的球：用最佳截击打空当\n2. 近网低球：用低截击打中路或打一角度刁的轻吊截击球\n3. 防备对手的穿越球或挑高球\n4. 高的慢速球：用空中截击或高压击向空当\n5. 很高的中场球：用空中高压打空当\n6. 很高很深的球：球弹起后扣杀中路并上网截击\n\n**5. 网前打法如何反应**\n1. 对手接回你的截击球或高压球，上网\"拿下\"这一分\n2. 对手来说中场球好打：不要后撤，瞄准一侧，截击穿越球\n3. 穿越球很难对付：空中拦击，不要后撤，斜线移动\n4. 斜线穿越球：不要打直线拦击球，要打小角度的斜线截击；打空中拦击球，让对手跑向最远的场角\n5. 直线穿越球：如果不能得分，万不可打斜线截击\n6. 被迫击反弹球时：要在身前击球\n7. 对方撞长穿越球时：变换随球上网战术，多留在后场以改变打法\n8. 对手不知如何打你的穿越球时：随时快速上网\n9. 不必过早地防备挑高球；观察对手击球时的拍面\n\n---\n\n#### （五）穿越球（破网）\n\n**1. 一般原则**\n1. 意图应是让网前选手\"得分\"\n2. 所有的穿越球应是低球\n3. 最好用最佳击球打穿越球\n4. 避免不必要的冒险：与其打穿越球下网，不如让对手截击（打深比打浅要好）\n5. 斜线穿越球应是短的角度刁的击球\n6. 打直线穿越球时应发力、打深\n7. 让对手在别扭的情况下（如打中路低球）截击，然后再打一穿越球（二次穿越球战术）\n8. 挑高球：始终挑高、挑深，要考虑风向\n9. 挑高球可拉开空当，以便接着打穿越球\n\n**2. 后场击穿越球**\n1. 用滑板打穿越球要准\n2. 攻击上旋高球时打两侧\n\n**3. 对手撞长随球上网、擅长截击**\n1. 结合打几个高而深的上旋球\n2. 让对手截击（观察对手截击是否失误），不让轻易得分\n\n**4. 对手撞长随球上网、不擅于截击**\n1. 打一穿越球让对手截击（观察对手截击是否失误）\n2. 或打一穿越球争取得分\n\n**5. 对手轻率随球上网**\n\n打一穿越球争取得分或挑高球。\n\n---\n\n### 三、影响因素（p161）\n\n#### （一）区域\n\n运动员在球场上所处的区域明显地影响着战术。四个不同区域：**底线；3/4场地；中场；网前**。\n\n- 离网越近，对来球的反应要越快；离网越近所获得的角度越大，也越易打死对方\n- 在区域内打死对方的能力受以下影响：\n  1. **接触球时球的高度** — 球越低越难打死对方\n  2. **球处在场地中间还是边上** — 来球即短又靠边，则很可能打死对方\n\n#### （二）击球状态\n\n| 状态 | 说明 |\n|------|------|\n| **防守** | 被攻击时，设法打出弧线较高的球，获得更多时间回位，并便于球过网时较安全 |\n| **对持** | 不会被迫失误，也不该设法逼迫对方失误；只要保持球的成功，等待对方失误；技术越高越能改善击球深度和节奏 |\n| **进攻** | 设法使对手处于被动防守，使对手大范围跑动，然后抓住弱点；要比简单对打承担更多风险 |\n\n#### （三）击球方法的选择\n\n将来球分为三个等级，用颜色代号判断战术：\n\n| 颜色 | 含义 | 战术 |\n|------|------|------|\n| 🟢 绿球 | 容易打的球 | 设法占据主动 → 进攻 |\n| 🟡 黄球 | 中等难度的球 | 回击要小心 → 对持 |\n| 🔴 红球 | 难打的球 | 回击要特别小心 → 防守 |\n\n> 初学者大部分要打的是\"黄色\"或\"绿色\"的球。随技能提高，感知到的\"红球\"比例会增加。球的颜色与运动员的技术水平有关。\n\n#### （四）运动员/对手的特性\n1. **技术水平** — 特短、特长等\n2. **身体因素** — 年龄、成熟程度、灵活性等\n3. **打法类型** — 敢冒险/进攻者 或 保守者/防守者\n\n#### （五）环境\n1. 场地地面\n2. 风\n3. 太阳\n4. 天气\n5. 气温\n\n---\n\n### 四、双打战略、战术（p162）\n\n> 许多单打的战略和战术也适用于双打中，然而双打比赛中两人的站位和进攻是非常重要的。目前的发展趋势是在保护好本人区域的情况下，大胆抢网，重视第一拦的重要性，站位更加靠前。澳式站位当前使用较多，但要明确，它所针对的是对手习惯于斜线击球时使用。\n\n**前三点主要适合于初学者：**\n\n（一）不要用全力打球；稳定的击球是取得双打胜利的关键\n（二）不要在中场处击球\n（三）注意第一次发球的成功率\n（四）尽快地设法冲到网前\n（五）别让对方占据网前优势\n（六）把球打向场地中间\n（七）接发球回击斜线或挑过对方的头\n（八）用挑高球来回击对方的放高球\n（九）除挑高球外，要保持球过网后尽量低于网\n（十）像一个整体一样打球\n（十一）当在网前时不时地抢网，以便让对方不停地猜测\n（十二）同伙伴多交流\n\n---\n\n<a id=\"ch2_s4_teaching\"></a>\n## 第二章 · 第四节 · 教学课的组织与训练方法（p163）\n\n### 一、教学课的组织\n\n> 教学质量的体现，很重要的就在于组织，在于管理，在于领导。好的教练的标准是：从他的运动员那里是看不出他的影子的（运动员不依赖教练，形成自己的技术）。\n\n#### （一）一般教学课的组成部分\n\n1. 开会/介绍\n2. 准备活动/评估\n3. 示范和解释技术动作\n4. 示范用何种方法进行某项技术练习/对打\n5. 实施练习/对打\n6. 为保证训练质量，应观察和收集反馈\n7. 练习比赛/趣味性比赛\n8. 整理活动和讲评\n9. 表扬训练并鼓励运动员参加下一次课的练习\n\n#### （二）准备\n\n1. 运动员的人数和年龄\n2. 运动员的要求和期望\n3. 球场数量\n4. 有无空墙\n5. 网子、网柱、球拍、球等等的情况\n6. 适合于运动员的座椅及其它练习辅助物\n7. 课的长度/持续时间\n8. 更衣设备/厕所/水\n9. 个人设备：笔、哨、笔记本、书写板、粉笔和秒表等\n10. **写教案** — 应在上课前做好准备；该准备包括对阶段目标的简述、需提高的技术、训练过程中所用的方法、训练课的组织、比赛和分配给每项训练内容的时间；这些材料应保存在教练的文件夹内，以备将来使用\n11. **准备好一切必须的设备** — 列出所需设备的名称，其中包括球、硬币、目标物、绳子、小球拍、黑板等，并将这些设备放在手边\n12. **做好示范的解释计划** — 事先做好要训练内容的技术动作的示范和解释计划\n13. **做好练习计划** — 事先做好可能要采用的提高训练/对打技术的计划；决定采用何种轮换运动员的方法，还要决定采用何种喂球方式、教练的站位和每项练习的轮换时间；做好需增加的练习/对打或队员的配对，以及队员的缺席准备\n14. **比赛准备** — 准备比赛应把近期需要的技术考虑进去，并做好解释和示范如何比赛的准备\n\n#### （三）安全\n\n确保每堂训练课的安全是教练最重要的职责。上集体课是有危险的，因为许多人在规定的区域内要共同的运动。保证安全的方法有：\n\n1. 把球筐放在运动员跑动时碰不到的地方，或者避免运动员从球筐内取球时出现意外的伤害\n2. 把左手放在适宜的位置，以免碰到其它运动员的球拍\n3. 将运动员分散开，这可以避免运动员之间球拍的相互碰撞\n4. 控制粗野的挥拍，要求运动员了解网球是一项控制的比赛\n5. 避免在对打和练习中将运动员安排在会被其它运动员打出的误伤的地方\n6. 经常移开可能被运动员踩上的球\n7. 将球场上的水和尘土清除干净，以防滑倒\n8. 在整个课堂上要始终关心全体运动员，不要将背对着课堂上的部分运动员\n9. 在上课时，不要离开场地\n10. 做示范动作时，确保运动员不要做挥动球拍练习，因为他们可能碰着其它的运动员\n11. 在练习中携带急救箱\n12. 了解急救处理的方法，以便伤病/意外伤害事故发生后教练知道如何去处理\n\n#### （四）击球示范动作\n\n> \"一张图画胜过千言万语\"——教练必须能做出清楚可见的、而又理想的动作示范。教练必须能做出不同类型发球、正手和反手底线球、正反手截击和高压的示范动作。\n\n做示范动作时应注意以下几点：\n1. 在开始做示范之前，应说明为什么该技术或击球动作是必须的以及其它的用处\n2. 示范动作要慢\n3. 使用各种形式的击球示范动作\n4. 在做分解示范前先做完整的动作示范\n5. 分析和示范球、拍和身体的关系\n6. 确保所有运动员都能清楚地看到教练所做的示范动作\n7. 多次重复示范动作\n8. 在做示范动作的同时用简单的语言描绘动作；做示范的同时，使用关键词和句子（如用\"从下向上\"来作为底线击球的关键词）\n9. 只要适宜，可在比赛时做示范动作（如，不要等两跳后再击球过网）\n10. 让运动员从不同角度都能看到示范动作\n11. 不要忘记运动员会经常要使用教练示范的正确的击球动作\n12. 记住：**任何人都是用80%的时间，通过观摩和模仿来学习；任何人都是用20%的时间，通过听、读和分析信息来学习**。因此教练在做示范动作时别忘了讲解！\n\n#### （五）送球（喂球）\n\n教练必须能送好球。好球意味着手送或用球拍送的球要力量大小适当，而且落点应是运动员能做好特殊击球动作的地方。送出的球应符合运动员的能力和所学击球动作的要求。\n\n**五种不同形式的送球：**\n1. **下手抛球/送落地球** — 慢慢地把球送至正、反手底线击球的位置，或截击的位置；由于手抛球的速度非常容易控制，因此这种方式的送球最适合于初学者\n2. **落地式送球** — 落地式送球包括球在运动员身边落下（自我预测）；可由教练送，也可由运动员自己送，或击球者自己送的落地式送球；由队员或击球者自己送的落地式送球用球拍打落地式送出的球通常是一种从中场和底线的送球方法，这种送球方法可使运动员有更多的击球准备时间\n3. **用球拍打凌空球送出的球** — 通常是一种从网前或中场送球方法，但有时也用在从底线送球；因为首先这种送球方法允许教练在送球时，能比落地式送球快；其次是当教练送球时能观察对方；送球前送动作小，用截击式击球和开放的拍面来完成这种送球；教练可以用控制球拍来达到控制球的目的；**为了送球效果更好可将球筐放在教练的手边**；在网前截击式送球中，教练必须将球截到使运动员能够打底线球或打截击球的适宜位置；要想使截击送球更有效果，教练必须学会控制球速\n4. **底线对打中的送球** — 送球的位置可从中场也可从底线；这种方法在一对一或近似于一对一的教学中经常使用，并且包括让运动员用一种击球方法将球打到规定的场地上特定区域内，这与机器送球练习法相似\n5. **栏击对打送球**\n\n**送球的一般问题：**\n1. 送出的球离运动员太近\n2. 对于运动员的水平来讲，送出的球飞行太快\n3. 给初学者送上旋球\n4. 运动员之间自己送球时，送球者离网太远，而对面击球者离网太近（球网成了送好球的障碍）\n5. 送球的运动员离击球者太近\n6. 等待击球的队伍太长\n\n**当运动员相互送球时，应注意：**\n1. 告诉运动员正确的送球方法\n2. 使其在没有击打的过程中练习送球\n3. 确定让他们击中的目标，以帮助提高他们的准确性\n\n**送球的频率：**\n1. 重复是提高技术动作的有效方法——如在可能的地点运动员应能连续地几次击球\n2. 一旦一种练习开始，运动员有明确的被训练某种技术动作的想法，他应有重复几次这种技术的动作的概念，并在练习中能得到被纠正错误动作的机会\n3. 送球练习时，应让每个运动员至少打两次球，这样可以给运动员更多的成功机会，并且也可使教练有更多评估运动员动作的机会；**如果可能的话，排队的队员不应多于3名**\n\n---\n\n### 二、教学过程（p166）\n\n#### （一）介绍\n\n有许多种向初学者介绍网球的方法，这些方法通常包括逐步地介绍基本击球方法的过程（如底线击球、发球、截击和高压）。教学过程的种类取决于许多因素，其中包括：运动员的年龄；是集体教学还是单独教学；运动员的理解能力/智力——运动员能否吸收通过语言传授的技术信息，运动员越年轻，越需要形象化的信息；可行的工具和设备。\n\n为了达到打网球比赛的标准，运动员必须提高：**感觉能力**（正确判断球飞行的能力：速度、旋转、轨迹等）和**移动到正确击球位置的能力**（这包括最初对球的跟踪和随后向球落地处的移动）；**预测能力**（一旦将球击出后向目标移动的能力）。\n\n可分为两种类型：原地的/送球过程；移动的/对打过程。\n\n#### （二）原地的/送球过程\n\n这个过程无需运动员做太大的运动。开始由教练或运动员的同伴用手送球，以便使运动员能注意自己的技术。运动员可以发展完美的击球动作（感觉能力），但预测能力得不到训练。在网球比赛中需要更多的是预测能力。\n\n- 原地教学过程有时包括把击球动作分解为各个部分：如底线击球，分为准备动作、向后引拍、近步/重心转移、击球点、随挥动作；运动员可通过不打球而模仿标准动作来达到学习动作的目的，然后运动员开始打不同难度的被送过网的球\n- 送球方式有：落地式送球、下手送球（没有隔网）、上手送球（有隔网）、用球拍送球、栏击对打送球、底线对打送球、打比赛/练习比赛；送球可由教练去做，也可由运动员相互去做；运动员水平提高后便可打比赛了\n- 原地教学过程的优点是运动中能获得什么是\"完美击球\"的良好感觉；他们可以学习击球中的重要部分，并且能使他们像教练要求的那样同别的同伴一样去做（少儿教学法）\n- 主要的缺点是，运动员不能得到很好的提高；这种练习如过长也能使人感到枯燥；在原地送球教学过程的最初阶段，运动员没有打比赛的机会（如同对手打斜线网前对打等）；这种方法常是他们最初接受的教学方法的原因\n\n#### （三）移动的/对打教学过程\n\n这个训练的过程的目的是培养感觉和预测能力。教练在这种训练中可让运动员相互对打，并以此来帮助运动员提高移动和到位的能力。\n\n- 移动练习对打练习的难度应逐渐增加；这种练习在开始实施时，通常用简单的后拉拍，并开始轻轻地把球打过想象中的球网或从近网处打过网；运动员逐渐的从网前向后底线移步，并增加后拉拍的幅度和随挥动作\n- **在初学者刚开始接触网球阶段，使用移动击球练习的最成功方法是小场地网球**\n\n#### （四）小场地网球\n\n小场地网球是向少年儿童介绍网球运动的有效而又有趣味的方法。使用小场地和简易球拍或木板，这样运动中便有更多的打球条件。在一开始便可实际接触网球。运动员可通过模仿教练、老队员或网球名星的动作在对打中很快地学会正确的动作和运用网球基本技能的方法。\n\n- 小场地和小球拍是非常重要的；使用明快的球（如海绵球或带颜色的球）也会对学习网球有所帮助\n- 小场地网球的基本宗旨：\n  1. 通常击球动作可以不被打乱，运动员从一开始便被鼓励着学习完整的击球动作\n  2. 运动员通过观看、模仿和亲身参加学习打网球；因此小场地网球的基本理论包括教练说的或用语言解释很少，而是教练通过示范来达到教学目的\n  3. 运动员在练习中完成教练的训练是在训练感觉能力和预测能力中进行的\n  4. 如果运动员都参与，并且能感到兴趣，那他们将会对下次训练充满信心\n\n随着运动员年龄的增长，他们逐渐地在大一点的场地上进行训练，并使用稍大点儿的球拍，直到最后在正规的场地上进行练习。\n\n---\n\n#### （五）把原地和移动练习过程结合起来\n\n除小场地球场外，教初学者打网球的另一种有效方法是通过把一些原地练习和一些跑动对打练习结合起来。原地练习能帮助运动员获得清晰的动作过程和良好击球动作的感觉（如改进技术）。移动练习可使运动员发展感觉能力（移动击球等），在比赛中这种技术是需要的。**在每种练习中适宜的时间应是：原地/送球练习占1/3；移动练习/对打练习占2/3。**\n\n徒手挥拍练习非常重要，并且应在练习的整个过程中运用它。如运动员不能挥好拍，他们则不能完成好实际中的击球。如运动员能挥好拍，那么他们会想象和感觉到击球的动作。以后他们会比较实际击球与挥拍有何不同（如把自己的击球同击球模式进行比较）。当教练不在场时，这可以使他们自学。\n\n---\n\n#### （六）教学过程\n\n有许多教授运动员打网球的方法，重要的一点是确保教学内容包括对运动员的预测和感觉能力的培养。在初学阶段，运动员通常需要采用以下过程：\n\n- **熟悉球拍和球**（控制能力）\n- **接球**（不用球拍）：如投/抓球\n- **自我预测，控制球原理**：包括方向、距离、高度\n- **感觉与同伴的预测**：合作，设法打到同伴手上（连续打多少次）；比赛，记分，设法打到同伴接不到的地方\n\n---\n\n##### 1. 底线固定和移动练习的过程\n\n| 步骤 | 内容 |\n|------|------|\n| 步骤1 | 运动员用正确的握拍方法，自己向上击球打到目标内 |\n| 步骤2 | 运动员和同伴轮流把球打到同一个目标内 |\n| 步骤3 | 运动员和同伴把球打过假设的网子或小障碍后落到目标内 |\n| 步骤4 | 运动员同伴把球打过网落在目标内；运动员可打两次球：一次为控制，另一次是打过网给同伴 |\n| 步骤5 | 运动员和同伴打过网并落在各自目标内，两名运动员最大间隔为2米 |\n| 步骤6 | 运动员逐渐向底线移动，并增加随挥动作；仍将目标定在各自一边；当一移到底线附近时，应加大后拉拍动作 |\n| 步骤7 | 运动员可在半场上记分；在两次连续击球过网后再记分 |\n\n**注意：**\n1. 运动员应用落地发球来开始对打\n2. 在练习过程中，应不时地给运动员做正确的示范动作\n3. 必须给运动员挥拍练习的机会\n4. 在步骤3、4、5和6之间，应给运动员原地击球练习的时间（如一个运动员送球，一个学员练习击球）——这样可以给运动员一个理想击球动作的良好感觉，而且这个感觉可在实际对打练习中逐渐得到应用\n\n---\n\n##### 介绍底线击球中握拍变化的方法\n\n| 步骤 | 内容 |\n|------|------|\n| 步骤1 | 击球者站在发球线上，送球者先送到正手，击球者喊出\"侧面\"并将手移到球拍边上；然后送球者送到反手边，击球者喊出\"上面\"并将手移到球拍顶部；送球者交替送球，击球者边喊出指令边换握拍 |\n| 步骤2 | 送球者将球送到某一边（不告诉对方），击球者喊出指令并变换握拍；击球者和送球者轮换 |\n| 步骤3 | 运动员自由对打，两人都要边喊指令边变换握拍 |\n| 步骤4 | 运动员在3/4的场地上对打，逐渐移到底线；继续在适当时候喊出\"顶部\"或\"侧面\" |\n\n---\n\n##### 2. 典型的发球练习\n\n**基础步骤：**\n\n| 步骤 | 内容 |\n|------|------|\n| 步骤1 | 保持抛球平稳：将球抛向目标或某个距离；保持身体平衡，双臂同时运动（双手一起举起） |\n| 步骤2 | 运动员做发球挥拍 |\n| 步骤3 | 练习抛球：抛出球后，使球还能落回到抛球手里 |\n| 步骤4 | 站在网子附近，做一次发球挥拍练习，然后发一个球；保持住完成动作并保持平衡；将发球挥拍和实际发球进行比较 |\n| 步骤5 | 在网子附近将球发到发球区内；当连续5次都能正确发进区域内后，从近网处向后退3步，再发球，逐渐退到底线后 |\n| 步骤6 | 在半场进行练习：两人发球，一人接发，可进行记分 |\n\n> **注意**：可在运动员两脚之间放一把球拍，以保证他们在发球过程中或抛球时平衡。抛球不好常可引起失去平衡。\n\n**发球分解练习**（当运动员在合理时间内不能掌握整个动作时适用）：\n\n| 步骤 | 内容 |\n|------|------|\n| 步骤1 | 正确握拍：将球拍拍面垂直地面，练习用球拍边拍球 |\n| 步骤2 | 对着后挡网，侧身站立，将球拍放在身后，练习将球拍向前上方挥出伸直，并用拍边轻拍后挡网 |\n| 步骤3 | 同上，改用拍面来轻打后挡网 |\n| 步骤4 | 将球拍放在身后，练习抛球并用左手抓球 |\n| 步骤5 | 站在挡网附近，将球拍放在身后，练习抛球，并用拍边将球打向挡网 |\n| 步骤6 | 同上，改用拍面轻拍球 |\n| 步骤7 | 站在球网附近将球拍放在身后，抛球，并将球击过网 |\n| 步骤8 | 同上，但增加随挥动作 |\n| 步骤9 | 做整个发球的挥拍动作，双手配合 |\n| 步骤10 | 在近网处练习一次发球挥拍，练习一次发球；进行比较，随时更正 |\n| 步骤11 | 逐渐向底线后退 |\n\n---\n\n##### 3. 截击练习过程\n\n| 步骤 | 内容 |\n|------|------|\n| 步骤1 | 运动员开始时双手在身体前方；同伴投球，运动员用右手抓球；抓球后手要保持抓的动作（对于反手截击，用手背面练习与球相碰，或伸手抓球） |\n| 步骤2 | 运动员抓住球拍颈并设法用球拍拍面接球；近步要与击球相一致；运动员逐渐握向球拍柄处；可靠近挡网处进行向后拉拍，以防止过分后拉拍 |\n| 步骤3 | 一名运动员作为击球者，另一名作为送球者和接球者；运动员交换着用正手和反手将球截击给教练手里 |\n| 步骤4 | 在正手截击处排队；确保每对运动员的球拍是正对着的；运动员在球网和发球线之间交替进行正手对打截击练习 |\n| 步骤5 | 同上，进行反手截击练习 |\n| 步骤6 | 送球者可随意送球（如高/低，正手/反手）；击球者设法将球截击给送球者的手上；击球者设法在送球者接住球前还原 |\n| 步骤7 | 控制截击练习：运动员和同伴站在球网和发球线之间；设法用正手、反手截击来保持球的回合；运动员应尽量在对方接触球前还原 |\n\n---\n\n#### （七）教学课案例分析\n\n提高第一堂课的质量，并且所有的课程都应该：\n1. 使运动员经常在场上打球\n2. 使网球更加容易的学习，而且更加有趣\n3. 通过激发他们对现代网球技术的热诚，增加经常打球的运动员的数量和他们打球的次数\n4. 在课堂上以开始提高网球技术和模仿最喜爱的职业运动员动作为主要内容向运动员授课\n\n在我们教授如何打网球的时候，有一些相似性方面存在于内容、表面和技术方面——一些基础的技术是否被引入、复习或者改进。这些技术包括预测来球的路线和击球的能力，准备击球最有效的身体站位，作连续击球时动作恢复的方法。我们力争建立一套完整的、平衡合理的教学方法，在教学时使运动员根据自己的需要而达到所期望的水平。大多数的网球运动员只要达到他们的需求后，会继续进行网球学习，这些需求可能来自社会的、生理的、竞争等方面。人们在场上打球依据的基础是一种变化中的平衡，协调好运动中身体的、技术的、战术的、战略的、思想的和环境各个方面。\n\n无论是正手击球，理解一个实战的策略或者是用我们的场地实施去组织一场比赛，我们最好的学习方式就是去实践。在我们实践的参与的过程中，不仅我们的学问，听说、观察和讨论的能力也会得到提高。\n\n当我们中的大多数人去打网球时，网球的装备、击球的技术和战术已经与现在不同了，而我们的运动员主要是视觉为主的学习者。如果作为老师我们能示范技术、讨论策略、采取一些适合我们不断变化的网球运动的方法，那么就会更好地提高他们的能力。我们打球时的知识是在不断地被修改和扩充的，作为教练也必须要对如何教学而做出调整。\n\n> **例如**：东方式正手握拍击球，过去是采用近身或者平行站位，大幅度转肩或部分转肩，力量产生于转体过程中的腰部向前的冲量和手臂的摆动。而今天的正手击球采用的站位更加开放，握拍时更趋向西方式，力量多是由髋关节和肩部转动而产生。\n\n现代网球是没有标准的教学方法。我们没有必要像职业选手那样学习如何去击球，因为对于新运动员教授现代的击球方式是更加困难的。我们也愿意改变我们教学中的方法，使我们的课堂和教学计划更适合于那些没有网球学习背景的运动员们。\n\n我们可以让这些运动员每个人在开始上课的前15到20分钟都站在底线或者网前，给予他们一些较好的击球机会，那么他们就会得到很好的学习，感到非常多的乐趣，同时会在实际的打球中赢得宝贵的自信心。**网球并不是很难学习，你的工作就是在球场上以最有效的最简单的方法去教授新的运动员。**\n\n竞争是保持大家在球场上打球的动力，运用富有创造性的方法，鼓励你的新运动员投入到有趣且富于竞争的环境比赛中。同时，你要尽早的安排好这些，甚至有时要做的更好一些。\n\n---\n\n##### 正手击球练习案例（课案示例）\n\n| 项目 | 内容 |\n|------|------|\n| **1. 课的任务** | ①提高正手击球速度；②加强高压球的稳定性 |\n| **2. 授课对象** | 北京体育大学2005级体育教育网球专项学生12人 |\n| **3. 课次** | 第28次 |\n| **4. 时间地点** | 2005年11月14日下午14:40—16:20，北京体育大学3片室外网球场 |\n| **5. 热身** | — |\n| **6. 常规练习** | 正、反手小场地练习 |\n| **7. 学习新课** | 100分钟的教学训练课，上课30分钟后开始提高正手击球速度的练习，练习约50分钟 |\n| **8. 讲解** | 根据五阶段训练法，在进行了稳定、连贯、准确的练习后，要提高击球的速度，而球速的提高主要靠挥拍速度的加快 |\n\n**9. 示范与要求（三种形式）：**\n\n**第一种形式**：用普通球拍作正手徒手挥拍15次，再用一把在球拍头部套着球拍套的球拍（图2-621），徒手挥拍15次。两人轮流练习，每人重复3次。通过加减阻力的方法提高挥拍的速度。正手作完后练习反手，也按此要求去做。\n\n> 图2-621 做加拍套的挥拍练习\n\n**第二种形式**：用没有穿球弦的球拍击球，同伴在发球线附近下手喂球，先打正手。用没有穿球弦的球拍打9个球（图2-622），再用穿球弦的球拍打9个球，两人轮流练习，每人重复3次。正手打完后再打反手。试一下会有新的感受。\n\n> 图2-622 用没穿球弦的球拍挥拍击球\n\n**第三种形式**：用两只球筐或两只手放在击球者的身后（图2-623），先练习正手挥拍，要求击球者向前挥拍时从两只球筐的中间穿过，注意穿过的时机应在重心前移的过程中。此时的动作要求腕关节与肘关节接近水平，球拍头低于腕关节，当球拍从两球筐中间抽出后，击球者的肘关节要主动向前送出。此项练习主要体会超越器械动作和增加球拍头的加速距离。练习两组，每组15次。\n\n> 图2-623 固定两球筐中间的挥拍练习\n\n**10. 分析**：\n\n- 一、正手击球：12人，4人一组，一人送球，两人打球，分别在两块场地上同时进行，轮流练习，每人打15次\n- 二、12人共打若干次，每人15次\n- 三、高压球练习同样安排12人分组进行\n\n**12.2 练习数据记录**（示例）：从325分降至294分；均分约101.46分；约1分2.6次击球。\n\n**15条建议**（教学建议，适用所有练习）：\n1. 二人为一组\n   - ① 从简单动作开始\n   - ② 逐步增加难度\n   - ③ 在步骤3、4等阶段给予原地练习时间\n   - ④ 教练随时给予示范和纠正\n\n---\n\n## 三、技术训练方法\n\n### （一）比分制训练\n\n比分制训练是将竞争评比引入训练的方法，用记分的方式进行练习，以评比来激励运动员，主要是在运动员掌握了初步的技术动作后采用的训练方法。\n\n**1. （标题及方法见p172，不清晰）**\n- 目的：鼓励主动进攻，多上网，防止不必要的失误；提高接发球在对抗中的准确性\n- 要求：思想集中，组织运用好自己的技战术\n\n**2. 二对二，发球结合上网**\n- 方法：每一边发四分球换，单打一对一，一人只能连续打两分，第一分失误换同伴上；15-20分为一局。①第一发球对方接失误可得1分，第二发接失误不算分；②主动进攻得1分；③拦网对方没摸到球得1分；④无谓失误减1分\n- 目的：鼓励上网，提倡进攻和提高第一发的命中率\n- 要求：多动脑筋，组织运用好技、战术\n\n**3. 二对二，对抗**\n- 方法：下手发球随便哪方谁发，单打一对一，第一分失误换同伴上，第一分得分可打第二分比赛，15分为一局。①直接得分计两分；②主动进攻得1分；③无谓失误减1分\n- 目的：拼救难度较大的球和减少无谓失误\n- 要求：大胆运用平时练的技、战术\n\n**4. 双打用单打场地，网前随上（图2-624）**\n- 方法：二人站在网前发球线前一步的位置，教练把球送到底线方中场，让对方抽球上网，使四人在网前拦击；抽上累计胜三分者到对方网前位置，网前人累计胜15-20分为一局\n- 目的：加强网前反应和网前移动封位\n- 要求：网前人前迎顶球，不要向后退\n\n**5. 二对二，底线全场正手比赛（正手移动进攻）**\n- 方法A：单打场地，下手发球，双方两人轮换只打一拍球，但这拍球只能用正手打，反手打算失分；全场是正拍比赛，15-20分为一局\n- 方法B：一人发4分球换，每分球的比赛只准打一次反手（除接发球之外），21分为一局\n- 目的：促使脚下快速移动和调整步法，正手大胆进攻\n- 要求：集中思想打好球，用战术组织进攻\n\n**6. 一对一，心理训练**\n- 方法：用第二发球，一人发6个球换；连胜2分算胜1分，11分为一局\n- 目的：练比赛的思想情绪，模拟训练比赛中的每个关键分怎样打\n- 要求：即要小心，又要敢打，争取胜利\n\n**7. 一对一，单打变化**\n- 方法：一人发2次发球换，6分起步计分，计分是正12负零为一局；拦网直得2分，对方摸到球1分，主动进攻得1分，无谓失误减1分\n- 目的：提倡多上网，主动进攻，减少无谓失误\n- 要求：打球变化及多样性\n\n**8. 一对二，发球与接发球**\n- 方法：二人轮换发球，1人接发球，发球员连得2分换到对方接发球，接发球员累计得15-20分为一局；发完球同正常比赛一样\n- 目的：发球与接发球的对抗性、准确性、成功率\n- 要求：发球落点多样化，不要用身体语言告诉对方落点；接发球的人后摆不要大，身体、脚步向前迎\n\n---\n\n### （二）线路训练\n\n**1. 一对二，底线对抗正手进攻两点（图2-625）**\n- 方法：底线对底线，一人方正手进攻两点，二人方轮换跑动还击2拍球到对方正手和偏中间位置；5个球换人，三人轮换\n- 目的：主要练底线正手对抗中的进攻准确和稳定性\n- 要求：双方各尽全力，少失误，争取主动；用力还击打准自己的目标\n\n**2. 一对二，斜线发球上网打法（图2-625）**\n- 方法：二人轮换发球上网，第一分发上胜可打第二分；1人接发球，发球上网胜10分换一个到对面接发球\n- 目的：提高发球上网与接发球的对抗性\n- 要求：发球落点多变化，注意发球向前的连贯动作；打好第一拦；后摆不要大，注意脚下重心跟上（发球结束脚要踏进球场）\n\n**3. 四条线对拉**\n- 方法：底线对底线，打四条线，一条线发力打十分钟，要将球打深，十分钟只准失误3-5次；每两人1个球，失误后小跑步捡球接着打\n- 目的：练习底线回合，提高回合数量，增加训练密度和强度，提高手上控制能力\n- 要求：脚下不停跳动，发力加速旋转，球打深，少失误（提高底线稳定性）\n\n**4. 一打二，底线8字移动（图2-626）**\n- 方法：底线一人跑动打直线，二人打斜线；每2分钟交换，共4-6组，三人循环交换；打一半组数可变一条线打\n- 目的：主要练无氧训练，跑动中打好球\n- 要求：每个球积极努力去拼，累时要坚持；两人边和一人边的角度要打开，球速可适当控制\n\n**5. 一打二，网前对底线（图2-627）**\n- 方法：二人底线，一人站网前拦网；每隔三分钟或一分半钟轮换一次\n- 目的：主要练拦网人在强度面前，前迎顶球和回击推深能力\n- 要求：互相用70%~80%力量速度，双方减少失误；底线人注意跑动起来打好拦网人的来球；拦网人扑救底线来球，不要只站在原地不动，累时动作也要积极，快回位迎击球\n\n**6. 一打二，底线正手打目标，底线击球准确性（图2-628）**\n（内容见p175续页，p176-177未收录）\n\n> ⚠️ **p176-177页（第7-11条）照片未收录，以下从第12条续接**\n\n**12. 一对一，底线左右移动拉上旋（图2-634）**\n- 方法：底线左右移动，一方跑动移动拉上旋，另一方把球打到对方中间深区；球在中间路跌落跳高；4-6组，拉进中间10-15个球换一拍\n- 目的：主要练在被动移动中拉上旋球，给自己的回位争取时间，缓解对方进攻力度\n- 要求：不要形成跳高球，拉上旋球\n\n**13. 一打二，网前对拦（图2-635）**\n- 方法：二人网前，一人方站直线，也可二人方站网前；4-6组，打一半组数，组数可变一条线\n- 目的：主要练一人方网前的移动截击，加强控球；脚下踏踏实实，互相用70%力量速度，来回要多\n- 要求：两人方打开位置，互相接控球，球打的不要太猛，用60%~70%力量速度，跑动积极\n\n**14. 一打二，随球上网，网前对底线（图2-636）**\n- 方法：底线站两人，一人随球上网，同二人底线对抗，退到底线再随球上网；5分钟比赛，三人轮转\n- 目的：加强随上的对抗性，增加体力上的强度和密度，提高在激烈竞争中取胜\n- 要求：双方思想集中，就像比赛一样，认真对待每一个球失误\n\n**15. 一打二，中场变签球对底线（图2-637）**\n- 方法：二人在底线，一人站底线后一步（发球线后中场）；5分钟交换，三人轮转\n- 目的：主要练底线主动中突击上网，脚下注意调整步法，一定要迎前打球，打球的位置在腰部以上及肩的部位\n- 要求：脚下注意调整步法，球在迎前打，前迎一定要完整\n\n**16. 一打二，底线双8字移动（图2-638）**\n- 方法：底线对底线，三人轮转；一人方先打一拍直线，再打一拍斜线，反手同样；二人方打斜线；5分钟交换，也可2-5分钟交换\n- 目的：主要练对手上控制球与变化的感觉；互相用70%力量速度，来回要多\n- 要求：球打的不要太猛，来回要多，跑动积极\n\n**17. 一打二，底线正手对一前一后（图2-639）**\n- 方法：二人在底线右半区，对方是底线正手对，对打练习（反手反之）；5分钟对抗，5分钟交换\n- 目的：主要练底线正手对抗，进攻能力，变速能力\n- 要求：思想集中，积极争取主动，注意打球的多样，底线人中间偏反手让正手侧身击球\n\n**18. 一打二，网前对底线8字（图2-640）**\n- 方法：一人方站底线打直线，二人站网前打斜线；一分半钟交换，4-6组，三人轮转；打一半组数可变一条线路，也可1分钟交换\n- 目的：主要练无氧训练，增大难度，跑动中回击的能力\n- 要求：来回要多，每个球努力去追，要有坚持的精神，二人方为一人服务\n\n**19. 三对三，网前对拦（图2-641）**\n- 方法：1个球打，每人打一拍退下，双方是三人轮转打球，以来回多为主，打至少10个回合\n- 目的：大家训练集中思想，练手上的感觉，脚下不停的小步跑\n- 要求：有一定的对抗性，脚下不停的跑动，手上要控制好球\n\n**20. 中场一拍随上，接着网前对拦（图2-642）**\n- 方法：对方网前站一人拦网，这边中场抽球随上，上网后二人在网前对抗拦网，失误换另一人随上\n- 目的：主要练一人方拦网的前顶及判断反应\n- 要求：站在网前人不要害怕，不要向后退，尽力顶住对方随上强有力的来球\n\n**21. 二对二，对拦进攻与防守（图2-643）**\n- 方法：二人站在网前，二人站在对方网前发球线上，教练送一拍球过来，向前迎一步打拦网，四人在网前对抗，打10-15个球换对方向前迎一步拦网（单打场地）\n- 目的：练网前反应，双方争网前得分\n- 要求：对拦注意前顶，不要有大的后挥，谁将球拦高就打谁\n\n---\n\n### （三）多球训练\n\n**1. 底线正拍向右移动打两板球及线路（图2-644）**\n- 方法：打球员站在底线左区单打的边线位置上，送球先送一拍底线中间球，再送一拍底线斜线，打球员向右移动两步打一拍正手；先打直线后斜线\n- 目的：单练底线正手抽球发力和打进目标\n- 要求：找准合适自己的球点，发力打\n\n**2. 打轻，低拦网（图2-645）**\n- 方法：教练站在网前用手原地向上抛球，高度过人半头，打球员站在发球线后一步，向前冲跑，奋力打拦网，推直线深区，三人循环打（教练同运动员站同一边）\n- 目的：练习跑动时腿蹲低用力向前跨出，及对来球轻、低过网怎样打拦网的处理\n- 要求：一定努力做出下蹲用力前跨的一步\n\n**3. 中场正手随球上网，扑一拍反拦（图2-646）**\n- 方法：打一拍中场正手随球上网，迅速到网前的基本位置，向反手扑一拍反拦\n- 目的：随球上网时动作向前跟进，移动中扑出击球\n- 要求：随上一拍打深，迎击球应加速，上网要快冲，扑球时脚向斜前方跨，臀部不向后坐\n\n**4. 中场随上一板拦网（图2-647）**\n- 方法：送一板中场正手，随球上网打直线，一拍正手拦网打（反手反之）\n- 目的：加强两拍球的熟练性\n- 要求：随球上网一拍把球打深，上网前迎要快，拦网几乎贴网\n\n**5. 正拍侧身放小球（图2-648）**\n- 方法：先打一拍底线正手，然后一拍反手，中场一拍偏反手，迅速侧身让正手放小球\n- 目的：主动放小球\n- 要求：底线左右移动的球，打过网高深和拉上旋球，不要一个速度打球，出现中场球侧身迎上放小球\n\n**6. 双打，网前随上，单打场地（图2-649）**\n- 方法：二人站在网前发球线的前一步位置上，教练送一拍球到对方的中场，让对方抽球上网，四人在网前拦击\n- 目的：练习网前的反应和网前封位\n- 要求：站在网前人不要害怕，尽全力判断来球，向前顶\n\n**7. 底线双打随球上网送三拍球（图2-650）**\n- 方法：二人站在底线对抗，教练送一拍给对方中场，让对方抽球上网；失误后在底线，教练把球送两拍高压对打（一人一个高压），失误换另外一对到底线对抗；3-5分钟换另外一对\n- 目的：练进攻与防守对抗\n- 要求：随上一拍不要下网，打完球后迅速准备下一球\n\n**8. 抽球上网，二拍拦网，一拍高压（图2-651）**\n- 方法：随上一拍打直线，二拍拦网打斜线，一拍深的后退高压\n- 目的：主要练随上一拍直线发力及落点的质量和高压的准确性\n- 要求：每个球发力打，随上一拍要深，冲上网要快，不要看球的好坏再向前，打完随上这一拍是自然向前跟进\n\n**9. 摸网后退高压，一拍拦网（图2-652）**\n- 方法：一人站在网前单打线外面，手拿着拍子摸着网，送一个较深高球，接球员快速后退跳起打高压，然后向前逼近上网，积极向前迎击拦网\n- 目的：主要练向后退和向前跑，身体重心移动的连贯动作，后跳的高压球\n- 要求：人不要先跑，要判断球跑，退后和向前步法调整要快，更重要的是人重心转移要快，拦网一拍一定是向前跑迎击打\n\n**10. 底线正拍跑出拉上旋高球（图2-653）**\n- 方法：送一拍底线正手，打球员站在左边单打线上，向右移动跑，打正手上旋高球（先直线后斜线）\n- 目的：进攻性的上旋高球\n- 要求：握紧拍子，拍子和球接触时摩擦加速度，前臂快速提起，肘送出；掌握好击球的部位尤其重要（击球的下半部）\n\n**11. 底线反手2拍，跑动中正拍击球，重复3次（图2-654）**\n- 方法：先打一拍底线大角度的反手，快速回基本位置，再打第二拍反手，立即快速追跑底线正手一拍球\n- 目的：移动中把球回击好\n- 要求：快速移动，注意打球发力，向目标打\n\n**12. 底线正手跑出打一拍，反手中场一拍（图2-655）**\n- 方法：送一拍底线角度大、深的正手，打球员站在单打左边底线上，向右移动跑打正手，快速回底线基本位置，迎击一拍反手抽球（反手反之）；达到相应次数换一条线\n- 目的：练正手跑出搏击一拍和身体重心转移回位向前的动作\n- 要求：两拍球发力打，注意落点要打深\n\n**13. 多球：底线正拍侧身攻一板（图2-656）**\n- 方法：送一拍底线偏反手位置的球，打球员主动侧身让正手击球，回击到对方反手深区和浅外角\n- 目的：主动正手侧身攻，落点的准确性\n- 要求：发力打，积极调整步法，找好击球点及身体的摆动\n\n**14. 底线左右移动打4拍，中场随上（图2-657）**\n- 方法：先送正手或反手都可以，底线移动打4拍，第5拍随球上网，第6拍球拦网\n- 目的：底线对拉时找机会上网和进攻\n- 要求：回击球要深，机会球不能放过，打球时重心注意跟进，迎球要快，拦网要前迎\n\n**15. 中场拦网绕障碍物（图2-658）**\n- 方法：送左右一边一拍定点球，连续打6-10拍，每打完一拍快速回位，从障碍物的后面过打下一拍球；先直线后斜线\n- 目的：腿向前跨出和快速蹬回回位\n- 要求：手上多向前推，把球向深区打；打球时腿跨出，人的重心也跟着跨出，重心在前腿上，不要重心留在后腿上坐着打球\n\n**16. 专门练正手跑出和侧身正手（图2-659）**\n- 方法：先跑出打一拍正手，迅速回位脚下调整步法，侧身让正手迎击反手边的球；先斜线后直线\n- 目的：主要练底线正手跑出和侧身正手的综合移动击球能力\n- 要求：回位要快，脚下积极调整，侧身让位充分\n\n> ⚠️ **p188-189 照片未收录**（多球训练第16条完整内容及可能的第17+条）\n\n---\n\n# 第三章 青少年网球体能训练方法\n\n<a id=\"ch3\"></a>\n## 第三章  青少年网球体能训练方法（p190 起）\n\n<a id=\"ch3_s1\"></a>\n## 第一节 青少年网球体能训练的阶段性特征\n\n少年儿童运动员的比赛和训练计划必须反映这部分人群的特殊发展需求，必须遵守儿童生长发育的规律。把成人的训练、比赛计划强加到青少年运动员身上是不合理的。网球属于晚期专项化项目，运动训练存在着阶段性特征。网球的早期训练中需要全面的一般性训练。在网球运动训练的早期，训练的重点是学习掌握和发展跑、跳、滑步、投掷等一些基本的运动和（技战术必需的）知觉运动技能。\n\n为训练而训练的阶段必须重视身体与技能发展的敏感期，运动员一旦错过敏感期将永远无法达到他们潜能的顶峰，即使以后进行弥补性的加强训练也无济于事。很多运动员在职业生涯的后期进入一个运动水平的平台期，成绩再也无法提高，就是由于在这个发展提高的关键阶段过多的强调比赛而没有得到充分合理的训练。\n\n早期专项化运动项目需要四步模式的发展规划，而晚期专项化运动项目需要六步模式的发展规划。\n\n**表3-1 运动中的专项化模式**\n\n| 早期专项化模式 | 晚期专项化模式 |\n|--------------|--------------|\n| 1. 为训练而训练 | 1. 基础练习 |\n| 2. 为比赛而训练 | 2. 学习训练 |\n| 3. 为赢得比赛而训练 | 3. 为训练而训练 |\n| 4. 退役 | 4. 为比赛而训练 |\n| | 5. 为赢得比赛而训练 |\n| | 6. 退役 |\n\n本大纲主要针对网球青少年训练，因此，仅对前四个训练阶段的体能训练阶段性特征进行阐述。\n\n---\n\n### 一、阶段1 — 基础练习的阶段\n\n**年龄**：男子6-9岁 / 女子6-8岁\n\n#### （一）耐力\n\n这一时期有氧系统非常敏感，很容易通过训练得以提高。有氧训练一般采取包含有氧运动的游戏的形式来进行。年轻运动员能够集中注意力的时间相对较短，经常变换游戏非常重要。有氧游戏可以在球场上进行，也可以在场外进行。\n\n#### （二）力量\n\n在青春期以前获得力量素质的提高是可能的。儿童和青少年可以通过训练提高力量素质，但是他们提高的主要是**相对力量**，而不是绝对力量（相对力量指的是单位体重的力量，绝对力量指的是不考虑体重因素前提下一个人的最大力量）。青春期以前力量素质的提高是通过运动协调性提高、结构和神经适应来达到的。特殊练习和增加肌肉活动都可以提高力量。但是要明确一点，像肌肉肥大这样的结构变化在这个时期是不会出现的。\n\n力量训练可以很早就开始，主要利用身体重量进行训练，同时做些健身球和实心球练习可以增加练习的乐趣。对于年轻运动员健身球和实心球练习是效果最好的练习方式。新出现的反弹实心球可以用来训练协调性，但是要注意安全，不可以用潮湿的球做抛球练习。健身球可以帮助提高高躯干核心力量和四肢力量，还可以同时锻炼发展身体平衡能力。\n\n#### （三）速度\n\n科学报告指出，速度训练有两个提高的**敏感期**：\n- **女性**：6-8岁阶段 和 11-13岁阶段\n- **男性**：7-9岁阶段 和 13-16岁阶段\n\n最大速度（PSV）包括直线速度、侧移速度、多向速度、变向速度，灵敏性和肢体速度（手臂和足的速度）。速度训练的第一个敏感期，男女都一样是得益于中枢神经系统而不是能量代谢系统的训练（运动时间少于5秒钟）。无氧乳酸能系统的间歇性训练（1-10秒和10-15秒）只在第二个速度训练的敏感期才开始安排。\n\n#### （四）技能\n\n这个阶段最重要的是全面发展身体素质，包括：\n- 灵敏、平衡、协调性和速度等运动必需的基本身体素质\n- 跑、跳、投掷等基本运动能力\n- 肌肉运动知觉、滑行、轻快和挥动的感觉运动的基本感觉（如在持械运动中会发展）\n- 抓、踢、打击等基本动作\n\n学习和参加这些活动对运动员将来的发展非常重要。这一阶段应该掌握这些基本的运动技能。\n\n#### （五）柔韧性\n\n柔韧性练习的基本方法应该是在一些愉悦的游戏中接触和学习。柔韧性是训练和运动表现中所必需的基本素质之一。高水平的一般性和专项柔韧性素质必须在训练的早期就获得。\n\n- 要想提高身体的柔韧性需要**每周5-6次**的专门柔韧性训练\n- **每周2-3次**或隔天一次的训练只可以保持柔韧性的现有水平\n- 牵拉活动不要在休息日进行\n- 热身活动过程中不要做过多的**静力性牵拉**，热身活动中的静力性牵拉不能起到预防损伤的作用\n- 但是，发展运动员的身体素质和基本运动技能有助于损伤预防\n\n---\n\n### 二、阶段2 — 学习训练的阶段\n\n**年龄**：男子9-12岁 / 女子8-11岁\n\n9-12岁是少儿最重要的运动学习时期之一。这个阶段是少儿学习发展各种基本运动技能的敏感时期，而这些基本运动技能是他们将来运动生涯的基石。这些曾被看作身体素质的基本运动技能应该在这一时期发展和提高到一个很高的水平。运动员在这个阶段要掌握基本的网球运动技能，同时还要积极参加其它各种运动。\n\n这一阶段训练和运动表现中的特点如下：\n由于这是主要的技术学习阶段，所以主要强调运动技能的发展。同时耐力素质、力量、速度和柔韧性素质也需要通过有计划的训练而进一步提高。虽然在前面这两个阶段，不同方式的训练适应之间很少有相互干扰现象，但是一个好的训练、比赛和恢复计划可以使各种训练效果达到最佳。\n\n---\n\n### 三、阶段3 — 为训练而训练的阶段\n\n**年龄**：男子12-16岁 / 女子11-15岁\n\n这个阶段是女子发展力量和有氧耐力基础以及男子发展有氧耐力基础的时期。这一阶段，男女运动员都应该充分利用速度发展的第二个敏感期，进一步来提高速度素质。运动员应该使用先进的身体训练技术，恢复活动并且不断学习提高这方面\"理论基础\"或使用辅助性技能的能力。虽然这种理论基础在前一个阶段就已经获得了，但是现在应该进一步扩充它利用它。\n\n本阶段运动员体能训练主要有以下这些特点：\n\n#### （一）耐力\n\n身高发育敏感期的出现使得有氧耐力训练的适应性改变更加容易发生，这也被称作耐力发展高峰期。男子12-16岁（女子11-15岁），在这一时期有氧耐力训练的量和强度都应该适当增加。\n\n参考训练参数（p192，旋转页，部分可读）：\n- 20-50米冲刺，100%强度，每次3-6组，组间2-5分钟间歇\n- 网球场内15米短跑，3-7组，配合约30分钟训练课程\n\n#### （二）力量\n\n男女都应该在11-12岁之间开始有计划、有系统的力量训练。可使用PNF（本体感觉神经肌肉促进法）等方法。训练组数3-6组。\n\n#### （三）速度\n\n在这一阶段需要增加对速度素质的系统训练，充分利用第二个速度敏感期。\n\n#### （四）柔韧性\n\n在活动前后都必须进行静力和动力的柔韧性练习。\n\n> ⚠️ **p192 为旋转页，以上（二）～（四）内容部分不清晰**\n\n---\n\n### 四、阶段4 — 为比赛而训练的阶段\n\n**年龄**：男子16-18岁 / 女子15-17岁\n\n> ⚠️ **p192-193 为旋转页，阶段4具体内容不清晰，以下待补录**\n\n---\n\n<a id=\"ch3_s2_methods\"></a>\n## 第二节 体能训练方法\n\n> ⚠️ **p193-194 为旋转页，以下内容为尽力识别后的部分记录**\n\n### 一、耐力训练\n\n#### （一）有氧训练方法\n\n有代表性的有氧训练方法（p193-194，旋转页，部分可读）：\n\n**练习1**：有氧耐力基础训练\n- 训练参数：约5米间距，3-6次交替\n- 要求：注意配速，保持回合数\n\n**练习2**：间歇训练\n- 以目标心率控制强度\n- 组数及间歇时间依年龄段调整\n\n**练习3**：下肢耐力训练\n- 结合球场移动，以网球动作为载体\n\n> ⚠️ p193-194 旋转页具体数字及步骤待重新拍摄后补录\n\n\n<a id=\"ch3_speed\"></a>\n### 二、速度训练\n\n#### 速度训练注意的问题（p195）\n\n- （一）青少年在 8-15 岁期间，应着重发展速度能力。\n- （二）一周可以进行 2-3 次速度训练。\n- （三）加速能力训练对神经系统兴奋要求较高，训练课安排开始部分。\n- （四）加速能力训练侧重于强度、质量，而不是数量。\n- （五）加速能力训练的跑动技术与网球技术相结合，在训练后期跑动可以结合持拍进行。\n\n---\n\n<a id=\"ch3_strength\"></a>\n## 第三节  力量训练（p195 起）\n\n在比赛中世界优秀运动员击出网球的球速最高可以达到 200 公里/小时以上，这就需要运动员有足够的力量才能打出如此高的球速。现代网球运动的发展趋势表明，力量已经成为优秀运动员的重要素质，即便是技术型运动员，也必须有足够的力量，否则很难在网坛长期立足。\n\n力量是运动的基础，力量一般分为最大力量、快速力量和力量耐力。网球运动由于击球、网球重量及运动员对最大球速的追求，对最大力量的需求相对较高。\n\n快速力量在网球运动中非常重要，脚步移动作对快速力量具有较大的需求。快速力量的好坏影响运动员成绩的关键性因素。\n\n网球运动的力量耐力主要以无氧力量耐力为主。由于网球比赛的时间相对较长，因此，运动员上肢是否能“发”保持较大的击球力量，不仅仅取决于最大力量还取决于力量耐力。\n\n三种不同类型的力量对于网球运动员的影响作用大小排序分别是快速力量、最大力量和力量耐力。\n\n### 一、力量训练方法（p196）\n\n#### （一）重量训练法\n\n- 负荷强度：70-100% 最大力量\n- 重复次数：1-10 次\n- 训练组数：3-6 组\n- 间歇时间：由强度的高低在 2-5 分钟之间\n- 注意事项：\n  - 推、举、蹲的技术要规范\n  - 每组的训练强度和重复的次数不变\n  - 组数应根据运动的反应进行相应调整\n\n#### （二）金字塔力量训练法\n\n金字塔力量训练法是指一次课的练习从较低的负荷强度开始，逐渐加大负荷强度而减少重复练习次数，逐渐到最大负荷强度的训练方法。该方法又称为“金字塔训练法”。\n\n典型的练习组合方式为：\n- 开始负荷为最大负荷的 70%，作 1 组，每组 4 次；\n- 逐渐负荷至 80%，作 3 组，每组 3 次；\n- 逐渐负荷为 90% 时，作 3 组，每组 2 次；\n- 直至负荷至 100%，作 1 组，每组 1 次。\n\n另外一种金字塔训练的特点是从较高的（一般为 90% 最大力量）逐渐加大到 100% 最大力量。\n\n开始强度和最后强度之间只有 10% 的差距，因此，人们形象地把这种方法称为“金字塔力量训练法”。该设计的主要目的是发展肌肉的协调性。\n\n- 注意事项：\n  - 由于是最大力量训练，负荷不低于 70% 的最大重量；\n  - 每一种定强度下的组数，可以根据训练目的调整。\n\n#### （三）循环训练法\n\n将各种力量练习设置为若干站点，各个练习规定相应的负荷，依次完成每站的练习，根据练习目的确定间歇的时间，循环一定的组数。该方法对于发展力量耐力较好。\n\n例：发展全身不同肌群力量耐力的循环训练法（p196-197，部分可读）\n\n1. 练习内容及顺序（每项次数）\n- 俯卧撑 10-15 次\n- 收腹两头起 8-15 次\n- 背伸两头起 6-10 次\n- 原地高抬腿 30-60 次\n- 跨跨收腹 5-10 次（⚠️ 名称待核对，按照片尽力识别）\n- 跳跃 20-30 次\n\n2. 间歇时间\n- 练习之间没有间歇\n- 完成所有练习为一组，组间间歇 2 分钟\n\n3. 练习的组数\n- 3-6 组\n\n#### （四）复合训练法（p197）\n\n该方法是指将最大力量训练和快速力量训练有机结合的练习方法，该方法可以有效的将最大力量的训练效应转化为专项所需要的快速力量。\n\n例如：在高强度背蹲举练习后，进行胸前掷实心球或俯卧撑击掌等练习。该方法把股大肌和肱三头肌的最大力量转换为快速力量，为专项运动能力提供力量保障。\n\n此外，背蹲举和双脚弹跳练习组合；下肢蹬伸练习与单腿蹬跳练习组合；引体向上和前抛实心球的组合；硬拉和背投实心球等组合。（⚠️ 本段末尾组合为尽力识别，后续可对照原书校对）\n\n### 二、最大力量训练练习（p197-198）\n\n#### （一）腰腹肌\n\n**练习1：屈膝仰卧起坐**\n- 发展肌肉：腹直肌\n- 方法要点：\n  - 仰卧在垫上：屈膝，脚后跟靠近臀部；双臂相叠于胸前或脑前。\n  - 屈颈、下巴靠近胸部；保持双脚、臀部及腰部平稳地贴在地板上，向大腿方向弯屈躯干直到后背离开垫子；保持双臂在胸前或腹前相叠。\n  - 打开弯屈的躯干，然后颈部伸展，回到起始姿势；保持脚、臀部、腰、背的姿势不变。\n\n**练习2：高脚腹部屈收**\n- 发展肌肉：腹直肌\n- 方法要点：\n  - 仰卧在垫子上，双脚放在凳子上，髋宽，膝屈 90 度；双臂相叠于胸前或腹前。\n  - 屈颈、下巴向胸前靠近；保持臀部、腰平稳地贴在地板上，向大腿方向弯屈躯干，直到后背离开垫子；保持双臂在胸前或腹前相叠，双脚在凳子上。\n  - 打开弯屈的躯干，然后颈部伸展，回到起始姿势；保持双脚、臀、腰、背在原来位置不变。\n\n#### （二）胸部及上肢（p198）\n\n**练习1：卧推**\n- 发展肌肉：胸大肌、肱三头肌\n- 方法要点：\n  - 仰卧在卧推垫上，身体与凳及地面“五点”接触；身体在垫上的位置调整到眼睛正好在支架的下方；双手正握，闭合式抓杠；握距略宽于肩。\n  - 向下移动杠铃，触到胸部（乳头处）为止。\n  - 向上推杠，直至肘关节完全伸直；手臂紧张、稳定，正对着关节。\n- 注意：保持身体与器械和地面的“五点”接触；手腕要紧张、稳定，正对着肘关节。\n\n**练习2：坐位肩上推举**\n- 发展肌肉：三角肌前部和中部\n- 方法要点：\n  - 坐在垂直推肩凳上，靠紧靠背，达到身体的“五点”接触，正握杠铃，握距略宽于肩。\n  - 缓慢屈肘，将杠铃向下垂直移动，颈部向后伸，以便杠铃由脸前通过到达锁骨和三角肌前部。\n  - 向上推杠铃，直至肘关节完全伸直；颈部略向后伸，以便杠铃由脸前通过。\n- 注意：保持身体的“五点”接触，不要拱腰、抬臀；肱桡保持紧张，并保持处于肘关节的正上方。\n\n> ⚠️ p199 为旋转页：截图信息量较大但排版方向不利于逐字校对，当前未完整转写。后续若你补一张“横向/更近”的清晰图，我可以把 p199 的剩余练习条目继续补全到这里。\n\n\n#### （三）下肢（p200）\n\n**练习4：负重蹬台阶**\n- 发展的肌肉：臀大肌、四头肌和股后肌群\n- 方法步骤（p200，部分可读，按图尽力识别）：\n  - 身体移动至杠铃下，正握杠铃；两脚平行站立；踏台阶 30～46 厘米；杠铃平稳地置于背部上方；颈根部三角肌上方（两手握距略宽于肩）；抬肘，利用背部上方和肩部肌肉，形成对杠铃的保护；挺胸；两肩用相同力量拉住杠铃。\n  - 一只脚踏上台阶，全脚掌踏在台上；保持躯干直立，不要前倾身体；后腿位置不动，但身体重心移至前腿；前腿用力伸髋、膝，使整个身体站立在台阶上；后腿不要发力蹬地；到达最高点时直立、稍停恢复平衡。\n  - 将身体重心移到才站立的前腿上；刚才的后腿迈下台阶；躯干保持直立；将后脚落在距台阶 30～46 厘米处；站后脚站稳后，将身体重心移到后腿；前腿迈下台阶，回到后腿站直；在起始位置稍停后换另一腿练习。\n- 注意：台阶高度应为 30～46 厘米；或当一脚踩在台阶上时，大腿应与地面平行。\n\n**练习5：膝前伸**\n- 发展的肌肉：股外侧肌、股内侧肌、股中肌、股直肌\n- 方法步骤：\n  - 坐位，背部紧靠靠垫，脚跟放在器械的滚轮后方，并紧贴滚轮；两脚两腿平行。\n  - 充分伸膝，抬起踝滚轮；保持躯干直立，背紧靠靠垫，不让髋或臀离开坐位。\n- 注意：不要用力锁死膝关节。\n\n**练习6：膝后屈**\n- 发展的肌肉：半腱肌、半膜肌、股二头肌\n- 方法步骤：\n  - 俯卧在练习器械的垫子上，贴紧垫子；踝关节放在踝滚轮之下并与之贴紧；两腿相互平行。\n  - 膝关节要与器械转轴同心，否则调整器械；双踝勾住滚轮；抓紧器械两侧的把手充分屈膝，抬起踝滚轮；保持躯干固定，髋和躯干紧贴垫子；双手抓紧胸垫两侧把手；不要让髋或大腿离开大腿垫。\n  - 缓慢伸膝，回到起始部位；保持躯干固定，髋、躯干紧贴垫子；两手抓紧胸垫两侧的把手。\n- 注意：不要用力锁死膝关节（过度用力伸膝）。\n\n**练习7：站立负重提踵**\n- 发展的肌肉：比目鱼肌、腓肠肌\n\n#### （四）最大力量训练的注意事项（p201）\n\n1. 13 岁之后可以加大最大力量训练的比重。\n2. 最大力量训练技术特点规范性要求较高，合理的技术可以提高训练效果。\n3. 最大力量强度、重复次数、组数和间歇时间的确定。\n4. 最大力量训练的频率为一周 2-3 次。\n5. 最大力量训练的练习顺序要合理。\n6. 最大力量训练大肌肉群和小肌肉群协调发展，注重肌肉力量的整体性。\n7. 单关节力量训练和多关节力量训练相结合。\n8. 最大力量训练的与柔韧素质训练有机结合。\n\n---\n\n### 三、快速力量训练（p201-202）\n\n网球运动员在比赛中很少出现跳跃动作。因此，对于网球运动员的快速力量训练中，侧向移动能力应着重发展，纵跳能力作为辅助性练习。青少年网球运动员高强度的快速力量训练（快速跳跃练习）一定要在一定的最大力量基础上才能进行。一般 12 岁以下儿童，不易进行高强度的快速力量练习。\n\n#### （一）训练方法\n\n**练习1：负重蹲跳（图3-1，p201）**\n- 训练目的：发展臀大肌、股四头肌、股后肌群和小腿三头肌多关节运动的快速力量\n- 方法要点：\n  - 肩负杠铃，双脚与肩同宽站立，双手握住杠铃杆\n  - 下蹲至大腿与地面成 45 度角时，迅速用力向上跳起\n  - 下落缓冲恢复到起始姿势\n- 注意：保持躯干直；落地后迅速起跳\n\n**练习2：立定跳（p201）**\n- 训练目的：发展下肢肌肉的快速力量\n- 方法要点：\n  - 面对沙坑，双脚与肩同宽平行开立，上臂上举并充分伸展身体\n  - 下蹲后双腿迅速蹬伸，向前上方跳起，落地缓冲；双脚落地时距离与起跳时相同\n- 注意：跳起时身体充分伸展；在腾空过程中收腹、屈髋\n\n**练习3：前后障碍跳（p202）**\n- 训练目的：提高下肢的快速力量，侧重于屈伸肌群及平衡稳定能力\n- 方法要点：\n  - 摆放约 20 厘米高的障碍物（运动员力量和技术提高后，可增加障碍物高度）\n  - 站立于障碍物前面约 5 厘米，双脚并拢，身体保持直立，平衡姿态，视线集中在第一跳的落地点\n  - 双膝微屈以助跳；练习中前臂不要下垂\n  - 向前跳跃障碍物，跳跃的高度和远度要充分，不能触及障碍物；保持脚趾向前，双脚不要向一侧偏转\n  - 每次跳跃动作完成后立即跳回起跳点；重复进行直到规定次数\n- 注意：控制好身体平衡，身体尽量不要晃动\n\n**练习4：左右障碍跳（p202）**\n- 训练目的：提高下肢的快速力量，有利于发展内收外展肌群及平衡稳定能力\n- 方法要点：\n  - 摆放约 20 厘米高的障碍物（力量技术提高后可加高）\n  - 侧向站立于障碍物前面约 5 厘米处，双脚并拢，与障碍物平行；身体保持直立、平衡姿态，视线集中在第一跳的落地点\n  - 双膝微屈以助跳；练习中前臂不要下垂\n  - 向侧跳跃过障碍物，跳跃的高度和远度要充分，不能触及障碍物\n  - 每次跳跃动作完成后立即跳回起跳点；重复进行直到规定次数\n- 注意：控制好身体平衡，身体尽量不要晃动\n\n**练习5：跳箱练习（p202）**\n- 训练目的：提高下肢的快速力量，侧重于屈伸肌群及平衡稳定能力\n- 方法要点：\n  - 摆放一个高 20-30 厘米、宽 50 厘米、长 70 厘米的箱子；没有箱子可以用楼梯代替\n  - 双脚并拢站在箱子上，脚后跟悬空\n  - 稍微屈伸屈膝以助跳\n  - 后移身体落地，不要跳跃\n  - 落地时立即跳回到起始位置，速度要快\n- 注意：下落后脚后跟不能着地，保持一定的平衡\n\n**练习6：侧跳箱（p202）**\n- 训练目的：提高下肢的快速力量，侧重于横向移动能力及平衡稳定能力\n- 方法要点：\n  - 双脚并拢，平行站在箱子上，紧靠箱边\n  - 稍微屈伸屈膝以助跳\n  - 在箱子侧跳落下\n  - 落地时立即跳回到起始位置，速度要快\n- 注意：落点要有一定距离以免伤及脚踝；下落后脚后跟不能着地，保持一定的平衡\n\n**练习7：俯卧撑击掌练习（p202）**\n- 训练目的：发展胸大肌、肱三头肌快速力量\n- 方法要点（⚠️ p202 该练习仅显示标题与目的，细节未出现在本截图中）\n\n#### （二）快速力量训练注意的问题（p203，部分可读）\n\n1. 快速力量训练具有一定的年龄特征，12 岁以下的儿童不应进行高强度的训练。\n2. 在提高快速力量训练时，运动员必须发展一般性力量作为基础，否则容易出现损伤。\n3. 快速力量训练前充分热身运动。\n4. 跳跃性练习时，落地动作要求缓冲时间不宜过长。\n5. 由于快速力量训练要求运动员神经兴奋性高，因此，优先进行（神经肌肉协调）。\n6. 训练时，强度由低到高，渐行负荷发展。\n7. 适宜的训练量，不超过 6 项的高刺激练习；核心放在负荷强度上。\n8. 动作难度应从易到难。\n9. 由于快速力量强度高，恢复时间在 48-72 小时，因此，训练频率一般为一周两次。\n\n---\n\n### 四、专项力量训练（p203-204）\n\n力量训练的最终目的是通过力量的提高来保障专项技术更有效的完成。因此，通过完成与专项动作及与专项动作相似的快速力量训练是提高专项成绩的有效方法。\n\n最大力量的发展是提高快速力量的基础。网球快速力量训练就必须具有专项的特点，不能为了一味追求力量而忽视了网球运动的技术特点要求。所以要特别注意在进行快速力量训练时，训练的动作和方法要符合网球运动的技术要求。\n\n专项力量训练和快速力量训练的区分就是专项力量更侧重于专项技术、用力顺序、供能特点的相似性。\n\n#### （一）击球力量训练（p203）\n\n击球力量来源于腿部、经髋、腰及肩传到臂，最后到达手、球拍。不管是正手、反手的抽球，还是截击以及抽球的变种挑高球、截击的变种挑高球，都要求全身协调用力。\n\n**练习1：手持杠铃片模拟正反手抽球**\n- 目的：发展正反手抽球动作所需要的躯干及上肢肌肉的快速力量\n- 方法要点：\n  - 运动员手持杠铃片模仿正反手抽球动作\n  - 每组练习重复 6-10；做 3-5 组\n- 注意：\n  - 杠铃片的重量不易太重，否则影响动作速度\n  - 练习时体会蹬地、转髋、转肩、专门的发力顺序\n  - 充分利用下肢的蹬伸力量，并快速转体\n\n#### （二）发球力量训练（p204，部分可读）\n\n发球时身体成“反弓”状态，身体爆发式用力将拍持球击出，因此对全身爆发力要求较高。通过“反弓”型动作练习可以提高发球的力量。\n\n**练习1：立姿前抛实心球**\n- 目的：提高全身用力技巧和全身爆发力\n- 方法要点：\n  - 双脚分前后站立，侧身先将球引头后部\n  - 将球经肩上向前方抛出；球出手瞬间以前臂旋内结束，球掷用力掷出\n- 注意：\n  - 肌肉发力的顺序\n  - 动作要爆发式用力\n  - 上、下肢结合，不要局部用力\n\n> 注：以下练习均注意上述三点要求。\n\n**练习2：双手前掷实心球**\n- 目的：发展全身爆发力\n- 方法要点：\n  - 两脚平行站立，双手持球于头后部\n  - 身体向后伸展成反弓，下肢用力蹬伸将球掷出\n- 变换方式：两脚前后站立进行该练习\n\n**练习3：双手后掷实心球（p204，下半页未显示具体要点）**\n> ⚠️ p204 截图止于练习3标题，后续要点未出现在本截图中\n\n#### （三）侧向移动力量训练（p205）\n\n网球比赛中，在有限的场地内需要不断的侧向加速和变换方向。通过侧向移动力量训练提高运动员的相关肌群力量素质，从而更加有利于快速移动和适应比赛环境。\n\n**练习1：横跳箱**\n- 训练目的：提高下肢的快速力量，侧重于侧向移动能力及平衡稳定能力\n- 方法要点：\n  - 一脚着地，另一脚在箱子上而正中位置\n  - 视线在箱子上\n  - 双膝微屈，以持书动作\n  - 稍稍上抬箱子上的腿，迅速移动中心至另一侧，注意保持低重心\n  - 跳过箱子后，双脚同时落地（即同时落在地面和箱子上）\n  - 迅速向反方向重复该练习\n- 注意：移动时保持低重心，上体不易过于前倾\n\n**练习2：侧垫练习**\n- 训练目的：提高步法的快速性、侧向移动能力及平衡稳定能力\n- 方法要点：\n  - 运动员左脚站于两个斜板中间，右脚放于右侧木板上\n  - 右脚快速蹬离木板，左脚移到左侧木板上\n  - 左脚快速蹬离木板，右脚移到右侧木板上\n  - 双脚交替反复蹬离木板\n- 注意：身体重心低，上体不易过于前倾\n\n#### （四）专项力量训练注意的问题（p205）\n\n1. 采用的力量练习的动作应该与网球技术动作一致或相似。\n2. 力量练习的供能特点应与网球用力特点一致。\n3. 强调肌肉在完成动作时的用力顺序。\n\n---\n\n<a id=\"ch3_endurance\"></a>\n## 第四节  耐力训练（p205 起）\n\n耐力是机体长时间活动中对抗疲劳的能力。网球运动员需要具备较高的耐力素质，其原因是：网球属于隔网对抗项目，比赛不受时间的限制，网球比赛的季节漫热，并且时间长。一般男子比赛通常都要在 2 小时以上，而高水平比赛一场打 3-4 小时是司空见惯的；女子高水平比赛经常达到 3 个小时以上。运动员必须具有较好的耐力素质，以保证运动员的技术的发挥和竞技状态的保持，以取得比赛的胜利。\n\n### 一、有氧耐力训练\n\n#### 有氧耐力训练类型与主要参数（p206，表格）\n\n> 该表按“类型 / 训练频率 / 持续时间 / 强度”给出建议（频率多为每周 1-2 次）。\n\n- 长距离跑：持续 30-120 分钟；强度约 70% 最大摄氧量\n- 节奏跑：持续 20-30 分钟；强度为乳酸阈强度\n- 间歇训练：3-5 分钟高强度跑；跑与间歇时间比 1:1；强度为最大摄氧量强度\n- 重复训练：30-90 秒；跑与间歇时间比 1:5；强度为超过最大摄氧量强度\n- 法特莱克跑：20-60 分钟；强度变化（约 70% 最大摄氧量并包含乳酸阈强度跑）\n\n#### 1. 长距离低强度跑训练（p206）\n\n该方法是法特莱克跑训练的典型方法。对网球运动员提高有氧耐力也有一定作用。\n\n- 强度：约 70% 最大摄氧量（VO2max），或相当于 80% 最大心率（maximum heart rate）\n- 持续时间：可从接近比赛距离的至少 30 分钟至 2 小时\n- 主要生理适应（要点）：\n  - 提高心血管系统、体温调节功能\n  - 提高线粒体产生，增强骨骼肌有氧能力\n  - 增加燃烧脂肪作为供能燃料（节省肌糖元）\n  - 机体能够更好清除乳酸，乳酸阈可能提高\n\n#### 2. 步调节奏训练法（p206）\n\n主要提高有氧和无氧混合供能能力。强度稍高于“奔走”（相当于乳酸阈强度）。训练持续时间一般为 20-30 分钟。\n\n- 训练特点：强度保持不变（除一系列短暂间歇）\n- 关键点：保持比赛强度或略高于比赛强度\n- 负荷形式：主要通过增加持续训练时间来增加负荷，而不是提速\n- 可用于：跑或球场移动（跑、划、游等速度可类比为变化维度）\n\n#### 3. 间歇训练法（p206）\n\n相对于持续训练，间歇训练是在接近最大摄氧量强度下完成较长的训练时间。3-5 分钟的接近最大摄氧量强度运动，间歇中包含积极性恢复。运动和间歇的时间比率为 1:1（例如 3 分钟跑与 3 分钟休息）。\n\n- 限制：该方法对持续训练时间和训练频率有较严格要求\n- 建议（要点）：持续训练时间一般 30-45 分钟；训练频率一般每周 1-2 次；两次之间要有充分休息\n\n#### 4. 重复训练法（p206）\n\n重复训练是强度最高的有氧耐力训练方法。采用高于最大摄氧量速度，对无氧供能系统有较高要求。\n\n- 工作时间：一般 60-90 秒\n- 休息与工作比：1:5（8）\n- 作用要点：提高冲刺能力；提高跑动经济性\n- 频率：由于强度较高，一般一周只安排 1 次\n\n#### 5. 法特莱克跑训练（p207）\n\n> 法特莱克训练由上几个部分有氧训练方法构成。以长距离低强度跑为基础，结合短距离高强度的冲刺。运动员可在各跑动技术（变向跑、后退跑、侧向跑等）中选择组合，避免枯燥。\n\n### 二、具体练习（p207，部分可读）\n\n**练习1：持续跑**\n- 一般持续时间 20 分钟至 1 小时；心率保持在 140-160 次/分钟左右\n- 跑动技术：变向跑、后退跑、侧向跑等（避免枯燥）\n\n**练习2：跳绳**\n- 连续双腿跳绳 3 分钟；做 3-5 组\n- 变换形式：可以单腿跳、前跳、左右跳等\n\n**练习3：放松跑**\n- 运动员绕网球场采用慢跑方式，偶尔加速 3-4 步快步跑；慢跑 20 分钟以上\n\n**练习4：持续回击球**\n- 练习时，一名运动员在网前，另一名运动员在后场击球\n- 回球运动员在场上积极跑动，即使球出界也要救起将球击回对面场地\n- 1 分钟调换；重复 6 次为一组，共 6 组；组间间歇 2 分钟\n\n**练习5：变速跑**\n- 加速跑和慢跑（或者走）交替进行加速跑 30m、慢跑 70m，共 5 组；加速跑 50m、慢跑 50m，共 5 组；加速跑 100m、慢跑 50m，共 5 组（组合）\n\n---\n\n### 三、速度耐力练习（p207-208）\n\n速度耐力训练应该在准备期后期和比赛期形成。在此之前，发展牢固的体能基础如力量、耐力是非常必要的。速度耐力训练一般不超过两次，在比赛期将减少到每周一次。速度耐力训练对运动负机体有严格要求，运动员必须进行 20-30 分钟的最大强度。回恢复活动方式应该是积极性休息，如步行和慢跑等。\n\n速度耐力训练和速度或冲刺训练相似，然而这两种训练有着重要区别：速度耐力训练的持续时间应该在 30 秒甚至 2-3 分钟；速度训练一般在 5-10 秒。速度耐力训练的间歇时间一般较短。避免运动员的完全恢复。\n\n**练习1：高强度折返跑（p207）**\n- 量出 30 米的距离，在起点摆放一个标志物，间隔 5 米依次摆放 7 个标志物\n- 从起点开始疾跑，到 5 米标志物后返回；转身加速到 10 米标志物，再折回……依次折返，直到完成整 30 米并折返回起点\n- 休息 90 秒；共完成 6 次重复\n\n**练习2：金字塔训练法 Pyramids（p207，部分可读）**\n- 量出 50 米的距离，在起点摆放一个标志物，间隔 10 米依次摆放 5 个标志物\n> ⚠️ p207 下半页未在该截图中完整呈现，具体折返规则后续可补图再补录\n\n**练习3：加速跑接疾跑（Cruise and Sprint，p208）**\n- 标出 100 米距离；从起点逐渐加速至 60 米达到最大速度，并全力疾跑完成后 40 米\n- 疾跑减速，返回起点，重复进行\n- 每次练习 2 分钟，然后休息 2 分钟；算为一组，共完成 6 组\n\n**练习4：疾跑—慢跑交替（Hollow sprint，p208）**\n- 间隔 30 米摆放 5 个标志物；疾跑接慢跑接疾跑 30 米，交替进行直到最后一个标志物\n- 转身，重复完成慢跑和疾跑练习\n- 持续 2 分钟，间歇 2 分钟，算为一组，尽力完成 6 组\n\n**练习5：交叉跑（Cross Drill，p208）**\n- 间隔 30 米，用 4 个标志物摆成一个正方形；在正方形中间摆放一个标志物\n- 从中间标志物开始跑向每个角上的标志物，然后返回；按顺时针完成其他三个角\n- 完成完整一圈回到起点，休息 60 秒\n- 完成 6 次以上全算练习；一次练习可包括 4 组；组间间歇约 3 分钟\n\n**练习6：救球跑（p208）**\n- 目的：提高运动员无氧耐力和起动能力\n- 教练在网前偏左打出一个轻吊截击球\n- 运动员在场上移动将球回击给教练员\n- 运动员即使知道有时够不着也要努力冲刺救球\n- 重复练习 3 分钟\n\n**练习7：30-60-90 秒箱子训练（p208）**\n- 目的：增强无氧耐力和横向速度\n- 操作：运动员站在一个宽约 0.5 米、高约 0.3 米的箱子旁侧；他从侧面起跳落到箱子顶上，然后立即双脚跳下；运动员来回反复这种运动形式；他每做到箱子顶一次称为一个重复\n- 要点：看运动员在 30 秒内能跳上箱子多少次；随耐力增加加到 60 秒，适应后再加到 90 秒（在 90 秒内跳 90 次是非常出色的成绩）\n\n**练习8：30-60-90 秒举腿练习（p208）**\n- 目的：增强无氧耐力和举膝\n- 操作：面对一个高约 0.3 米的箱子站立；右脚放在箱子上，左脚在地上；左腿下推蹬地，抬左腿将左脚置于箱子顶上，同时右脚着地；接着推进动作并换腿（类似上肢步过程中的高抬腿），保持全脚掌站在箱子上\n\n**练习9：复合跳跃（p208，部分可读）**\n- 目的：增加协调性的同时控制无氧耐力\n- 操作：将 3-4 种不同的跳跃练习组成一个循环（单脚着地、双脚着地），一个接一个重复；完成任何一个练习后稍作恢复就转向下一个练习并且重复（该段末尾未完整呈现）\n\n---\n\n### 四、网球专项耐力训练（p209）\n\n> 本节更接近“带球/带对抗”的耐力方法，把耐力发展和技术输出结合在同一训练里。\n\n**练习1：使用发球机接球、捡球**\n- 发球机选择性向左右角和右角发球（频率为 20-22 个球/分钟）\n- 两名运动员交换接球，每人连续接 3-6 个；第 3 名运动员捡球\n- 持续时间：大约每名运动员 20 分钟\n- 变化：反手削斜线球 / 正手底线球，以能够得分的方式和频率进行网前截击\n\n**练习2：4 名运动员对打**\n- 场地两端分别两名运动员；一方在直线球至底线，另一方对打斜线球\n- 两组对打路线各有目标区域；每个运动员连续打 2 个球\n- 持续时间：10 分钟\n- 变化：4 个球后运动员交换；也可将直线球与斜线球回位位置互换（某些情况下无需用对打路线）\n  - 在更小的场地进行、和/或结合体能交替跑动练习可获得更大强度输入\n\n**练习3：三角游戏**\n- 一名运动员站在反手位置发球，将球向左或向右打出；第 2 名运动员尽力回球给第 1 名运动员\n- 持续时间：8 组；每个运动员 1 分钟\n- 变化：发球位置不固定（或短或深）；不允许接球运动员打凌空球\n\n**练习4：“风挡”练习**\n- 教练员或运动员选择性地站在中位或底线位置给运动员喂球\n- 后者将底线跑动选择正手或反手球击出；打凌空球的运动员也选择正手或反手将球凌空打回\n- 持续时间：8 组；每个运动员 1 分钟\n- 变化：底线运动员随机打正手或反手球；凌空运动员须练习短球\n\n**练习5：空空传递**\n- 教练员左或右方向给短球；运动员站在底线位置，必须向前跑步打凌空球，然后退回底线另一侧\n- 持续时间：2 组 5 分钟；3-4 名运动员\n- 变化：改变高度；改变方向\n\n**练习6：专门底线员**\n- 不带发球的网球比赛，使用乒乓球比赛的计分方法（打至 11 分、15 分或 21 分）；回合从一个落地球开始；不允许在发球区打凌空球\n- 时间：三盘两胜\n- 变化：\n  - 两名运动员中一方只允许在场地 2/3 处打正手（反手），每 10 分后交换\n  - 两名运动员中一方只允许在场地一角，球被发到另一角；回合从该运动员沿底线冲刺跑动接球开始；每个回合后交换\n  - 两名运动员中一方站在网前位置（球拍触网）；由对方打出高球，回合从网前运动员向后跑动击球开始；每个回合后交换\n\n> ⚠️ p209 下方“注意事项”标题后内容未出现在本截图中；如你补图我可以继续补录。\n\n---\n\n<a id=\"ch3_flexibility\"></a>\n## 第五节  柔韧性训练（p210-214）\n\n柔韧性是指人体关节活动幅度的大小以及跨过关节的韧带、肌腱、肌肉、皮肤及其他组织的弹性和伸展能力。研究表明，阻碍关节运动的主要作用力与软组织（肌肉）的弹性有关。柔韧性练习可以改善被动型关节活动的准备，使关节周围肌肉群伸展，满足比赛要求。\n\n网球运动中，运动员为有效、高质量的完成击球、发球及快速脚步移动动作，对柔韧性要求较高。良好的柔韧性有利于网球运动员防止运动损伤，同时保证更好地完成一些技术动作。儿童是发展柔韧的关键时期，柔韧训练应引起高度重视。\n\n### 一、基本方法\n\n#### （一）静力拉伸法（p210-212）\n\n静力性伸展运动是在一定时间里，缓慢地将肌肉、肌腱、韧带拉伸到一定活动范围内的伸展活动。该方法是提高柔韧性重要、有效的方法。\n\n**1. 静力拉伸法技术要点**\n- 摆正运动员姿势，以便正确拉伸\n- 拉伸动作要缓慢、均匀\n- 将关节运动到活动范围的边缘，运动员感到中等程度的不适\n- 动作保持 30 秒\n- 单侧伸拉动作不必只在单侧进行，两面应在两边都做\n- 拉伸要有一定顺序，可按“由中心向四肢拉伸”\n\n**顺序建议（p210，原文要点）**\n- 先躯干和下肢：1 背部（躯干）2 臀部（骨盆部位）3 大腿后肌群 4 腹股沟（内收肌）5 股四头肌 6 腓肠肌及踝、脚\n- 再躯干和上肢：1 背部肌群 2 手臂、手腕、手 3 颈部\n\n**2. 具体练习（p210-212，摘录）**\n\n- 颈部练习：\n  - 练习1：站/坐位做头部转动，双脚分开；将头转向右侧注视右肩，保持 7 秒；向另一侧重复；动作要慢（下颌朝下）\n  - 练习2：头前后摆：向下看（下颌朝下），向上看尽量上提，然后尽量后仰（⚠️ p210 本条末尾被截断）\n- 上肢练习：\n  - 练习1：手腕屈伸：双臂前平举，掌心向上，用另一只手向后向下压腕关节，然后交换\n  - 练习2：拉肘：单臂肘后伸直，一手按住另一只手的肘部，振动压，然后静止不动\n  - 练习3：背伸展：一臂向侧外方尽量伸展，另一臂从下方下压住该臂手腕部；轮换练习\n- 下肢练习（p211，部分可读）：\n  - 练习1：大腿内侧伸展：坐地，脚掌并拢，尽量靠向腹股沟，双膝缓慢地下压；保持挺直坐姿\n  - 练习2：大腿肌肉（主要股四头肌）伸展：站立抓住一门柱，将踝关节拉向臀部，确保髋部紧；背大腿内侧及后部被牵拉即达到伸展；重复 3 次（可调姿势，如面朝下蹲，将踝关节拉向臀部）\n- 小腿与跟腱拉伸（p212，练习3）：用“弓步”行走姿势，一条腿在后伸直，一条腿在前屈膝；将重心移至前腿；不要让后腿脚跟离地，小腿感到伸展持续 10 秒；用另一条腿重复；重复 3 次\n- 腰背练习（p212）：\n  - 练习1：体前屈：两脚自然直立，两臂尽力下伸，上体向腿部贴近\n  - 练习2：分腿坐体前屈：坐地两腿分开，腿伸直，向前压体，胸部尽量贴近地面\n  - 练习3：跪立体后屈：跪在地上，做体后屈，腰部逐渐加大，动作速度要慢\n  - 练习4：腰脊伸展：腰部着地，双手支撑双肩，与头尽量抬起，骨盆与腹部放松；调整姿势，双脚分开站立，双手叉腰，尽量向后弯腰；保持膝部伸直，向前送腹部感受伸展\n  - 练习5：仰卧屈体：背着地仰卧，双臂向前抱膝，重复 3 次；可调姿势，下蹲做该练习；紧握一根立柱做在深蹲动作更易\n\n#### （二）动力拉伸法（p212-213）\n\n动力拉伸的拉伸过程中动作速度快，但动态拉伸没有弹跳动作，且动作形式接近或模仿专项动作。能帮助运动员在赛前做好专项柔韧性的准备。\n\n**1. 动力拉伸技术要点（p212）**\n- 开始用力不过猛，幅度一定要由小到大；先做几次小幅度的预备拉长，再后加大幅度，避免拉伤\n- 每个练习重复 5-10 次（次数可根据专项技术需要增加）\n\n**2. 具体练习（p213，摘录）**\n- 练习1：绕臂：站立双肩自然下垂；先向前绕右臂后上举、拉过左耳、后向后绕臂；两臂交替连续练 3 圈\n- 练习2：双人压肩练习：两人双臂各搭在对方肩上，面对面站立两腿分开立体前屈，做上体同时下压动作\n- 练习3：上下来摆练习：两脚开立，一臂上举，另一臂下举；做同侧用力摆臂动作；两臂交换练习；幅度由小到大\n- 练习4：踢腿练习：正踢腿、侧踢腿、后踢腿；基本要求是踢腿伸直，支撑脚不离开地面\n- 练习5：肋木上压腿：一腿放在肋木上，另一腿支撑在地面；做各种方向压腿；动作要缓慢，不可快速，以免拉伤；肋木高度以自己的柔韧素质而定，柔韧素质提高后高度逐步增加\n- 练习6：弓部压腿练习：上体直立，两手扶膝，前膝有节奏向前；后腿适度伸直\n- 练习7：转腰：脚自然开立，身体以腰为轴，较大幅度转动\n- 练习8：体侧伸展：两脚分开站立，举右臂至头上，左手叉腰，向左侧尽量弯曲；反侧重复；重复 3 次\n\n#### （三）本体感觉神经肌肉促进法（PNF）（p213-214）\n\nPNF 最初为神经肌肉的康复活动而设计，主要通过增加肌肉的张力和活动来放松肌肉。在竞技体育中可用于增加肌肉柔韧性。PNF 拉伸特点是被动的拉伸运动和主动拉伸的肌肉收缩运动相互结合（向心、等长收缩等）。需要有同伴帮助，不能自己完成。\n\n**1. 技术分析实例（p213）**\n- 先进行被动拉伸 10 秒，使运动员感到中等程度的不适\n- 同伴施加运动员髋关节方向的外力，运动员用力对抗该外力，保持髋的位置不移动；进行一种等长收缩（静力），保持 6 秒（图 16.4）\n- 然后运动员腿部放松，进行被动拉伸，保持 30 秒（图 16.5）\n- 最后的拉伸中，由于自身抑制机制被激活，拉伸的幅度一定明显增大\n\n**2. 最常用的 PNF 牵拉方法（p214）**\n- 小腿和踝关节（见图 16.12）\n- 胸部（见图 16.13）\n- 大腿内侧（见图 16.14）\n- 大腿后群肌（见前述）\n- 股四头肌和髋关节屈肌（见图 16.15）\n\n\n#### （四）拉伸注意事项（p215）\n\n1. 开始练习之前，进行短时间的放松慢跑，充分做好准备活动，提高伸展肌肉群的血流量；如果伸展练习之前准备活动不充分，容易造成韧带受伤。\n2. 设计适合球员的日常伸展练习计划；该练习计划要符合比赛要求（如球关节伸展练习，因为球类项目在比赛中需要频繁屈伸踝关节），同时进行记录，以便评估效果。\n3. 拉伸很顺序，并有一定的模式。例如：从上肢到下肢，从大肌群到某一特定关节，从中心向四周发展。\n4. 在每次练习中，最好保持肌肉伸展 20-30 秒；当肌肉张力下降后（大约 10-15 秒），进一步伸展肌肉（大约 5 秒钟），然后再慢慢恢复。\n5. 要使身体的主导肌肉群受到牵拉。在伸展练习中，不要让肌肉和韧带过度疼痛，不要为了保持某种姿势而过度牵拉肌肉和韧带；练习中控制好肌肉的张力。\n6. 伸展性训练次数主要依据教练员对训练的认识程度，每周 3-6 次。\n7. 进行伸展练习时，不要憋气，这会引起身体紧张，降低身体的放松状态；要有目的地放松身体。\n8. 在训练课中安排全面的柔韧性练习（30 分钟高质量练习），最好在大运动量身体训练结束之后（所有肌肉群都充分参与了活动）进行；做的柔韧性练习是为了稳定球员心理和心理上的反应，降低肌肉疲劳，为下一次身体和技术训练做好准备。\n\n---\n\n<a id=\"ch3_agility\"></a>\n## 第六节  灵敏性训练（p216-219）\n\n灵敏是指在不损失身体平衡、力量、速度与身体控制的情况下改变方向的能力。改善灵敏与人时机、节奏、移动的发展有直接的联系。灵敏性是多种素质的综合，是网球运动所表现出具有适应性快速变换动作和变换方向的综合能力。\n\n灵敏性练习的主要是提高人在各种复杂条件下快速运动、协调、准确、灵活地完成动作的练习。灵敏性训练主要包括 4 种：平衡、协调、程序化灵敏、随机灵敏。\n\n### 一、平衡训练（p216）\n\n平衡是运动的基础。通过身体重心的练习，站立、停止和行走的能力得到发展，运动员可以快速地迎接各种复杂动作和向前能力。\n\n平衡练习例（p216，摘要）：\n- 在一条线上步行、跑步；跳起转体 360°\n- 双脚三角跳：两脚与肩同宽分开站立，向前跳；落地时双脚并拢；原地跳；落地时两脚分开；向后跳至起跳点；落地时双脚并拢；原地跳；落地时两脚分开；重复 5 次往返（组数按训练量）\n- 小步；两运动员单足跳，相互推；拨拉迫使对方脚离地（变换方法：a）双手不受限制；b）双手身前交叉）\n- 单腿“8”字形旋转：单腿站立，另一腿做“8”形旋转，重复一次动作\n- 不稳定器械上练习：在不稳定器械上负重或不负重进行平衡能力训练\n\n### 二、协调性训练（p217，部分可读）\n\n协调是一种综合了平衡和节奏及上下肢配合的运动能力，体现肌肉对手臂运动和高强度动作所做的不同收缩的有效控制。协调性训练的目的之一是在较困难情况下掌握简单的技术；还可通过将技术动作分解为不同部分，然后再逐步整合，得到更有效的协调。\n\n例（p217，摘要）：\n- 练习1：滚翻：前滚翻、后滚翻、单肩前滚翻、鱼跃前滚翻等\n- 练习2：跳绳：两臂摆动、步幅要小；每次跳起时用脚尖，动作加速直至绳绳，然后稍微减速，再加速直至绳绳，按此继续\n  - 可采用向前、向后摇的双脚和单脚跳；前、后摇的两脚交换跳、双摇跳\n  - 结合网球：发球区内用手抛球击球；每只手握一球相对打；发球区内做网前准备动作并两人对打；快速截击球练习（教练在另一端发“T”球、快速送出 6 球）；反手/正手各类截击与高压组合（⚠️ p217 文段较长，以上为截图可读要点）\n  - 双手击反弹球；仰卧在网前教练快递送球（两球拍保护/一球拍保护）\n\n### 三、程序化灵敏训练（p217-219，摘要）\n\n程序化灵敏是灵敏性训练的第三个因素。运动员经历过每一个动作的技能和压力，并意识到运动形式和顺序，预先对运动做准备。程序化灵敏训练可在高速条件下进行，但学习过程中必须控制好速度。\n\n典型路线（p219，按图示要点）：\n- “K”字形跑动：从中点出发，跑至 A 处后返回；再向 B 处跑，直至从 A 处返回（图 4）\n- “捡球
